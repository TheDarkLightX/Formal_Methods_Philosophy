<svg
  class="fp-diagram"
  viewBox="0 0 960 560"
  role="img"
  aria-labelledby="fp-pao-title fp-pao-desc"
  xmlns="http://www.w3.org/2000/svg"
>
  <title id="fp-pao-title">The five axioms of Presburger arithmetic</title>
  <desc id="fp-pao-desc">
    Five axiom cards: successor never produces zero, successor is injective, zero is
    the additive identity, addition recurses through successor, and restricted induction.
  </desc>

  <defs>
    <filter id="fp-pao-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Row 1: Axioms 1, 2, 3 -->

  <!-- Axiom 1 -->
  <g filter="url(#fp-pao-shadow)">
    <rect x="20" y="20" width="290" height="180" rx="16" fill="#FFFFFF" stroke="#E2E8F0" />
    <circle cx="50" cy="50" r="16" fill="rgba(59, 130, 246, 0.15)" stroke="rgba(59, 130, 246, 0.35)" />
    <text x="50" y="55" font-size="14" font-weight="900" fill="#3B82F6" font-family="Atkinson Hyperlegible, system-ui, sans-serif" text-anchor="middle">1</text>
    <text x="76" y="56" font-size="13" font-weight="700" fill="#1E293B" font-family="Atkinson Hyperlegible, system-ui, sans-serif">Zero is not a successor</text>
    <rect x="36" y="76" width="258" height="38" rx="8" fill="rgba(15, 23, 42, 0.04)" />
    <text x="165" y="101" font-size="16" font-weight="600" fill="#1E293B" font-family="'SF Mono', 'Fira Code', monospace" text-anchor="middle">∀x. S(x) ≠ 0</text>
    <text x="36" y="140" font-size="11" fill="#475569" font-family="Atkinson Hyperlegible, system-ui, sans-serif">No number loops back to zero.</text>
    <text x="36" y="158" font-size="11" fill="#475569" font-family="Atkinson Hyperlegible, system-ui, sans-serif">The chain has a definite starting point.</text>
    <text x="36" y="185" font-size="10" fill="#94A3B8" font-family="Atkinson Hyperlegible, system-ui, sans-serif">Rules out: cycles in the number line</text>
  </g>

  <!-- Axiom 2 -->
  <g filter="url(#fp-pao-shadow)">
    <rect x="335" y="20" width="290" height="180" rx="16" fill="#FFFFFF" stroke="#E2E8F0" />
    <circle cx="365" cy="50" r="16" fill="rgba(59, 130, 246, 0.15)" stroke="rgba(59, 130, 246, 0.35)" />
    <text x="365" y="55" font-size="14" font-weight="900" fill="#3B82F6" font-family="Atkinson Hyperlegible, system-ui, sans-serif" text-anchor="middle">2</text>
    <text x="391" y="56" font-size="13" font-weight="700" fill="#1E293B" font-family="Atkinson Hyperlegible, system-ui, sans-serif">Successor is injective</text>
    <rect x="351" y="76" width="258" height="38" rx="8" fill="rgba(15, 23, 42, 0.04)" />
    <text x="480" y="101" font-size="14" font-weight="600" fill="#1E293B" font-family="'SF Mono', 'Fira Code', monospace" text-anchor="middle">∀x.∀y. S(x)=S(y) → x=y</text>
    <text x="351" y="140" font-size="11" fill="#475569" font-family="Atkinson Hyperlegible, system-ui, sans-serif">Different numbers always have</text>
    <text x="351" y="158" font-size="11" fill="#475569" font-family="Atkinson Hyperlegible, system-ui, sans-serif">different successors. No merging.</text>
    <text x="351" y="185" font-size="10" fill="#94A3B8" font-family="Atkinson Hyperlegible, system-ui, sans-serif">Rules out: branching backward</text>
  </g>

  <!-- Axiom 3 -->
  <g filter="url(#fp-pao-shadow)">
    <rect x="650" y="20" width="290" height="180" rx="16" fill="#FFFFFF" stroke="#E2E8F0" />
    <circle cx="680" cy="50" r="16" fill="rgba(34, 197, 94, 0.15)" stroke="rgba(34, 197, 94, 0.35)" />
    <text x="680" y="55" font-size="14" font-weight="900" fill="#166534" font-family="Atkinson Hyperlegible, system-ui, sans-serif" text-anchor="middle">3</text>
    <text x="706" y="56" font-size="13" font-weight="700" fill="#1E293B" font-family="Atkinson Hyperlegible, system-ui, sans-serif">Additive identity</text>
    <rect x="666" y="76" width="258" height="38" rx="8" fill="rgba(15, 23, 42, 0.04)" />
    <text x="795" y="101" font-size="16" font-weight="600" fill="#1E293B" font-family="'SF Mono', 'Fira Code', monospace" text-anchor="middle">∀x. x + 0 = x</text>
    <text x="666" y="140" font-size="11" fill="#475569" font-family="Atkinson Hyperlegible, system-ui, sans-serif">Adding zero changes nothing.</text>
    <text x="666" y="158" font-size="11" fill="#475569" font-family="Atkinson Hyperlegible, system-ui, sans-serif">Base case for recursive addition.</text>
    <text x="666" y="185" font-size="10" fill="#94A3B8" font-family="Atkinson Hyperlegible, system-ui, sans-serif">Provides: termination of addition</text>
  </g>

  <!-- Row 2: Axioms 4, 5 -->

  <!-- Axiom 4 -->
  <g filter="url(#fp-pao-shadow)">
    <rect x="20" y="230" width="390" height="180" rx="16" fill="#FFFFFF" stroke="#E2E8F0" />
    <circle cx="50" cy="260" r="16" fill="rgba(34, 197, 94, 0.15)" stroke="rgba(34, 197, 94, 0.35)" />
    <text x="50" y="265" font-size="14" font-weight="900" fill="#166534" font-family="Atkinson Hyperlegible, system-ui, sans-serif" text-anchor="middle">4</text>
    <text x="76" y="266" font-size="13" font-weight="700" fill="#1E293B" font-family="Atkinson Hyperlegible, system-ui, sans-serif">Addition recurses through successor</text>
    <rect x="36" y="286" width="358" height="38" rx="8" fill="rgba(15, 23, 42, 0.04)" />
    <text x="215" y="311" font-size="16" font-weight="600" fill="#1E293B" font-family="'SF Mono', 'Fira Code', monospace" text-anchor="middle">∀x.∀y. x + S(y) = S(x + y)</text>
    <text x="36" y="350" font-size="11" fill="#475569" font-family="Atkinson Hyperlegible, system-ui, sans-serif">Peel one S off the second argument, wrap the result.</text>
    <text x="36" y="368" font-size="11" fill="#475569" font-family="Atkinson Hyperlegible, system-ui, sans-serif">Together with Axiom 3, this fully determines x + y.</text>
    <text x="36" y="396" font-size="10" fill="#94A3B8" font-family="Atkinson Hyperlegible, system-ui, sans-serif">Provides: recursive step of addition</text>
  </g>

  <!-- Axiom 5 -->
  <g filter="url(#fp-pao-shadow)">
    <rect x="435" y="230" width="505" height="180" rx="16" fill="#FFFFFF" stroke="rgba(249, 115, 22, 0.30)" />
    <circle cx="465" cy="260" r="16" fill="rgba(249, 115, 22, 0.15)" stroke="rgba(249, 115, 22, 0.40)" />
    <text x="465" y="265" font-size="14" font-weight="900" fill="#C2410C" font-family="Atkinson Hyperlegible, system-ui, sans-serif" text-anchor="middle">5</text>
    <text x="491" y="266" font-size="13" font-weight="700" fill="#1E293B" font-family="Atkinson Hyperlegible, system-ui, sans-serif">Induction (restricted to Presburger formulas)</text>
    <rect x="451" y="286" width="473" height="38" rx="8" fill="rgba(249, 115, 22, 0.06)" />
    <text x="687" y="311" font-size="13" font-weight="600" fill="#1E293B" font-family="'SF Mono', 'Fira Code', monospace" text-anchor="middle">[φ(0) ∧ ∀x.(φ(x)→φ(S(x)))] → ∀x.φ(x)</text>
    <text x="451" y="350" font-size="11" fill="#475569" font-family="Atkinson Hyperlegible, system-ui, sans-serif">If φ holds at 0 and propagates through successor, it holds everywhere.</text>
    <text x="451" y="368" font-size="11" fill="#C2410C" font-family="Atkinson Hyperlegible, system-ui, sans-serif" font-weight="700">φ must only use {0, S, +} — this restriction is what makes it decidable.</text>
    <text x="451" y="396" font-size="10" fill="#94A3B8" font-family="Atkinson Hyperlegible, system-ui, sans-serif">Axiom schema: one axiom per formula in the Presburger language</text>
  </g>

  <!-- Bottom label -->
  <text x="480" y="448" font-size="12" fill="#94A3B8" font-family="Atkinson Hyperlegible, system-ui, sans-serif" text-anchor="middle">
    Axioms 1–2 shape the number line. Axioms 3–4 define addition. Axiom 5 enables proof by induction — within the decidable fragment.
  </text>

  <!-- Color legend -->
  <circle cx="240" y="478" r="6" fill="rgba(59, 130, 246, 0.20)" stroke="rgba(59, 130, 246, 0.4)" />
  <text x="254" y="483" font-size="10" fill="#475569" font-family="Atkinson Hyperlegible, system-ui, sans-serif">Successor axioms</text>
  <circle cx="400" y="478" r="6" fill="rgba(34, 197, 94, 0.20)" stroke="rgba(34, 197, 94, 0.4)" />
  <text x="414" y="483" font-size="10" fill="#475569" font-family="Atkinson Hyperlegible, system-ui, sans-serif">Addition axioms</text>
  <circle cx="550" y="478" r="6" fill="rgba(249, 115, 22, 0.20)" stroke="rgba(249, 115, 22, 0.4)" />
  <text x="564" y="483" font-size="10" fill="#475569" font-family="Atkinson Hyperlegible, system-ui, sans-serif">Induction (the decidability key)</text>
</svg>
