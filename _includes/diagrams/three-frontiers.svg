<svg
  class="fp-diagram"
  viewBox="0 0 960 480"
  role="img"
  aria-labelledby="fp-3f-title fp-3f-desc"
  xmlns="http://www.w3.org/2000/svg"
>
  <title id="fp-3f-title">Three neuro-symbolic frontiers with increasing quantifier depth</title>
  <desc id="fp-3f-desc">
    Three rows: existential witness search (one quantifier), universal refutation
    (two quantifiers), and synthesis under adversary (three alternating quantifiers).
  </desc>

  <defs>
    <filter id="fp-3f-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.10" />
    </filter>
    <marker id="fp-3f-arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#3B82F6" fill-opacity="0.8" />
    </marker>
    <marker id="fp-3f-arrow-green" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#16A34A" fill-opacity="0.8" />
    </marker>
    <marker id="fp-3f-arrow-red" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#DC2626" fill-opacity="0.8" />
    </marker>
    <marker id="fp-3f-arrow-amber" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#A04A08" fill-opacity="0.8" />
    </marker>
  </defs>

  <!-- Card -->
  <g filter="url(#fp-3f-shadow)">
    <rect x="30" y="10" width="900" height="460" rx="26" fill="#FFFFFF" stroke="#E2E8F0" />
  </g>

  <!-- Title -->
  <text x="70" y="50" font-size="15" font-weight="900" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Three frontiers: each level adds one alternating quantifier
  </text>

  <!-- ═══ Row 1: Existential ═══ -->
  <rect x="60" y="72" width="840" height="110" rx="16"
    fill="rgba(59, 130, 246, 0.05)" stroke="rgba(59, 130, 246, 0.15)" stroke-width="1.5" />

  <!-- Depth label -->
  <rect x="76" y="84" width="88" height="24" rx="8"
    fill="rgba(59, 130, 246, 0.12)" />
  <text x="90" y="101" font-size="11" font-weight="800" fill="#2563EB"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">1 quantifier</text>

  <!-- Formula -->
  <text x="180" y="101" font-size="14" font-weight="900" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    &#x2203;w  Witness(w, x)
  </text>

  <!-- Flow: LLM → propose w → checker → accept -->
  <rect x="96" y="120" width="110" height="44" rx="12"
    fill="rgba(15, 118, 110, 0.10)" stroke="rgba(15, 118, 110, 0.30)" />
  <text x="118" y="147" font-size="12" font-weight="700" fill="#0F766E"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">LLM proposes</text>

  <path d="M206 142 H260" stroke="#3B82F6" stroke-width="3"
    marker-end="url(#fp-3f-arrow)" stroke-linecap="round" />

  <rect x="270" y="120" width="140" height="44" rx="12"
    fill="rgba(15, 23, 42, 0.05)" stroke="rgba(15, 23, 42, 0.15)" />
  <text x="288" y="141" font-size="12" font-weight="700" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">Checker verifies</text>
  <text x="296" y="157" font-size="10" fill="#64748B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">Valid(w, x)?</text>

  <path d="M410 142 H470" stroke="#16A34A" stroke-width="3"
    marker-end="url(#fp-3f-arrow-green)" stroke-linecap="round" />

  <rect x="480" y="126" width="86" height="32" rx="10"
    fill="rgba(34, 197, 94, 0.12)" stroke="rgba(34, 197, 94, 0.35)" />
  <text x="495" y="148" font-size="12" font-weight="800" fill="#15803D"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">Proved</text>

  <!-- Description -->
  <text x="620" y="138" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">Find one valid witness.</text>
  <text x="620" y="155" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">One hit is enough.</text>

  <!-- ═══ Row 2: Refutation ═══ -->
  <rect x="60" y="196" width="840" height="110" rx="16"
    fill="rgba(160, 74, 8, 0.04)" stroke="rgba(160, 74, 8, 0.15)" stroke-width="1.5" />

  <rect x="76" y="208" width="98" height="24" rx="8"
    fill="rgba(160, 74, 8, 0.12)" />
  <text x="86" y="225" font-size="11" font-weight="800" fill="#A04A08"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">2 quantifiers</text>

  <text x="190" y="225" font-size="14" font-weight="900" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    &#xAC;&#x2203;c  Counterexample(c, x)
  </text>

  <!-- Flow: LLM → attack → checker validates → refuted OR survived -->
  <rect x="96" y="244" width="110" height="44" rx="12"
    fill="rgba(15, 118, 110, 0.10)" stroke="rgba(15, 118, 110, 0.30)" />
  <text x="121" y="271" font-size="12" font-weight="700" fill="#0F766E"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">LLM attacks</text>

  <path d="M206 266 H260" stroke="#3B82F6" stroke-width="3"
    marker-end="url(#fp-3f-arrow)" stroke-linecap="round" />

  <rect x="270" y="244" width="140" height="44" rx="12"
    fill="rgba(15, 23, 42, 0.05)" stroke="rgba(15, 23, 42, 0.15)" />
  <text x="284" y="265" font-size="12" font-weight="700" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">Checker validates</text>
  <text x="296" y="281" font-size="10" fill="#64748B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">Bad(c, x)?</text>

  <!-- Branch: if yes → refuted -->
  <path d="M410 256 H470" stroke="#DC2626" stroke-width="3"
    marker-end="url(#fp-3f-arrow-red)" stroke-linecap="round" />
  <rect x="480" y="242" width="86" height="32" rx="10"
    fill="rgba(239, 68, 68, 0.10)" stroke="rgba(239, 68, 68, 0.30)" />
  <text x="492" y="263" font-size="12" font-weight="800" fill="#DC2626"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">Refuted</text>

  <!-- Branch: if no → corroborated -->
  <path d="M410 275 L470 285" stroke="#16A34A" stroke-width="2"
    marker-end="url(#fp-3f-arrow-green)" stroke-linecap="round" stroke-dasharray="5 3" />
  <text x="480" y="292" font-size="11" font-weight="600" fill="#15803D"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">no hit? corroborated</text>

  <text x="620" y="262" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">Hunt for a bad witness.</text>
  <text x="620" y="279" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">One hit refutes. None found</text>
  <text x="620" y="293" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">= corroboration, not proof.</text>

  <!-- ═══ Row 3: Synthesis ═══ -->
  <rect x="60" y="320" width="840" height="130" rx="16"
    fill="rgba(124, 58, 237, 0.04)" stroke="rgba(124, 58, 237, 0.15)" stroke-width="1.5" />

  <rect x="76" y="332" width="98" height="24" rx="8"
    fill="rgba(124, 58, 237, 0.12)" />
  <text x="86" y="349" font-size="11" font-weight="800" fill="#7C3AED"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">3 quantifiers</text>

  <text x="190" y="349" font-size="14" font-weight="900" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    &#x2203;d &#x2200;a &#xAC;&#x2203;u  Bad(u, d, a, x)
  </text>

  <!-- Flow: LLM → design d → adversary picks a → checker: any bad u? → safe -->
  <rect x="96" y="366" width="100" height="44" rx="12"
    fill="rgba(15, 118, 110, 0.10)" stroke="rgba(15, 118, 110, 0.30)" />
  <text x="109" y="393" font-size="12" font-weight="700" fill="#0F766E"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">LLM designs</text>

  <path d="M196 388 H240" stroke="#3B82F6" stroke-width="3"
    marker-end="url(#fp-3f-arrow)" stroke-linecap="round" />

  <rect x="250" y="366" width="130" height="44" rx="12"
    fill="rgba(239, 68, 68, 0.06)" stroke="rgba(239, 68, 68, 0.20)" />
  <text x="268" y="387" font-size="12" font-weight="700" fill="#DC2626"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">Adversary &#x2200;a</text>
  <text x="268" y="403" font-size="10" fill="#64748B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">all allowed attacks</text>

  <path d="M380 388 H430" stroke="#A04A08" stroke-width="3"
    marker-end="url(#fp-3f-arrow-amber)" stroke-linecap="round" />

  <rect x="440" y="366" width="130" height="44" rx="12"
    fill="rgba(15, 23, 42, 0.05)" stroke="rgba(15, 23, 42, 0.15)" />
  <text x="460" y="387" font-size="12" font-weight="700" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">Checker &#xAC;&#x2203;u</text>
  <text x="456" y="403" font-size="10" fill="#64748B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">any bad outcome?</text>

  <path d="M570 388 H620" stroke="#16A34A" stroke-width="3"
    marker-end="url(#fp-3f-arrow-green)" stroke-linecap="round" />

  <rect x="630" y="372" width="96" height="32" rx="10"
    fill="rgba(34, 197, 94, 0.12)" stroke="rgba(34, 197, 94, 0.35)" />
  <text x="649" y="394" font-size="12" font-weight="800" fill="#15803D"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">Safe &#x2713;</text>

  <text x="745" y="384" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">Design must survive</text>
  <text x="745" y="401" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">every possible attack.</text>
  <text x="745" y="418" font-size="11" font-weight="700" fill="#7C3AED"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">This is a game.</text>
</svg>
