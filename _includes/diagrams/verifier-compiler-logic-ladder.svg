<svg
  class="fp-diagram"
  viewBox="0 0 960 360"
  role="img"
  aria-labelledby="fp-vcll-title fp-vcll-desc"
  xmlns="http://www.w3.org/2000/svg"
>
  <title id="fp-vcll-title">Late logic ladder for the verifier-compiler tutorial</title>
  <desc id="fp-vcll-desc">
    A five-step ladder showing the late definability endpoint: Q2 controls
    relation targets, Q3 adds commitments and symmetric support, Q4 adds
    orientation, incidence signature identifies raw families on the ambiguous
    slice, and adding cycle orientation repairs the final transfer obstruction
    on the full atlas.
  </desc>

  <defs>
    <filter id="fp-vcll-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.10" />
    </filter>
    <marker id="fp-vcll-arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#3B82F6" fill-opacity="0.9" />
    </marker>
  </defs>

  <g filter="url(#fp-vcll-shadow)">
    <rect x="20" y="10" width="920" height="340" rx="26" fill="#FFFFFF" stroke="#E2E8F0" />
  </g>

  <text x="58" y="46" font-size="15" font-weight="900" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Late logic ladder
  </text>
  <text x="58" y="66" font-size="12" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Each step adds the smallest searched theory that makes the next target exact.
  </text>

  <rect x="60" y="105" width="145" height="120" rx="16"
    fill="rgba(15, 118, 110, 0.08)" stroke="rgba(15, 118, 110, 0.22)" />
  <text x="82" y="132" font-size="13" font-weight="900" fill="#0F766E"
    font-family="JetBrains Mono, monospace">Q2</text>
  <text x="82" y="154" font-size="10" fill="#475569"
    font-family="JetBrains Mono, monospace">(balanced_profiles,</text>
  <text x="82" y="170" font-size="10" fill="#475569"
    font-family="JetBrains Mono, monospace">support_gap)</text>
  <text x="82" y="196" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    relation targets
  </text>

  <rect x="235" y="105" width="145" height="120" rx="16"
    fill="rgba(34, 197, 94, 0.08)" stroke="rgba(34, 197, 94, 0.24)" />
  <text x="257" y="132" font-size="13" font-weight="900" fill="#15803D"
    font-family="JetBrains Mono, monospace">Q3</text>
  <text x="257" y="154" font-size="10" fill="#475569"
    font-family="JetBrains Mono, monospace">Q2 + high_overlap</text>
  <text x="257" y="180" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    commitments
  </text>
  <text x="257" y="196" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    symmetric support
  </text>

  <rect x="410" y="105" width="145" height="120" rx="16"
    fill="rgba(249, 115, 22, 0.08)" stroke="rgba(249, 115, 22, 0.24)" />
  <text x="432" y="132" font-size="13" font-weight="900" fill="#C2410C"
    font-family="JetBrains Mono, monospace">Q4</text>
  <text x="432" y="154" font-size="10" fill="#475569"
    font-family="JetBrains Mono, monospace">(extra_count,</text>
  <text x="432" y="170" font-size="10" fill="#475569"
    font-family="JetBrains Mono, monospace">orientation)</text>
  <text x="432" y="196" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    oriented support
  </text>

  <rect x="585" y="105" width="160" height="120" rx="16"
    fill="rgba(59, 130, 246, 0.08)" stroke="rgba(59, 130, 246, 0.24)" />
  <text x="607" y="132" font-size="12" font-weight="900" fill="#2563EB"
    font-family="JetBrains Mono, monospace">incidence_signature</text>
  <text x="607" y="154" font-size="10" fill="#475569"
    font-family="JetBrains Mono, monospace">(out_profile, in_profile)</text>
  <text x="607" y="196" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    raw family identity
  </text>
  <text x="607" y="212" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    on ambiguous slice
  </text>

  <rect x="775" y="92" width="135" height="146" rx="16"
    fill="rgba(168, 34, 24, 0.08)" stroke="rgba(168, 34, 24, 0.24)" />
  <text x="793" y="120" font-size="12" font-weight="900" fill="#A82218"
    font-family="JetBrains Mono, monospace">incidence_signature</text>
  <text x="815" y="138" font-size="12" font-weight="900" fill="#A82218"
    font-family="JetBrains Mono, monospace">+ cycle_orientation</text>
  <text x="795" y="174" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    full raw family identity
  </text>
  <text x="795" y="190" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    on off-diagonal atlas
  </text>
  <text x="795" y="214" font-size="10" fill="#A82218"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    repairs the balanced
  </text>
  <text x="795" y="230" font-size="10" fill="#A82218"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    opposite 3-cycle split
  </text>

  <path d="M205 165 H225" stroke="#3B82F6" stroke-width="3" marker-end="url(#fp-vcll-arrow)" stroke-linecap="round" />
  <path d="M380 165 H400" stroke="#3B82F6" stroke-width="3" marker-end="url(#fp-vcll-arrow)" stroke-linecap="round" />
  <path d="M555 165 H575" stroke="#3B82F6" stroke-width="3" marker-end="url(#fp-vcll-arrow)" stroke-linecap="round" />
  <path d="M745 165 H765" stroke="#3B82F6" stroke-width="3" marker-end="url(#fp-vcll-arrow)" stroke-linecap="round" />

  <rect x="165" y="275" width="630" height="46" rx="12"
    fill="rgba(15, 23, 42, 0.04)" stroke="rgba(148, 163, 184, 0.28)" />
  <text x="188" y="303" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Teaching summary: the late endpoint is a definability ladder, not just a longer feature list.
  </text>
</svg>
