<svg
  class="fp-diagram"
  viewBox="0 0 960 520"
  role="img"
  aria-labelledby="fp-rlm-title fp-rlm-desc"
  xmlns="http://www.w3.org/2000/svg"
>
  <title id="fp-rlm-title">Routing regimes and lock-in</title>
  <desc id="fp-rlm-desc">
    A comparison of platform-favored routing and protocol-equalized routing.
    Equalized routing expands the disadvantaged class's viability region and can
    preserve its presence over two periods under no re-entry.
  </desc>

  <defs>
    <filter id="fp-rlm-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.10" />
    </filter>
    <marker id="fp-rlm-arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#3B82F6" fill-opacity="0.9" />
    </marker>
  </defs>

  <g filter="url(#fp-rlm-shadow)">
    <rect x="20" y="10" width="920" height="500" rx="26" fill="#FFFFFF" stroke="#E2E8F0" />
  </g>

  <text x="60" y="46" font-size="15" font-weight="900" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Routing regimes and lock-in
  </text>
  <text x="60" y="66" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Experiments 18, 19, and 23 show that equalized routing changes viability and persistence, not just fairness language.
  </text>

  <!-- left: static margins -->
  <rect x="60" y="110" width="390" height="180" rx="18"
    fill="rgba(59, 130, 246, 0.06)" stroke="rgba(59, 130, 246, 0.20)" />
  <text x="86" y="138" font-size="13" font-weight="900" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Static viability for disadvantaged class B
  </text>

  <rect x="86" y="164" width="155" height="98" rx="14"
    fill="rgba(168, 34, 24, 0.08)" stroke="rgba(168, 34, 24, 0.24)" />
  <text x="104" y="190" font-size="12" font-weight="900" fill="#A82218"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Platform-favored
  </text>
  <text x="104" y="212" font-size="10" fill="#475569"
    font-family="JetBrains Mono, monospace">
    M_B = F - c(a n_A + n_B)
  </text>
  <text x="104" y="234" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    class A gets extra route weight
  </text>

  <rect x="268" y="164" width="155" height="98" rx="14"
    fill="rgba(34, 197, 94, 0.08)" stroke="rgba(34, 197, 94, 0.24)" />
  <text x="286" y="190" font-size="12" font-weight="900" fill="#15803D"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Protocol-equalized
  </text>
  <text x="286" y="212" font-size="10" fill="#475569"
    font-family="JetBrains Mono, monospace">
    M_B = F - c(n_A + n_B)
  </text>
  <text x="286" y="234" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    both classes face equal route weight
  </text>

  <rect x="86" y="306" width="337" height="66" rx="14"
    fill="rgba(15, 23, 42, 0.04)" stroke="rgba(148, 163, 184, 0.20)" />
  <text x="108" y="332" font-size="11" font-weight="900" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Inclusion law
  </text>
  <text x="108" y="354" font-size="11" fill="#475569"
    font-family="JetBrains Mono, monospace">
    M_B_platform >= 0  implies  M_B_protocol >= 0
  </text>

  <!-- right: dynamic paths -->
  <rect x="500" y="110" width="390" height="300" rx="18"
    fill="rgba(15, 118, 110, 0.06)" stroke="rgba(15, 118, 110, 0.20)" />
  <text x="526" y="138" font-size="13" font-weight="900" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Two-period persistence under no re-entry
  </text>

  <text x="544" y="184" font-size="11" font-weight="900" fill="#A82218"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Platform path
  </text>
  <rect x="540" y="200" width="84" height="38" rx="12"
    fill="rgba(59, 130, 246, 0.08)" stroke="rgba(59, 130, 246, 0.24)" />
  <text x="565" y="224" font-size="11" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    both
  </text>
  <path d="M624 219 H662" stroke="#A82218" stroke-width="2.5" marker-end="url(#fp-rlm-arrow)" />
  <rect x="670" y="200" width="84" height="38" rx="12"
    fill="rgba(168, 34, 24, 0.08)" stroke="rgba(168, 34, 24, 0.24)" />
  <text x="688" y="224" font-size="11" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    A-only
  </text>
  <path d="M754 219 H792" stroke="#A82218" stroke-width="2.5" marker-end="url(#fp-rlm-arrow)" />
  <rect x="800" y="200" width="68" height="38" rx="12"
    fill="rgba(168, 34, 24, 0.08)" stroke="rgba(168, 34, 24, 0.24)" />
  <text x="812" y="224" font-size="11" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    A-only
  </text>

  <text x="544" y="286" font-size="11" font-weight="900" fill="#15803D"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Protocol path
  </text>
  <rect x="540" y="302" width="84" height="38" rx="12"
    fill="rgba(59, 130, 246, 0.08)" stroke="rgba(59, 130, 246, 0.24)" />
  <text x="565" y="326" font-size="11" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    both
  </text>
  <path d="M624 321 H662" stroke="#15803D" stroke-width="2.5" marker-end="url(#fp-rlm-arrow)" />
  <rect x="670" y="302" width="84" height="38" rx="12"
    fill="rgba(59, 130, 246, 0.08)" stroke="rgba(59, 130, 246, 0.24)" />
  <text x="695" y="326" font-size="11" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    both
  </text>
  <path d="M754 321 H792" stroke="#15803D" stroke-width="2.5" marker-end="url(#fp-rlm-arrow)" />
  <rect x="800" y="302" width="68" height="38" rx="12"
    fill="rgba(59, 130, 246, 0.08)" stroke="rgba(59, 130, 246, 0.24)" />
  <text x="817" y="326" font-size="11" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    both
  </text>

  <rect x="530" y="362" width="338" height="34" rx="12"
    fill="rgba(15, 23, 42, 0.04)" stroke="rgba(148, 163, 184, 0.20)" />
  <text x="550" y="385" font-size="10" fill="#475569"
    font-family="JetBrains Mono, monospace">
    witness: F = 10, a = 3, n_A = 2, n_B = 2, c = 2
  </text>

  <rect x="120" y="420" width="720" height="54" rx="16"
    fill="rgba(245, 158, 11, 0.08)" stroke="rgba(245, 158, 11, 0.22)" />
  <text x="150" y="446" font-size="12" font-weight="900" fill="#B45309"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Teaching point
  </text>
  <text x="150" y="466" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Equalized routing weakly expands the disadvantaged class's viability region, and under no re-entry it can turn a one-period disadvantage into persistent exclusion or persistent coexistence.
  </text>
</svg>
