<svg
  class="fp-diagram"
  viewBox="0 0 960 460"
  role="img"
  aria-labelledby="fp-einsum-title fp-einsum-desc"
  xmlns="http://www.w3.org/2000/svg"
>
  <title id="fp-einsum-title">Einstein summation as index contraction</title>
  <desc id="fp-einsum-desc">
    Two input tensors A[i,j] and B[j,k] share an index j. Einstein summation contracts over j to produce an output
    tensor C[i,k]. The repeated index is summed out and does not appear in the output.
  </desc>

  <defs>
    <filter id="fp-einsum-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.10" />
    </filter>
    <marker
      id="fp-einsum-arrow-blue"
      markerWidth="12"
      markerHeight="12"
      refX="10"
      refY="6"
      orient="auto"
    >
      <path d="M0,0 L12,6 L0,12 Z" fill="#3B82F6" fill-opacity="0.9" />
    </marker>
    <marker
      id="fp-einsum-arrow-orange"
      markerWidth="12"
      markerHeight="12"
      refX="10"
      refY="6"
      orient="auto"
    >
      <path d="M0,0 L12,6 L0,12 Z" fill="#F97316" fill-opacity="0.9" />
    </marker>
  </defs>

  <g filter="url(#fp-einsum-shadow)">
    <rect x="40" y="60" width="880" height="340" rx="26" fill="#FFFFFF" stroke="#E2E8F0" />

    <text
      x="90"
      y="120"
      font-size="16"
      font-weight="900"
      fill="#1E293B"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif"
    >
      Einstein summation (einsum)
    </text>
    <text
      x="90"
      y="145"
      font-size="12"
      fill="#475569"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif"
    >
      Repeated indices are summed out. Remaining indices label the output.
    </text>

    <!-- A[i,j] -->
    <g>
      <rect
        x="90"
        y="175"
        width="240"
        height="170"
        rx="22"
        fill="rgba(59, 130, 246, 0.10)"
        stroke="rgba(59, 130, 246, 0.22)"
      />
      <text
        x="118"
        y="206"
        font-size="13"
        font-weight="900"
        fill="#1E293B"
        font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace"
      >
        A[i,j]
      </text>

      <!-- grid -->
      <g fill="rgba(15, 23, 42, 0.03)" stroke="rgba(15, 23, 42, 0.10)">
        <rect x="118" y="222" width="56" height="44" rx="10" />
        <rect x="178" y="222" width="56" height="44" rx="10" />
        <rect x="238" y="222" width="56" height="44" rx="10" />
        <rect x="118" y="272" width="56" height="44" rx="10" />
        <rect x="178" y="272" width="56" height="44" rx="10" />
        <rect x="238" y="272" width="56" height="44" rx="10" />
      </g>

      <!-- axis labels -->
      <text
        x="110"
        y="272"
        font-size="12"
        font-weight="900"
        fill="#3B82F6"
        font-family="Atkinson Hyperlegible, system-ui, sans-serif"
        text-anchor="end"
      >
        i
      </text>
      <text
        x="206"
        y="330"
        font-size="12"
        font-weight="900"
        fill="#F97316"
        font-family="Atkinson Hyperlegible, system-ui, sans-serif"
        text-anchor="middle"
      >
        j
      </text>
      <path
        d="M118 325 H294"
        stroke="rgba(249, 115, 22, 0.70)"
        stroke-width="3"
        stroke-linecap="round"
      />
    </g>

    <!-- B[j,k] -->
    <g>
      <rect
        x="360"
        y="175"
        width="240"
        height="170"
        rx="22"
        fill="rgba(15, 23, 42, 0.06)"
        stroke="rgba(15, 23, 42, 0.14)"
      />
      <text
        x="388"
        y="206"
        font-size="13"
        font-weight="900"
        fill="#1E293B"
        font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace"
      >
        B[j,k]
      </text>

      <!-- grid -->
      <g fill="rgba(15, 23, 42, 0.03)" stroke="rgba(15, 23, 42, 0.10)">
        <rect x="388" y="222" width="56" height="44" rx="10" />
        <rect x="448" y="222" width="56" height="44" rx="10" />
        <rect x="508" y="222" width="56" height="44" rx="10" />
        <rect x="388" y="272" width="56" height="44" rx="10" />
        <rect x="448" y="272" width="56" height="44" rx="10" />
        <rect x="508" y="272" width="56" height="44" rx="10" />
      </g>

      <!-- axis labels -->
      <text
        x="380"
        y="272"
        font-size="12"
        font-weight="900"
        fill="#F97316"
        font-family="Atkinson Hyperlegible, system-ui, sans-serif"
        text-anchor="end"
      >
        j
      </text>
      <path
        d="M382 222 V316"
        stroke="rgba(249, 115, 22, 0.70)"
        stroke-width="3"
        stroke-linecap="round"
      />
      <text
        x="476"
        y="330"
        font-size="12"
        font-weight="900"
        fill="#10B981"
        font-family="Atkinson Hyperlegible, system-ui, sans-serif"
        text-anchor="middle"
      >
        k
      </text>
      <path
        d="M388 325 H564"
        stroke="rgba(16, 185, 129, 0.65)"
        stroke-width="3"
        stroke-linecap="round"
      />
    </g>

    <!-- Contraction annotation -->
    <g>
      <path
        d="M330 260 H360"
        stroke="#F97316"
        stroke-width="3"
        stroke-linecap="round"
        marker-end="url(#fp-einsum-arrow-orange)"
      />
      <text
        x="345"
        y="248"
        font-size="11"
        fill="#475569"
        font-family="Atkinson Hyperlegible, system-ui, sans-serif"
        text-anchor="middle"
      >
        sum over j
      </text>
    </g>

    <!-- Output C[i,k] -->
    <g>
      <rect
        x="630"
        y="175"
        width="240"
        height="170"
        rx="22"
        fill="rgba(16, 185, 129, 0.10)"
        stroke="rgba(16, 185, 129, 0.22)"
      />
      <text
        x="658"
        y="206"
        font-size="13"
        font-weight="900"
        fill="#1E293B"
        font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace"
      >
        C[i,k]
      </text>

      <!-- grid -->
      <g fill="rgba(15, 23, 42, 0.03)" stroke="rgba(15, 23, 42, 0.10)">
        <rect x="658" y="222" width="70" height="44" rx="10" />
        <rect x="734" y="222" width="70" height="44" rx="10" />
        <rect x="658" y="272" width="70" height="44" rx="10" />
        <rect x="734" y="272" width="70" height="44" rx="10" />
      </g>

      <!-- axis labels -->
      <text
        x="650"
        y="272"
        font-size="12"
        font-weight="900"
        fill="#3B82F6"
        font-family="Atkinson Hyperlegible, system-ui, sans-serif"
        text-anchor="end"
      >
        i
      </text>
      <text
        x="736"
        y="330"
        font-size="12"
        font-weight="900"
        fill="#10B981"
        font-family="Atkinson Hyperlegible, system-ui, sans-serif"
        text-anchor="middle"
      >
        k
      </text>
      <path
        d="M658 325 H804"
        stroke="rgba(16, 185, 129, 0.65)"
        stroke-width="3"
        stroke-linecap="round"
      />
    </g>

    <!-- Flow arrow to output -->
    <path
      d="M600 260 H630"
      stroke="#3B82F6"
      stroke-width="3"
      stroke-linecap="round"
      marker-end="url(#fp-einsum-arrow-blue)"
    />

    <!-- Bottom formula -->
    <g>
      <rect
        x="90"
        y="360"
        width="780"
        height="26"
        rx="13"
        fill="rgba(15, 23, 42, 0.03)"
        stroke="rgba(15, 23, 42, 0.10)"
      />
      <text
        x="480"
        y="378"
        text-anchor="middle"
        font-size="12"
        fill="#1E293B"
        font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace"
      >
        C[i,k] = sum_j A[i,j] * B[j,k]   (Einstein: j repeats =&gt; sum)
      </text>
    </g>
  </g>
</svg>
