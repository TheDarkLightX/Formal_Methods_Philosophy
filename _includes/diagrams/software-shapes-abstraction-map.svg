<svg
  class="fp-diagram"
  viewBox="0 0 960 460"
  role="img"
  aria-labelledby="fp-absm-title fp-absm-desc"
  xmlns="http://www.w3.org/2000/svg"
>
  <title id="fp-absm-title">Abstraction map: concrete vending-machine states to abstract shape phases</title>
  <desc id="fp-absm-desc">
    Groups of concrete vending-machine states on the left map through an abstraction
    function alpha to a small set of abstract phases on the right.
  </desc>

  <defs>
    <filter id="fp-absm-sh" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0F172A" flood-opacity="0.08" />
    </filter>
    <marker id="fp-absm-a" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,1 L10,5 L0,9 Z" fill="#3B82F6" fill-opacity="0.8" />
    </marker>
  </defs>

  <!-- ── Left card: concrete states ────────────── -->
  <g filter="url(#fp-absm-sh)">
    <rect x="30" y="30" width="400" height="400" rx="24" fill="#FFFFFF" stroke="#E2E8F0" />
    <text x="60" y="68" font-size="15" font-weight="900" fill="#1E293B"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">
      Concrete vending-machine states
    </text>
    <text x="60" y="88" font-size="11" fill="#475569"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">
      hardware detail, UI screens, sensor readings
    </text>

    <!-- Group 1: Idle cluster -->
    <rect x="55" y="108" width="350" height="44" rx="14"
      fill="rgba(59,130,246,0.08)" stroke="rgba(59,130,246,0.16)" />
    <text x="72" y="136" font-size="12" fill="#1E293B"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">
      AttractScreen · AwaitingCoin · CreditZero
    </text>

    <!-- Group 2: ChoiceReady cluster -->
    <rect x="55" y="165" width="350" height="44" rx="14"
      fill="rgba(59,130,246,0.08)" stroke="rgba(59,130,246,0.16)" />
    <text x="72" y="193" font-size="12" fill="#1E293B"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">
      CreditPositive · SelectionEnabled
    </text>

    <!-- Group 3: Executing cluster -->
    <rect x="55" y="222" width="350" height="44" rx="14"
      fill="rgba(59,130,246,0.08)" stroke="rgba(59,130,246,0.16)" />
    <text x="72" y="250" font-size="12" fill="#1E293B"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">
      MotorTurning · VendAttempt
    </text>

    <!-- Group 4: Delivered cluster -->
    <rect x="55" y="279" width="350" height="44" rx="14"
      fill="rgba(249,115,22,0.08)" stroke="rgba(249,115,22,0.16)" />
    <text x="72" y="307" font-size="12" fill="#1E293B"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">
      ItemDropped · ChangeReturning
    </text>

    <!-- Group 5: Resetting cluster -->
    <rect x="55" y="336" width="350" height="44" rx="14"
      fill="rgba(249,115,22,0.08)" stroke="rgba(249,115,22,0.16)" />
    <text x="72" y="364" font-size="12" fill="#1E293B"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">
      ClearingSession
    </text>

    <text x="60" y="410" font-size="11" fill="#475569"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">
      10+ states, many hardware-specific details
    </text>
  </g>

  <!-- ── Alpha arrow ──────────────────────────── -->
  <path d="M 450,230 C 500,230 480,230 530,230"
    stroke="#3B82F6" stroke-width="3" fill="none"
    marker-end="url(#fp-absm-a)" stroke-linecap="round" />
  <text x="490" y="214" font-size="18" font-weight="900" fill="#1E293B"
    text-anchor="middle"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">&#945;</text>
  <text x="490" y="256" font-size="11" fill="#475569" text-anchor="middle"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">abstraction</text>

  <!-- ── Right card: abstract phases ───────────── -->
  <g filter="url(#fp-absm-sh)">
    <rect x="550" y="30" width="380" height="400" rx="24" fill="#FFFFFF" stroke="#E2E8F0" />
    <text x="580" y="68" font-size="15" font-weight="900" fill="#1E293B"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">
      Abstract shape phases
    </text>
    <text x="580" y="88" font-size="11" fill="#475569"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">
      only what matters for the safety property
    </text>

    <!-- Phase pills -->
    <rect x="580" y="108" width="310" height="44" rx="18"
      fill="rgba(59,130,246,0.10)" stroke="rgba(59,130,246,0.22)" />
    <text x="600" y="136" font-size="13" font-weight="900" fill="#1E293B"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">Idle</text>

    <rect x="580" y="165" width="310" height="44" rx="18"
      fill="rgba(59,130,246,0.10)" stroke="rgba(59,130,246,0.22)" />
    <text x="600" y="193" font-size="13" font-weight="900" fill="#1E293B"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">ChoiceReady</text>

    <rect x="580" y="222" width="310" height="44" rx="18"
      fill="rgba(59,130,246,0.10)" stroke="rgba(59,130,246,0.22)" />
    <text x="600" y="250" font-size="13" font-weight="900" fill="#1E293B"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">Executing</text>

    <rect x="580" y="279" width="310" height="44" rx="18"
      fill="rgba(249,115,22,0.10)" stroke="rgba(249,115,22,0.22)" />
    <text x="600" y="307" font-size="13" font-weight="900" fill="#1E293B"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">Delivered</text>

    <rect x="580" y="336" width="310" height="44" rx="18"
      fill="rgba(249,115,22,0.10)" stroke="rgba(249,115,22,0.22)" />
    <text x="600" y="364" font-size="13" font-weight="900" fill="#1E293B"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">Resetting</text>

    <text x="580" y="410" font-size="11" fill="#475569"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">
      5 phases — preserves safety, discards hardware detail
    </text>
  </g>

  <!-- ── Mapping lines (concrete groups → abstract phases) -->
  <line x1="405" y1="130" x2="575" y2="130" stroke="rgba(59,130,246,0.25)" stroke-width="1.5" stroke-dasharray="4,3" />
  <line x1="405" y1="187" x2="575" y2="187" stroke="rgba(59,130,246,0.25)" stroke-width="1.5" stroke-dasharray="4,3" />
  <line x1="405" y1="244" x2="575" y2="244" stroke="rgba(59,130,246,0.25)" stroke-width="1.5" stroke-dasharray="4,3" />
  <line x1="405" y1="301" x2="575" y2="301" stroke="rgba(249,115,22,0.25)" stroke-width="1.5" stroke-dasharray="4,3" />
  <line x1="405" y1="358" x2="575" y2="358" stroke="rgba(249,115,22,0.25)" stroke-width="1.5" stroke-dasharray="4,3" />
</svg>
