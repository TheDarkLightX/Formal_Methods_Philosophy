<svg
  class="fp-diagram"
  viewBox="0 0 960 300"
  role="img"
  aria-labelledby="fp-str-title fp-str-desc"
  xmlns="http://www.w3.org/2000/svg"
>
  <title id="fp-str-title">Shape strengthening: current properties to target properties</title>
  <desc id="fp-str-desc">
    Left card shows the four properties ZenoDEX currently achieves. Right card shows the
    six additional target properties. An arrow labeled "strengthen" connects them.
  </desc>

  <defs>
    <filter id="fp-str-sh" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0F172A" flood-opacity="0.08" />
    </filter>
    <marker id="fp-str-a" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,1 L10,5 L0,9 Z" fill="#3B82F6" fill-opacity="0.85" />
    </marker>
  </defs>

  <!-- ── Left card: current shape ──────────────── -->
  <g filter="url(#fp-str-sh)">
    <rect x="30" y="30" width="330" height="240" rx="24" fill="#FFFFFF" stroke="#E2E8F0" />
    <text x="60" y="68" font-size="15" font-weight="900" fill="#1E293B"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">Current Shape</text>
    <text x="60" y="88" font-size="11" fill="#475569"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">achieved today</text>

    <!-- Property pills -->
    <rect x="55" y="108" width="280" height="32" rx="12"
      fill="rgba(59,130,246,0.10)" stroke="rgba(59,130,246,0.20)" />
    <text x="72" y="130" font-size="12" font-weight="700" fill="#1E293B"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">Deterministic</text>

    <rect x="55" y="150" width="280" height="32" rx="12"
      fill="rgba(59,130,246,0.10)" stroke="rgba(59,130,246,0.20)" />
    <text x="72" y="172" font-size="12" font-weight="700" fill="#1E293B"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">Replayable</text>

    <rect x="55" y="192" width="280" height="32" rx="12"
      fill="rgba(59,130,246,0.10)" stroke="rgba(59,130,246,0.20)" />
    <text x="72" y="214" font-size="12" font-weight="700" fill="#1E293B"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">Partially proved</text>

    <rect x="55" y="234" width="280" height="32" rx="12"
      fill="rgba(59,130,246,0.10)" stroke="rgba(59,130,246,0.20)" />
    <text x="72" y="256" font-size="12" font-weight="700" fill="#1E293B"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">Strongly guarded</text>
  </g>

  <!-- ── Arrow ─────────────────────────────────── -->
  <path d="M 375,150 C 420,150 420,150 445,150"
    stroke="#3B82F6" stroke-width="3" fill="none"
    marker-end="url(#fp-str-a)" stroke-linecap="round" />
  <text x="412" y="138" font-size="12" font-weight="900" fill="#1E293B" text-anchor="middle"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">strengthen</text>
  <text x="412" y="170" font-size="10" fill="#475569" text-anchor="middle"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">add clauses</text>

  <!-- ── Right card: target shape ──────────────── -->
  <g filter="url(#fp-str-sh)">
    <rect x="470" y="10" width="460" height="280" rx="24" fill="#FFFFFF" stroke="#E2E8F0" />
    <text x="500" y="48" font-size="15" font-weight="900" fill="#1E293B"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">Target Shape</text>
    <text x="500" y="68" font-size="11" fill="#475569"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">engineering goal</text>

    <!-- Inherited properties (muted) -->
    <rect x="495" y="84" width="190" height="28" rx="10"
      fill="rgba(59,130,246,0.06)" stroke="rgba(59,130,246,0.12)" />
    <text x="510" y="104" font-size="11" fill="#475569"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">Deterministic</text>

    <rect x="695" y="84" width="190" height="28" rx="10"
      fill="rgba(59,130,246,0.06)" stroke="rgba(59,130,246,0.12)" />
    <text x="710" y="104" font-size="11" fill="#475569"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">Replayable</text>

    <rect x="495" y="118" width="190" height="28" rx="10"
      fill="rgba(59,130,246,0.06)" stroke="rgba(59,130,246,0.12)" />
    <text x="510" y="138" font-size="11" fill="#475569"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">Partially proved</text>

    <rect x="695" y="118" width="190" height="28" rx="10"
      fill="rgba(59,130,246,0.06)" stroke="rgba(59,130,246,0.12)" />
    <text x="710" y="138" font-size="11" fill="#475569"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">Strongly guarded</text>

    <!-- New target properties (vivid) -->
    <rect x="495" y="160" width="190" height="28" rx="10"
      fill="rgba(249,115,22,0.10)" stroke="rgba(249,115,22,0.22)" />
    <text x="510" y="180" font-size="11" font-weight="700" fill="#1E293B"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">Canonical</text>

    <rect x="695" y="160" width="190" height="28" rx="10"
      fill="rgba(249,115,22,0.10)" stroke="rgba(249,115,22,0.22)" />
    <text x="710" y="180" font-size="11" font-weight="700" fill="#1E293B"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">Exact</text>

    <rect x="495" y="194" width="190" height="28" rx="10"
      fill="rgba(249,115,22,0.10)" stroke="rgba(249,115,22,0.22)" />
    <text x="510" y="214" font-size="11" font-weight="700" fill="#1E293B"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">Value-aware</text>

    <rect x="695" y="194" width="190" height="28" rx="10"
      fill="rgba(249,115,22,0.10)" stroke="rgba(249,115,22,0.22)" />
    <text x="710" y="214" font-size="11" font-weight="700" fill="#1E293B"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">Proof-carrying</text>

    <rect x="495" y="228" width="190" height="28" rx="10"
      fill="rgba(249,115,22,0.10)" stroke="rgba(249,115,22,0.22)" />
    <text x="510" y="248" font-size="11" font-weight="700" fill="#1E293B"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">Cross-layer equivalent</text>

    <rect x="695" y="228" width="190" height="28" rx="10"
      fill="rgba(249,115,22,0.10)" stroke="rgba(249,115,22,0.22)" />
    <text x="710" y="248" font-size="11" font-weight="700" fill="#1E293B"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">Fail-closed</text>

    <text x="500" y="278" font-size="10" fill="#475569"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">
      Each orange clause is a strictly stronger constraint
    </text>
  </g>
</svg>
