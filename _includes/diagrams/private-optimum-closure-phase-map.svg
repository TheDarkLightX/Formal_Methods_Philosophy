<svg
  class="fp-diagram"
  viewBox="0 0 960 560"
  role="img"
  aria-labelledby="fp-pocpm-title fp-pocpm-desc"
  xmlns="http://www.w3.org/2000/svg"
>
  <title id="fp-pocpm-title">Private optimum versus closure phase map</title>
  <desc id="fp-pocpm-desc">
    A phase diagram for Experiment 5. The horizontal axis is low-complement households, the vertical axis is high-complement households.
    The line n_high = n_low marks the closure boundary for the moderate regime. The line 2 n_low = 9 n_high marks the private-optimum boundary.
    The viable moderate band lies between them.
  </desc>

  <defs>
    <filter id="fp-pocpm-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.10" />
    </filter>
  </defs>

  <g filter="url(#fp-pocpm-shadow)">
    <rect x="20" y="10" width="920" height="540" rx="26" fill="#FFFFFF" stroke="#E2E8F0" />
  </g>

  <text x="60" y="46" font-size="15" font-weight="900" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Private optimum versus closure
  </text>
  <text x="60" y="66" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Experiment 5 separates what the platform wants from what keeps the toy economy demand-clearing.
  </text>

  <!-- Chart frame -->
  <rect x="110" y="100" width="500" height="360" rx="18"
    fill="#F8FAFC" stroke="#E2E8F0" />

  <!-- Axes -->
  <line x1="150" y1="420" x2="570" y2="420" stroke="#334155" stroke-width="2.5" />
  <line x1="150" y1="420" x2="150" y2="140" stroke="#334155" stroke-width="2.5" />

  <text x="318" y="452" font-size="12" font-weight="900" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    n_low
  </text>
  <text x="76" y="286" font-size="12" font-weight="900" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif"
    transform="rotate(-90 76 286)">
    n_high
  </text>

  <!-- Regions -->
  <!-- no viable regime -->
  <polygon points="150,140 150,420 430,140"
    fill="rgba(168, 34, 24, 0.10)" />

  <!-- viable moderate band -->
  <polygon points="430,140 570,140 570,295 150,388"
    fill="rgba(34, 197, 94, 0.10)" />

  <!-- conflict region -->
  <polygon points="150,388 570,295 570,420 150,420"
    fill="rgba(245, 158, 11, 0.12)" />

  <!-- Boundaries -->
  <line x1="150" y1="420" x2="430" y2="140" stroke="#A82218" stroke-width="3" stroke-dasharray="8 5" />
  <line x1="150" y1="388" x2="570" y2="295" stroke="#15803D" stroke-width="3" stroke-dasharray="8 5" />

  <text x="448" y="164" font-size="10" fill="#A82218"
    font-family="JetBrains Mono, monospace">
    n_high = n_low
  </text>
  <text x="404" y="280" font-size="10" fill="#15803D"
    font-family="JetBrains Mono, monospace">
    2 * n_low = 9 * n_high
  </text>

  <!-- Region labels -->
  <text x="190" y="215" font-size="13" font-weight="900" fill="#A82218"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    No viable regime
  </text>
  <text x="190" y="236" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    n_high &gt; n_low
  </text>
  <text x="190" y="252" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    even moderate fails closure
  </text>

  <text x="320" y="215" font-size="13" font-weight="900" fill="#15803D"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Viable moderate band
  </text>
  <text x="320" y="236" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    n_high &lt;= n_low
  </text>
  <text x="320" y="252" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    and 2 * n_low &lt;= 9 * n_high
  </text>

  <text x="310" y="360" font-size="13" font-weight="900" fill="#B45309"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Conflict region
  </text>
  <text x="310" y="381" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    moderate clears, but open still has
  </text>
  <text x="310" y="397" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    higher private revenue
  </text>

  <!-- Witnesses -->
  <circle cx="430" cy="364" r="6" fill="#B45309" />
  <text x="442" y="368" font-size="10" fill="#1E293B"
    font-family="JetBrains Mono, monospace">
    (5,1)
  </text>

  <circle cx="374" cy="364" r="6" fill="#15803D" />
  <text x="338" y="347" font-size="10" fill="#1E293B"
    font-family="JetBrains Mono, monospace">
    (4,1)
  </text>

  <circle cx="206" cy="364" r="6" fill="#A82218" />
  <text x="172" y="347" font-size="10" fill="#1E293B"
    font-family="JetBrains Mono, monospace">
    (0,1)
  </text>

  <!-- Legend -->
  <rect x="650" y="132" width="230" height="260" rx="18"
    fill="rgba(15, 23, 42, 0.04)" stroke="rgba(148, 163, 184, 0.22)" />
  <text x="676" y="162" font-size="12" font-weight="900" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Reading rule
  </text>
  <text x="676" y="190" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    The red line is a closure boundary.
  </text>
  <text x="676" y="208" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Above it, even the moderate regime
  </text>
  <text x="676" y="226" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    cannot clear output.
  </text>

  <text x="676" y="258" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    The green line is a private-optimum
  </text>
  <text x="676" y="276" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    boundary. Below it, open still pays
  </text>
  <text x="676" y="294" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    the platform more.
  </text>

  <text x="676" y="326" font-size="11" font-weight="900" fill="#15803D"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    The teaching point:
  </text>
  <text x="676" y="346" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    a privately optimal and demand-clearing
  </text>
  <text x="676" y="364" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    moderate regime exists only inside
  </text>
  <text x="676" y="382" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    the narrow green band.
  </text>
</svg>
