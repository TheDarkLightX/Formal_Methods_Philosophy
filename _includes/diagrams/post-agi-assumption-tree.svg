<svg
  class="fp-diagram"
  viewBox="0 0 960 520"
  role="img"
  aria-labelledby="fp-paat-title fp-paat-desc"
  xmlns="http://www.w3.org/2000/svg"
>
  <title id="fp-paat-title">Assumption tree for the post AGI economics tutorial</title>
  <desc id="fp-paat-desc">
    A root branch for profit-agent economies that splits into five assumption axes:
    capability, control shell, final sink structure, discovery and execution rails,
    and ownership pattern.
  </desc>

  <defs>
    <filter id="fp-paat-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.10" />
    </filter>
  </defs>

  <g filter="url(#fp-paat-shadow)">
    <rect x="20" y="10" width="920" height="500" rx="26" fill="#FFFFFF" stroke="#E2E8F0" />
  </g>

  <text x="60" y="46" font-size="15" font-weight="900" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Assumption tree
  </text>
  <text x="60" y="66" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    The tutorial is not one hidden story about the future. Each theorem lives on one named branch.
  </text>

  <rect x="320" y="92" width="320" height="60" rx="16"
    fill="rgba(59, 130, 246, 0.08)" stroke="rgba(59, 130, 246, 0.24)" />
  <text x="350" y="118" font-size="13" font-weight="900" fill="#2563EB"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Root branch: profit-agent economy
  </text>
  <text x="350" y="138" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    bounded toy models for widespread strong profit agents
  </text>

  <line x1="480" y1="152" x2="480" y2="190" stroke="#94A3B8" stroke-width="2.5" />
  <line x1="120" y1="190" x2="840" y2="190" stroke="#CBD5E1" stroke-width="2.5" />

  <line x1="120" y1="190" x2="120" y2="220" stroke="#CBD5E1" stroke-width="2.5" />
  <line x1="300" y1="190" x2="300" y2="220" stroke="#CBD5E1" stroke-width="2.5" />
  <line x1="480" y1="190" x2="480" y2="220" stroke="#CBD5E1" stroke-width="2.5" />
  <line x1="660" y1="190" x2="660" y2="220" stroke="#CBD5E1" stroke-width="2.5" />
  <line x1="840" y1="190" x2="840" y2="220" stroke="#CBD5E1" stroke-width="2.5" />

  <rect x="40" y="220" width="160" height="150" rx="18"
    fill="rgba(15, 118, 110, 0.08)" stroke="rgba(15, 118, 110, 0.24)" />
  <text x="60" y="246" font-size="12" font-weight="900" fill="#0F766E"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Capability
  </text>
  <text x="60" y="272" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    current AI
  </text>
  <text x="60" y="290" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    AGI-level agent
  </text>

  <rect x="220" y="220" width="160" height="150" rx="18"
    fill="rgba(194, 65, 12, 0.08)" stroke="rgba(194, 65, 12, 0.24)" />
  <text x="240" y="246" font-size="12" font-weight="900" fill="#C2410C"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Control shell
  </text>
  <text x="240" y="272" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    legal-world shell
  </text>
  <text x="240" y="290" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    crypto-native shell
  </text>
  <text x="240" y="308" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    hybrid shell
  </text>

  <rect x="400" y="220" width="160" height="150" rx="18"
    fill="rgba(99, 102, 241, 0.08)" stroke="rgba(99, 102, 241, 0.24)" />
  <text x="420" y="246" font-size="12" font-weight="900" fill="#4F46E5"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Final sink
  </text>
  <text x="420" y="272" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    human-dominant
  </text>
  <text x="420" y="290" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    mixed human-agent
  </text>
  <text x="420" y="308" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    crypto or external
  </text>

  <rect x="580" y="220" width="160" height="150" rx="18"
    fill="rgba(168, 34, 24, 0.08)" stroke="rgba(168, 34, 24, 0.24)" />
  <text x="600" y="246" font-size="12" font-weight="900" fill="#A82218"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Rails
  </text>
  <text x="600" y="272" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    open routing
  </text>
  <text x="600" y="290" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    platform bottleneck
  </text>
  <text x="600" y="308" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    governed protocol
  </text>

  <rect x="760" y="220" width="160" height="150" rx="18"
    fill="rgba(34, 197, 94, 0.08)" stroke="rgba(34, 197, 94, 0.24)" />
  <text x="780" y="246" font-size="12" font-weight="900" fill="#15803D"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Ownership
  </text>
  <text x="780" y="272" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    active principals
  </text>
  <text x="780" y="290" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    passive claimants
  </text>
  <text x="780" y="308" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    mixed ownership
  </text>

  <rect x="80" y="404" width="800" height="68" rx="18"
    fill="rgba(15, 23, 42, 0.04)" stroke="rgba(148, 163, 184, 0.22)" />
  <text x="110" y="432" font-size="12" font-weight="900" fill="#1E293B"
    font-family="JetBrains Mono, monospace">
    on branch B of the assumption tree, theorem T survives
  </text>
  <text x="110" y="454" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Read each law conditionally, not as a claim that one branch already matches the real economy.
  </text>
</svg>
