<svg
  class="fp-diagram"
  viewBox="0 0 960 430"
  role="img"
  aria-labelledby="fp-rll-title fp-rll-desc"
  xmlns="http://www.w3.org/2000/svg"
>
  <title id="fp-rll-title">Requirements discovery ladder</title>
  <desc id="fp-rll-desc">
    A hidden missing requirement set is first compressed by a pair basis into a
    singleton residue, then resolved by two block-separator questions.
  </desc>

  <defs>
    <filter id="fp-rll-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.10" />
    </filter>
    <marker id="fp-rll-arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#3B82F6" fill-opacity="0.9" />
    </marker>
  </defs>

  <g filter="url(#fp-rll-shadow)">
    <rect x="20" y="12" width="920" height="406" rx="26" fill="#FFFFFF" stroke="#E2E8F0" />
  </g>

  <text x="56" y="46" font-size="15" font-weight="900" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Requirements discovery ladder
  </text>
  <text x="56" y="66" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Example with four requirement atoms and a hidden singleton omission.
  </text>

  <path d="M185 195 H250" stroke="#3B82F6" stroke-width="3" marker-end="url(#fp-rll-arrow)" stroke-linecap="round" />
  <path d="M415 195 H480" stroke="#3B82F6" stroke-width="3" marker-end="url(#fp-rll-arrow)" stroke-linecap="round" />
  <path d="M645 195 H710" stroke="#3B82F6" stroke-width="3" marker-end="url(#fp-rll-arrow)" stroke-linecap="round" />

  <g filter="url(#fp-rll-shadow)">
    <rect x="50" y="100" width="136" height="192" rx="18" fill="rgba(239,68,68,0.06)" stroke="rgba(239,68,68,0.20)" />
    <text x="70" y="128" font-size="12" font-weight="900" fill="#A82218"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">Raw family</text>
    <text x="70" y="150" font-size="10" fill="#475569"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">possible missing sets</text>
    <rect x="72" y="168" width="92" height="22" rx="8" fill="rgba(59,130,246,0.08)" stroke="rgba(59,130,246,0.18)" />
    <text x="88" y="183" font-size="10" fill="#1E293B" font-family="IBM Plex Mono, monospace">{r1}</text>
    <rect x="72" y="196" width="92" height="22" rx="8" fill="rgba(59,130,246,0.08)" stroke="rgba(59,130,246,0.18)" />
    <text x="88" y="211" font-size="10" fill="#1E293B" font-family="IBM Plex Mono, monospace">{r2}</text>
    <rect x="72" y="224" width="92" height="22" rx="8" fill="rgba(16,185,129,0.10)" stroke="rgba(16,185,129,0.20)" />
    <text x="88" y="239" font-size="10" fill="#047857" font-family="IBM Plex Mono, monospace">{r3}</text>
    <rect x="72" y="252" width="92" height="22" rx="8" fill="rgba(59,130,246,0.08)" stroke="rgba(59,130,246,0.18)" />
    <text x="88" y="267" font-size="10" fill="#1E293B" font-family="IBM Plex Mono, monospace">{r4}</text>
    <text x="70" y="286" font-size="10" fill="#047857"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">hidden target: {r3}</text>
  </g>

  <g filter="url(#fp-rll-shadow)">
    <rect x="250" y="100" width="166" height="192" rx="18" fill="rgba(14,165,233,0.06)" stroke="rgba(14,165,233,0.20)" />
    <text x="270" y="128" font-size="12" font-weight="900" fill="#0284C7"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">Pair-basis observation</text>
    <text x="270" y="150" font-size="10" fill="#475569"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">observe all pairs S ⊆ M</text>
    <rect x="272" y="172" width="122" height="34" rx="10" fill="rgba(249,115,22,0.10)" stroke="rgba(249,115,22,0.22)" />
    <text x="292" y="193" font-size="11" font-weight="700" fill="#C2410C"
      font-family="IBM Plex Mono, monospace">O_pair({r3}) = ∅</text>
    <text x="270" y="224" font-size="10" fill="#475569"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">No pair is visible, so every singleton still looks possible.</text>
    <rect x="272" y="248" width="122" height="24" rx="8" fill="rgba(59,130,246,0.08)" stroke="rgba(59,130,246,0.18)" />
    <text x="286" y="264" font-size="10" fill="#1E293B" font-family="IBM Plex Mono, monospace">{r1,r2,r3,r4}</text>
  </g>

  <g filter="url(#fp-rll-shadow)">
    <rect x="480" y="100" width="166" height="192" rx="18" fill="rgba(245,158,11,0.10)" stroke="rgba(245,158,11,0.24)" />
    <text x="498" y="128" font-size="12" font-weight="900" fill="#A16207"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">Residual singleton family</text>
    <text x="498" y="150" font-size="10" fill="#475569"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">ambiguity quotient after the pair basis</text>
    <rect x="500" y="174" width="54" height="22" rx="8" fill="rgba(59,130,246,0.08)" stroke="rgba(59,130,246,0.18)" />
    <text x="514" y="189" font-size="10" fill="#1E293B" font-family="IBM Plex Mono, monospace">r1</text>
    <rect x="570" y="174" width="54" height="22" rx="8" fill="rgba(59,130,246,0.08)" stroke="rgba(59,130,246,0.18)" />
    <text x="584" y="189" font-size="10" fill="#1E293B" font-family="IBM Plex Mono, monospace">r2</text>
    <rect x="500" y="210" width="54" height="22" rx="8" fill="rgba(16,185,129,0.10)" stroke="rgba(16,185,129,0.20)" />
    <text x="514" y="225" font-size="10" fill="#047857" font-family="IBM Plex Mono, monospace">r3</text>
    <rect x="570" y="210" width="54" height="22" rx="8" fill="rgba(59,130,246,0.08)" stroke="rgba(59,130,246,0.18)" />
    <text x="584" y="225" font-size="10" fill="#1E293B" font-family="IBM Plex Mono, monospace">r4</text>
    <text x="498" y="260" font-size="10" fill="#A16207"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">Now only a separator question is missing.</text>
  </g>

  <g filter="url(#fp-rll-shadow)">
    <rect x="710" y="84" width="196" height="224" rx="18" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.22)" />
    <text x="730" y="112" font-size="12" font-weight="900" fill="#15803D"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">Block separators</text>
    <text x="730" y="134" font-size="10" fill="#475569"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">Question 1: does M intersect {r1,r2}?</text>
    <rect x="730" y="144" width="152" height="26" rx="8" fill="rgba(168,85,247,0.08)" stroke="rgba(168,85,247,0.22)" />
    <text x="750" y="161" font-size="10" fill="#7C3AED" font-family="IBM Plex Mono, monospace">answer: no  → {r3,r4}</text>
    <text x="730" y="194" font-size="10" fill="#475569"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">Question 2: does M intersect {r3}?</text>
    <rect x="730" y="204" width="152" height="26" rx="8" fill="rgba(34,197,94,0.10)" stroke="rgba(34,197,94,0.22)" />
    <text x="744" y="221" font-size="10" fill="#15803D" font-family="IBM Plex Mono, monospace">answer: yes  → identify r3</text>
    <rect x="734" y="250" width="144" height="34" rx="10" fill="rgba(34,197,94,0.14)" stroke="rgba(34,197,94,0.26)" />
    <text x="754" y="271" font-size="11" font-weight="700" fill="#15803D"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">depth = ceil(log2 4) = 2</text>
  </g>

  <rect x="222" y="336" width="520" height="52" rx="12" fill="rgba(15,23,42,0.05)" stroke="rgba(15,23,42,0.16)" />
  <text x="246" y="360" font-size="12" font-weight="900" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Teaching rule
  </text>
  <text x="246" y="378" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    The pair basis changes geometry first. Block questions only solve the small singleton residue that remains.
  </text>
</svg>
