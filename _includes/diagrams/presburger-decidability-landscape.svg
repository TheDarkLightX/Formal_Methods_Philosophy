<svg
  class="fp-diagram"
  viewBox="0 0 960 420"
  role="img"
  aria-labelledby="fp-pdl-title fp-pdl-desc"
  xmlns="http://www.w3.org/2000/svg"
>
  <title id="fp-pdl-title">The decidability landscape</title>
  <desc id="fp-pdl-desc">
    Presburger arithmetic sits on the decidable side of the boundary. Adding multiplication
    crosses into the undecidable region where Gödel's incompleteness theorem applies.
  </desc>

  <defs>
    <filter id="fp-pdl-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.10" />
    </filter>
  </defs>

  <g filter="url(#fp-pdl-shadow)">
    <rect x="60" y="30" width="840" height="360" rx="26" fill="#FFFFFF" stroke="#E2E8F0" />

    <text x="96" y="72" font-size="16" font-weight="900" fill="#1E293B" font-family="Atkinson Hyperlegible, system-ui, sans-serif">
      The decidability landscape
    </text>
    <text x="96" y="96" font-size="12" fill="#475569" font-family="Atkinson Hyperlegible, system-ui, sans-serif">
      Presburger arithmetic sits on the decidable side. Adding multiplication crosses the boundary.
    </text>

    <!-- DECIDABLE region (left) -->
    <rect x="90" y="118" width="360" height="244" rx="20" fill="rgba(34, 197, 94, 0.07)" stroke="rgba(34, 197, 94, 0.22)" />
    <text x="270" y="146" font-size="13" font-weight="900" fill="#166534" font-family="Atkinson Hyperlegible, system-ui, sans-serif" text-anchor="middle" letter-spacing="2">DECIDABLE</text>

    <!-- Propositional logic -->
    <rect x="112" y="162" width="155" height="56" rx="14" fill="#FFFFFF" stroke="rgba(34, 197, 94, 0.25)" />
    <text x="189" y="186" font-size="12" font-weight="700" fill="#1E293B" font-family="Atkinson Hyperlegible, system-ui, sans-serif" text-anchor="middle">Propositional logic</text>
    <text x="189" y="204" font-size="10" fill="#475569" font-family="Atkinson Hyperlegible, system-ui, sans-serif" text-anchor="middle">finite truth tables</text>

    <!-- Regular languages -->
    <rect x="280" y="162" width="155" height="56" rx="14" fill="#FFFFFF" stroke="rgba(34, 197, 94, 0.25)" />
    <text x="357" y="186" font-size="12" font-weight="700" fill="#1E293B" font-family="Atkinson Hyperlegible, system-ui, sans-serif" text-anchor="middle">Regular languages</text>
    <text x="357" y="204" font-size="10" fill="#475569" font-family="Atkinson Hyperlegible, system-ui, sans-serif" text-anchor="middle">finite automata</text>

    <!-- PRESBURGER — the star -->
    <rect x="130" y="234" width="300" height="110" rx="18" fill="rgba(34, 197, 94, 0.12)" stroke="rgba(34, 197, 94, 0.45)" stroke-width="2" />
    <text x="280" y="267" font-size="16" font-weight="900" fill="#166534" font-family="Atkinson Hyperlegible, system-ui, sans-serif" text-anchor="middle">Presburger arithmetic</text>
    <text x="280" y="291" font-size="12" fill="#1E293B" font-family="'SF Mono', 'Fira Code', monospace" text-anchor="middle">(ℕ, 0, S, +)</text>
    <text x="280" y="314" font-size="11" fill="#475569" font-family="Atkinson Hyperlegible, system-ui, sans-serif" text-anchor="middle">quantifier elimination ∙ always terminates</text>
    <text x="280" y="332" font-size="11" fill="#475569" font-family="Atkinson Hyperlegible, system-ui, sans-serif" text-anchor="middle">complete ∙ every sentence is decidable</text>

    <!-- BOUNDARY -->
    <line x1="480" y1="130" x2="480" y2="350" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 4" />
    <rect x="462" y="195" width="36" height="36" rx="18" fill="rgba(239, 68, 68, 0.12)" stroke="rgba(239, 68, 68, 0.3)" />
    <text x="480" y="219" font-size="16" font-weight="900" fill="#991B1B" font-family="Atkinson Hyperlegible, system-ui, sans-serif" text-anchor="middle">×</text>
    <text x="480" y="260" font-size="10" fill="#94A3B8" font-family="Atkinson Hyperlegible, system-ui, sans-serif" text-anchor="middle" transform="rotate(-90 480 260)">multiplication crosses this line</text>

    <!-- UNDECIDABLE region (right) -->
    <rect x="510" y="118" width="360" height="244" rx="20" fill="rgba(239, 68, 68, 0.05)" stroke="rgba(239, 68, 68, 0.18)" />
    <text x="690" y="146" font-size="13" font-weight="900" fill="#991B1B" font-family="Atkinson Hyperlegible, system-ui, sans-serif" text-anchor="middle" letter-spacing="2">UNDECIDABLE</text>

    <!-- Peano arithmetic — prominent -->
    <rect x="535" y="162" width="310" height="90" rx="18" fill="rgba(239, 68, 68, 0.08)" stroke="rgba(239, 68, 68, 0.28)" stroke-width="2" />
    <text x="690" y="192" font-size="15" font-weight="900" fill="#991B1B" font-family="Atkinson Hyperlegible, system-ui, sans-serif" text-anchor="middle">Peano arithmetic</text>
    <text x="690" y="214" font-size="12" fill="#1E293B" font-family="'SF Mono', 'Fira Code', monospace" text-anchor="middle">(ℕ, 0, S, +, ×)</text>
    <text x="690" y="236" font-size="11" fill="#475569" font-family="Atkinson Hyperlegible, system-ui, sans-serif" text-anchor="middle">Gödel's incompleteness ∙ true but unprovable sentences</text>

    <!-- Set theory -->
    <rect x="535" y="268" width="148" height="56" rx="14" fill="#FFFFFF" stroke="rgba(239, 68, 68, 0.20)" />
    <text x="609" y="292" font-size="12" font-weight="700" fill="#1E293B" font-family="Atkinson Hyperlegible, system-ui, sans-serif" text-anchor="middle">Set theory (ZFC)</text>
    <text x="609" y="310" font-size="10" fill="#475569" font-family="Atkinson Hyperlegible, system-ui, sans-serif" text-anchor="middle">encodes all of math</text>

    <!-- Halting problem -->
    <rect x="697" y="268" width="148" height="56" rx="14" fill="#FFFFFF" stroke="rgba(239, 68, 68, 0.20)" />
    <text x="771" y="292" font-size="12" font-weight="700" fill="#1E293B" font-family="Atkinson Hyperlegible, system-ui, sans-serif" text-anchor="middle">Halting problem</text>
    <text x="771" y="310" font-size="10" fill="#475569" font-family="Atkinson Hyperlegible, system-ui, sans-serif" text-anchor="middle">no algorithm exists</text>
  </g>
</svg>
