<svg
  class="fp-diagram"
  viewBox="0 0 960 420"
  role="img"
  aria-labelledby="fp-lec-title fp-lec-desc"
  xmlns="http://www.w3.org/2000/svg"
>
  <title id="fp-lec-title">Low-edge concentration map</title>
  <desc id="fp-lec-desc">
    The corrected low-edge graph branch can be read as a two-stage process.
    First starify each connected component by moving pendant subtrees toward a
    hub. Then balance the resulting star sizes. The endpoint is the balanced
    star forest.
  </desc>

  <defs>
    <filter id="fp-lec-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.10" />
    </filter>
    <marker id="fp-lec-arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#3B82F6" fill-opacity="0.9" />
    </marker>
  </defs>

  <g filter="url(#fp-lec-shadow)">
    <rect x="20" y="12" width="920" height="396" rx="26" fill="#FFFFFF" stroke="#E2E8F0" />
  </g>

  <text x="56" y="46" font-size="15" font-weight="900" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Low-edge concentration map
  </text>
  <text x="56" y="66" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    On the checked low-edge branch, the best loop does not jump straight to a formula. It first concentrates shape, then balances size.
  </text>

  <g filter="url(#fp-lec-shadow)">
    <rect x="56" y="118" width="190" height="170" rx="18" fill="rgba(14,165,233,0.08)" stroke="rgba(14,165,233,0.22)" />
    <text x="78" y="146" font-size="12" font-weight="900" fill="#0284C7"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">Positive low-edge forest</text>
    <text x="78" y="170" font-size="10" fill="#475569"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">arbitrary component shapes</text>
    <text x="78" y="186" font-size="10" fill="#475569"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">same total vertices</text>
    <text x="78" y="202" font-size="10" fill="#475569"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">same edge budget</text>

    <circle cx="106" cy="238" r="8" fill="#2563EB" />
    <circle cx="80" cy="262" r="8" fill="#2563EB" />
    <circle cx="106" cy="286" r="8" fill="#2563EB" />
    <circle cx="132" cy="262" r="8" fill="#2563EB" />
    <circle cx="188" cy="250" r="8" fill="#0F766E" />
    <circle cx="162" cy="274" r="8" fill="#0F766E" />
    <circle cx="214" cy="274" r="8" fill="#0F766E" />
    <line x1="106" y1="238" x2="80" y2="262" stroke="#2563EB" stroke-width="3" />
    <line x1="106" y1="238" x2="132" y2="262" stroke="#2563EB" stroke-width="3" />
    <line x1="132" y1="262" x2="106" y2="286" stroke="#2563EB" stroke-width="3" />
    <line x1="188" y1="250" x2="162" y2="274" stroke="#0F766E" stroke-width="3" />
    <line x1="188" y1="250" x2="214" y2="274" stroke="#0F766E" stroke-width="3" />
  </g>

  <path d="M248 202 H350" stroke="#3B82F6" stroke-width="3" marker-end="url(#fp-lec-arrow)" stroke-linecap="round" />
  <text x="264" y="186" font-size="11" fill="#2563EB"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">Stage 1: starify components</text>
  <text x="264" y="202" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">pendant subtree to hub</text>

  <g filter="url(#fp-lec-shadow)">
    <rect x="352" y="118" width="240" height="170" rx="18" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.22)" />
    <text x="374" y="146" font-size="12" font-weight="900" fill="#15803D"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">Starified forest</text>
    <text x="374" y="170" font-size="10" fill="#475569"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">component shape is concentrated</text>
    <text x="374" y="186" font-size="10" fill="#475569"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">size profile may still be uneven</text>

    <circle cx="412" cy="246" r="8" fill="#15803D" />
    <circle cx="386" cy="270" r="8" fill="#15803D" />
    <circle cx="412" cy="294" r="8" fill="#15803D" />
    <circle cx="438" cy="270" r="8" fill="#15803D" />
    <circle cx="514" cy="238" r="8" fill="#15803D" />
    <circle cx="488" cy="262" r="8" fill="#15803D" />
    <circle cx="514" cy="286" r="8" fill="#15803D" />
    <circle cx="540" cy="262" r="8" fill="#15803D" />
    <circle cx="566" cy="238" r="8" fill="#15803D" />
    <line x1="412" y1="246" x2="386" y2="270" stroke="#15803D" stroke-width="3" />
    <line x1="412" y1="246" x2="438" y2="270" stroke="#15803D" stroke-width="3" />
    <line x1="412" y1="246" x2="412" y2="294" stroke="#15803D" stroke-width="3" />
    <line x1="514" y1="238" x2="488" y2="262" stroke="#15803D" stroke-width="3" />
    <line x1="514" y1="238" x2="514" y2="286" stroke="#15803D" stroke-width="3" />
    <line x1="514" y1="238" x2="540" y2="262" stroke="#15803D" stroke-width="3" />
    <line x1="514" y1="238" x2="566" y2="238" stroke="#15803D" stroke-width="3" />
  </g>

  <path d="M594 202 H696" stroke="#3B82F6" stroke-width="3" marker-end="url(#fp-lec-arrow)" stroke-linecap="round" />
  <text x="612" y="186" font-size="11" fill="#2563EB"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">Stage 2: balance sizes</text>
  <text x="612" y="202" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">pairwise smoothing on star sizes</text>

  <g filter="url(#fp-lec-shadow)">
    <rect x="698" y="118" width="186" height="170" rx="18" fill="rgba(168,85,247,0.08)" stroke="rgba(168,85,247,0.22)" />
    <text x="720" y="146" font-size="12" font-weight="900" fill="#7C3AED"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">Balanced star forest</text>
    <text x="720" y="170" font-size="10" fill="#475569"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">shape concentrated</text>
    <text x="720" y="186" font-size="10" fill="#475569"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">size profile balanced</text>
    <text x="720" y="202" font-size="10" fill="#475569"
      font-family="IBM Plex Mono, monospace">F_bal(n, m)</text>

    <circle cx="748" cy="248" r="8" fill="#7C3AED" />
    <circle cx="722" cy="272" r="8" fill="#7C3AED" />
    <circle cx="748" cy="296" r="8" fill="#7C3AED" />
    <circle cx="774" cy="272" r="8" fill="#7C3AED" />
    <circle cx="840" cy="260" r="8" fill="#7C3AED" />
    <circle cx="814" cy="284" r="8" fill="#7C3AED" />
    <circle cx="866" cy="284" r="8" fill="#7C3AED" />
    <line x1="748" y1="248" x2="722" y2="272" stroke="#7C3AED" stroke-width="3" />
    <line x1="748" y1="248" x2="774" y2="272" stroke="#7C3AED" stroke-width="3" />
    <line x1="748" y1="248" x2="748" y2="296" stroke="#7C3AED" stroke-width="3" />
    <line x1="840" y1="260" x2="814" y2="284" stroke="#7C3AED" stroke-width="3" />
    <line x1="840" y1="260" x2="866" y2="284" stroke="#7C3AED" stroke-width="3" />
  </g>

  <rect x="170" y="334" width="620" height="42" rx="12" fill="rgba(15,23,42,0.05)" stroke="rgba(15,23,42,0.16)" />
  <text x="196" y="360" font-size="11" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Teaching rule: the low-edge branch is no longer only a frontier fit. It is a two-stage concentration process.
  </text>
</svg>
