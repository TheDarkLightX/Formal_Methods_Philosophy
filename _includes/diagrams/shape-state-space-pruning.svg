<svg
  class="fp-diagram"
  viewBox="0 0 960 400"
  role="img"
  aria-labelledby="fp-ssp-title fp-ssp-desc"
  xmlns="http://www.w3.org/2000/svg"
>
  <title id="fp-ssp-title">State-space pruning: a stronger shape excludes disaster states</title>
  <desc id="fp-ssp-desc">
    Nested ovals show Q (full state space), Reach(M_old), and Reach(M_new) as
    concentric subsets. A red blob D (disaster states) overlaps the old reachable
    set but not the new one, proving Reach(M_new) intersect D is empty.
  </desc>

  <defs>
    <filter id="fp-ssp-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.10" />
    </filter>

    <!-- Hatching pattern for the overlap region -->
    <pattern id="fp-ssp-hatch" patternUnits="userSpaceOnUse" width="8" height="8"
      patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#EF4444" stroke-width="2.5" stroke-opacity="0.40" />
    </pattern>

    <!-- Clip to constrain the hatch fill to the overlap of D and Reach(M_old) -->
    <clipPath id="fp-ssp-clip-old">
      <ellipse cx="380" cy="210" rx="230" ry="130" />
    </clipPath>
  </defs>

  <!-- ── White card with shadow ──────────────── -->
  <g filter="url(#fp-ssp-shadow)">
    <rect x="30" y="16" width="900" height="368" rx="26" fill="#FFFFFF" stroke="#E2E8F0" />
  </g>

  <!-- ── Q: full state space ─────────────────── -->
  <ellipse cx="420" cy="210" rx="340" ry="160"
    fill="rgba(15, 23, 42, 0.04)" stroke="rgba(15, 23, 42, 0.18)" stroke-width="2" />
  <text x="108" y="80" font-size="14" font-weight="900" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">Q (full state space)</text>

  <!-- ── Reach(M_old): old reachable set ─────── -->
  <ellipse cx="380" cy="210" rx="230" ry="130"
    fill="rgba(59, 130, 246, 0.08)" stroke="rgba(59, 130, 246, 0.35)" stroke-width="2" />
  <text x="200" y="120" font-size="13" font-weight="800" fill="#2563EB"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">Reach(M_old)</text>

  <!-- ── Reach(M_new): new reachable set ─────── -->
  <ellipse cx="340" cy="210" rx="145" ry="90"
    fill="rgba(59, 130, 246, 0.15)" stroke="#3B82F6" stroke-width="2.5" />
  <text x="280" y="198" font-size="13" font-weight="900" fill="#1D4ED8"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">Reach(M_new)</text>
  <text x="284" y="218" font-size="11" fill="#3B82F6"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">stronger shape</text>

  <!-- ── D: disaster states (irregular blob) ─── -->
  <path
    d="M570 145 C610 125, 665 130, 690 160 C720 195, 720 240, 695 270
       C670 298, 625 310, 590 295 C555 278, 535 240, 540 200
       C543 170, 555 155, 570 145 Z"
    fill="rgba(239, 68, 68, 0.12)" stroke="#EF4444" stroke-width="2" />
  <text x="608" y="222" font-size="14" font-weight="900" fill="#DC2626"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">D</text>
  <text x="600" y="242" font-size="11" fill="#EF4444"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">disaster</text>
  <text x="605" y="258" font-size="11" fill="#EF4444"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">states</text>

  <!-- ── Hatched overlap: D intersect Reach(M_old) ── -->
  <path
    d="M570 145 C610 125, 665 130, 690 160 C720 195, 720 240, 695 270
       C670 298, 625 310, 590 295 C555 278, 535 240, 540 200
       C543 170, 555 155, 570 145 Z"
    fill="url(#fp-ssp-hatch)" clip-path="url(#fp-ssp-clip-old)" />

  <!-- Label for hatched overlap -->
  <line x1="575" y1="168" x2="680" y2="100" stroke="#B91C1C" stroke-width="1.5"
    stroke-dasharray="4 3" />
  <text x="684" y="96" font-size="11" fill="#B91C1C"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">still reachable</text>
  <text x="684" y="112" font-size="11" fill="#B91C1C"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">under old shape</text>

  <!-- ── Annotation: safety proof ────────────── -->
  <g>
    <rect x="630" y="330" width="268" height="42" rx="14"
      fill="rgba(34, 197, 94, 0.10)" stroke="rgba(34, 197, 94, 0.35)" stroke-width="1.5" />

    <!-- Checkmark -->
    <path d="M648 351 L656 359 L668 343" stroke="#16A34A" stroke-width="3"
      fill="none" stroke-linecap="round" stroke-linejoin="round" />

    <text x="678" y="357" font-size="13" font-weight="900" fill="#15803D"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">Reach(M_new) &#x2229; D = &#x2205;</text>
  </g>

  <!-- ── Subset arrows / annotations ─────────── -->
  <text x="238" y="330" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Reach(M_new) &#x2286; Reach(M_old) &#x2286; Q
  </text>
  <text x="238" y="350" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Stronger shape &#x21D2; smaller reachable set &#x21D2; disaster avoided
  </text>
</svg>
