<svg
  class="fp-diagram"
  viewBox="0 0 960 460"
  role="img"
  aria-labelledby="fp-kidney-title fp-kidney-desc"
  xmlns="http://www.w3.org/2000/svg"
>
  <title id="fp-kidney-title">Kidney follow-up decision tree</title>
  <desc id="fp-kidney-desc">
    A three-level decision tree for kidney lab follow-up. Level 1 checks
    completeness and freshness. Level 2 checks for red flags. Level 3 checks
    whether eGFR is below 60. Three action classes: human_review (fail-closed),
    repeat_lab, and watch.
  </desc>

  <defs>
    <filter id="fp-kidney-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.10" />
    </filter>
    <marker
      id="fp-kidney-arrow"
      markerWidth="12"
      markerHeight="12"
      refX="10"
      refY="6"
      orient="auto"
    >
      <path d="M0,0 L12,6 L0,12 Z" fill="#3B82F6" fill-opacity="0.9" />
    </marker>
  </defs>

  <g filter="url(#fp-kidney-shadow)">
    <rect x="40" y="20" width="880" height="420" rx="26" fill="#FFFFFF" stroke="#E2E8F0" />

    <!-- Title and subtitle -->
    <text
      x="90"
      y="62"
      font-size="16"
      font-weight="900"
      fill="#1E293B"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif"
    >
      Kidney follow-up decision tree
    </text>
    <text
      x="90"
      y="82"
      font-size="12"
      fill="#475569"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif"
    >
      three action classes, fail-closed
    </text>

    <!-- ============ Decision nodes ============ -->

    <!-- Level 1: "Complete and fresh?" centred at x=480, y=120 -->
    <rect
      x="390"
      y="100"
      width="180"
      height="40"
      rx="12"
      fill="#FFFFFF"
      stroke="rgba(59, 130, 246, 0.22)"
      stroke-width="2"
    />
    <text
      x="480"
      y="125"
      font-size="13"
      font-weight="700"
      fill="#1E293B"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif"
      text-anchor="middle"
    >
      Complete and fresh?
    </text>

    <!-- Level 2: "Red flag?" centred at x=620, y=230 -->
    <rect
      x="530"
      y="210"
      width="180"
      height="40"
      rx="12"
      fill="#FFFFFF"
      stroke="rgba(59, 130, 246, 0.22)"
      stroke-width="2"
    />
    <text
      x="620"
      y="235"
      font-size="13"
      font-weight="700"
      fill="#1E293B"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif"
      text-anchor="middle"
    >
      Red flag?
    </text>

    <!-- Level 3: "eGFR below 60?" centred at x=720, y=330 -->
    <rect
      x="630"
      y="310"
      width="180"
      height="40"
      rx="12"
      fill="#FFFFFF"
      stroke="rgba(59, 130, 246, 0.22)"
      stroke-width="2"
    />
    <text
      x="720"
      y="335"
      font-size="13"
      font-weight="700"
      fill="#1E293B"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif"
      text-anchor="middle"
    >
      eGFR below 60?
    </text>

    <!-- ============ Leaf nodes ============ -->

    <!-- human_review (left branch from Level 1, x=240, y=210) -->
    <rect
      x="175"
      y="212"
      width="130"
      height="36"
      rx="16"
      fill="rgba(239, 68, 68, 0.10)"
      stroke="rgba(239, 68, 68, 0.22)"
      stroke-width="2"
    />
    <text
      x="240"
      y="235"
      font-size="12"
      font-weight="700"
      fill="#DC2626"
      font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace"
      text-anchor="middle"
    >
      human_review
    </text>

    <!-- human_review (left branch from Level 2, x=500, y=330) -->
    <rect
      x="435"
      y="312"
      width="130"
      height="36"
      rx="16"
      fill="rgba(239, 68, 68, 0.10)"
      stroke="rgba(239, 68, 68, 0.22)"
      stroke-width="2"
    />
    <text
      x="500"
      y="335"
      font-size="12"
      font-weight="700"
      fill="#DC2626"
      font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace"
      text-anchor="middle"
    >
      human_review
    </text>

    <!-- repeat_lab (left branch from Level 3, x=620, y=400) -->
    <rect
      x="555"
      y="392"
      width="130"
      height="36"
      rx="16"
      fill="rgba(245, 158, 11, 0.10)"
      stroke="rgba(245, 158, 11, 0.22)"
      stroke-width="2"
    />
    <text
      x="620"
      y="415"
      font-size="12"
      font-weight="700"
      fill="#D97706"
      font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace"
      text-anchor="middle"
    >
      repeat_lab
    </text>

    <!-- watch (right branch from Level 3, x=820, y=400) -->
    <rect
      x="755"
      y="392"
      width="130"
      height="36"
      rx="16"
      fill="rgba(34, 197, 94, 0.10)"
      stroke="rgba(34, 197, 94, 0.22)"
      stroke-width="2"
    />
    <text
      x="820"
      y="415"
      font-size="12"
      font-weight="700"
      fill="#16A34A"
      font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace"
      text-anchor="middle"
    >
      watch
    </text>

    <!-- ============ Arrows ============ -->

    <!-- Level 1 → human_review (left, "No") -->
    <path
      d="M390 120 C340 120, 290 170, 270 212"
      fill="none"
      stroke="#3B82F6"
      stroke-width="3"
      marker-end="url(#fp-kidney-arrow)"
      stroke-linecap="round"
    />
    <text
      x="310"
      y="158"
      font-size="12"
      fill="#475569"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif"
    >
      No
    </text>

    <!-- Level 1 → Level 2 (right, "Yes") -->
    <path
      d="M570 120 C590 120, 610 170, 620 210"
      fill="none"
      stroke="#3B82F6"
      stroke-width="3"
      marker-end="url(#fp-kidney-arrow)"
      stroke-linecap="round"
    />
    <text
      x="600"
      y="168"
      font-size="12"
      fill="#475569"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif"
    >
      Yes
    </text>

    <!-- Level 2 → human_review (left, "Yes") -->
    <path
      d="M530 230 C520 230, 510 270, 505 312"
      fill="none"
      stroke="#3B82F6"
      stroke-width="3"
      marker-end="url(#fp-kidney-arrow)"
      stroke-linecap="round"
    />
    <text
      x="505"
      y="275"
      font-size="12"
      fill="#475569"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif"
    >
      Yes
    </text>

    <!-- Level 2 → Level 3 (right, "No") -->
    <path
      d="M710 230 C730 230, 730 270, 725 310"
      fill="none"
      stroke="#3B82F6"
      stroke-width="3"
      marker-end="url(#fp-kidney-arrow)"
      stroke-linecap="round"
    />
    <text
      x="735"
      y="275"
      font-size="12"
      fill="#475569"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif"
    >
      No
    </text>

    <!-- Level 3 → repeat_lab (left, "Yes") -->
    <path
      d="M680 350 C665 365, 645 380, 640 392"
      fill="none"
      stroke="#3B82F6"
      stroke-width="3"
      marker-end="url(#fp-kidney-arrow)"
      stroke-linecap="round"
    />
    <text
      x="640"
      y="378"
      font-size="12"
      fill="#475569"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif"
    >
      Yes
    </text>

    <!-- Level 3 → watch (right, "No") -->
    <path
      d="M760 350 C775 365, 795 380, 800 392"
      fill="none"
      stroke="#3B82F6"
      stroke-width="3"
      marker-end="url(#fp-kidney-arrow)"
      stroke-linecap="round"
    />
    <text
      x="790"
      y="378"
      font-size="12"
      fill="#475569"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif"
    >
      No
    </text>
  </g>
</svg>
