<svg
  class="fp-diagram"
  viewBox="0 0 960 520"
  role="img"
  aria-labelledby="fp-cantor-tree-title fp-cantor-tree-desc"
  xmlns="http://www.w3.org/2000/svg"
>
  <title id="fp-cantor-tree-title">Cantor-space binary tree with highlighted cylinders</title>
  <desc id="fp-cantor-tree-desc">
    A finite binary tree prefix picture for Cantor space. The entire left subtree under prefix 0 and the subtree under prefix 10 are highlighted, illustrating the clopen set [0] union [10].
  </desc>

  <defs>
    <filter id="fp-cantor-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.10" />
    </filter>
    <marker id="fp-cantor-arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#475569" fill-opacity="0.85" />
    </marker>
  </defs>

  <g filter="url(#fp-cantor-shadow)">
    <rect x="40" y="40" width="880" height="440" rx="26" fill="#FFFFFF" stroke="#E2E8F0" />

    <text
      x="90"
      y="92"
      font-size="16"
      font-weight="900"
      fill="#1E293B"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif"
    >
      Clopen sets as finite unions of cylinders
    </text>
    <text
      x="90"
      y="116"
      font-size="12"
      fill="#475569"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif"
    >
      Example: [0] ∪ [10] is finite syntax describing an infinite region of Cantor space.
    </text>

    <!-- Highlight regions -->
    <path d="M195 195 L315 195 L390 285 L390 410 L120 410 L120 285 Z"
      fill="rgba(59,130,246,0.10)" stroke="rgba(59,130,246,0.18)" stroke-width="2" />
    <path d="M470 195 L540 195 L610 285 L610 410 L390 410 L390 285 Z"
      fill="rgba(249,115,22,0.12)" stroke="rgba(249,115,22,0.20)" stroke-width="2" />

    <!-- Edges -->
    <g stroke="#94A3B8" stroke-width="3" stroke-linecap="round">
      <line x1="430" y1="160" x2="255" y2="235" />
      <line x1="430" y1="160" x2="605" y2="235" />
      <line x1="255" y1="235" x2="165" y2="320" />
      <line x1="255" y1="235" x2="345" y2="320" />
      <line x1="605" y1="235" x2="515" y2="320" />
      <line x1="605" y1="235" x2="695" y2="320" />
      <line x1="165" y1="320" x2="120" y2="395" />
      <line x1="165" y1="320" x2="210" y2="395" />
      <line x1="345" y1="320" x2="300" y2="395" />
      <line x1="345" y1="320" x2="390" y2="395" />
      <line x1="515" y1="320" x2="470" y2="395" />
      <line x1="515" y1="320" x2="560" y2="395" />
      <line x1="695" y1="320" x2="650" y2="395" />
      <line x1="695" y1="320" x2="740" y2="395" />
    </g>

    <!-- Nodes -->
    <g font-family="JetBrains Mono, ui-monospace, monospace" font-size="12" fill="#1E293B" text-anchor="middle">
      <circle cx="430" cy="160" r="23" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2.5" />
      <text x="430" y="164">ε</text>

      <circle cx="255" cy="235" r="23" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2.5" />
      <text x="255" y="239">0</text>
      <circle cx="605" cy="235" r="23" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2.5" />
      <text x="605" y="239">1</text>

      <circle cx="165" cy="320" r="21" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2.5" />
      <text x="165" y="324">00</text>
      <circle cx="345" cy="320" r="21" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2.5" />
      <text x="345" y="324">01</text>
      <circle cx="515" cy="320" r="21" fill="#FFEDD5" stroke="#F97316" stroke-width="2.5" />
      <text x="515" y="324">10</text>
      <circle cx="695" cy="320" r="21" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2.5" />
      <text x="695" y="324">11</text>

      <circle cx="120" cy="395" r="18" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2" />
      <text x="120" y="399">000</text>
      <circle cx="210" cy="395" r="18" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2" />
      <text x="210" y="399">001</text>
      <circle cx="300" cy="395" r="18" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2" />
      <text x="300" y="399">010</text>
      <circle cx="390" cy="395" r="18" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2" />
      <text x="390" y="399">011</text>
      <circle cx="470" cy="395" r="18" fill="#FFEDD5" stroke="#F97316" stroke-width="2" />
      <text x="470" y="399">100</text>
      <circle cx="560" cy="395" r="18" fill="#FFEDD5" stroke="#F97316" stroke-width="2" />
      <text x="560" y="399">101</text>
      <circle cx="650" cy="395" r="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2" />
      <text x="650" y="399">110</text>
      <circle cx="740" cy="395" r="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2" />
      <text x="740" y="399">111</text>
    </g>

    <!-- Edge labels -->
    <g font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" fill="#64748B" text-anchor="middle">
      <text x="336" y="188">0</text>
      <text x="522" y="188">1</text>
      <text x="205" y="286">0</text>
      <text x="296" y="286">1</text>
      <text x="565" y="286">0</text>
      <text x="655" y="286">1</text>
    </g>

    <!-- Legend cards -->
    <rect x="760" y="148" width="118" height="70" rx="16" fill="rgba(59,130,246,0.08)" stroke="rgba(59,130,246,0.18)" />
    <text x="778" y="176" font-size="12" font-weight="800" fill="#1E293B" font-family="Atkinson Hyperlegible, system-ui, sans-serif">[0]</text>
    <text x="778" y="196" font-size="11" fill="#475569" font-family="Atkinson Hyperlegible, system-ui, sans-serif">all paths with</text>
    <text x="778" y="212" font-size="11" fill="#475569" font-family="Atkinson Hyperlegible, system-ui, sans-serif">first bit 0</text>

    <rect x="760" y="236" width="118" height="70" rx="16" fill="rgba(249,115,22,0.10)" stroke="rgba(249,115,22,0.18)" />
    <text x="778" y="264" font-size="12" font-weight="800" fill="#1E293B" font-family="Atkinson Hyperlegible, system-ui, sans-serif">[10]</text>
    <text x="778" y="284" font-size="11" fill="#475569" font-family="Atkinson Hyperlegible, system-ui, sans-serif">all paths with</text>
    <text x="778" y="300" font-size="11" fill="#475569" font-family="Atkinson Hyperlegible, system-ui, sans-serif">prefix 10</text>

    <!-- Bottom callout -->
    <path d="M700 356 C740 350, 764 336, 785 315" fill="none" stroke="#64748B" stroke-width="2.5" marker-end="url(#fp-cantor-arrow)" stroke-linecap="round" />
    <text x="742" y="376" font-size="11" fill="#475569" font-family="Atkinson Hyperlegible, system-ui, sans-serif">finite union</text>
    <text x="731" y="392" font-size="11" fill="#475569" font-family="Atkinson Hyperlegible, system-ui, sans-serif">of cylinders</text>
  </g>
</svg>
