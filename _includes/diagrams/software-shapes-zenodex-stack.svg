<svg
  class="fp-diagram"
  viewBox="0 0 960 340"
  role="img"
  aria-labelledby="fp-zdx-title fp-zdx-desc"
  xmlns="http://www.w3.org/2000/svg"
>
  <title id="fp-zdx-title">ZenoDEX assurance stack</title>
  <desc id="fp-zdx-desc">
    Four layers of assurance stacked vertically: Tau boundary guards at the top,
    TLA+ temporal shadows, Lean algebraic proofs, and runtime integer code at the bottom.
    A bracket on the right labels the whole stack as Shape(ZenoDEX).
  </desc>

  <defs>
    <filter id="fp-zdx-sh" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.07" />
    </filter>
  </defs>

  <!-- ── Heading ───────────────────────────────── -->
  <text x="400" y="28" font-size="13" font-weight="900" fill="#475569" text-anchor="middle"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif" letter-spacing="0.08em">
    ZENODEX ASSURANCE STACK
  </text>

  <!-- ── Layer 1: Tau guards ───────────────────── -->
  <g filter="url(#fp-zdx-sh)">
    <rect x="40" y="48" width="740" height="58" rx="16"
      fill="rgba(59,130,246,0.08)" stroke="rgba(59,130,246,0.22)" />
    <text x="68" y="72" font-size="14" font-weight="900" fill="#1E293B"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">Tau boundary guards</text>
    <text x="68" y="92" font-size="11" fill="#475569"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">
      Decide which proposed transitions are admissible — yes/no before anything executes
    </text>
    <rect x="680" y="60" width="84" height="24" rx="10"
      fill="rgba(59,130,246,0.12)" stroke="rgba(59,130,246,0.20)" />
    <text x="722" y="77" font-size="10" font-weight="700" fill="#3B82F6" text-anchor="middle"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">TAU_CONTRACT</text>
  </g>

  <!-- ── Layer 2: TLA+ shadows ─────────────────── -->
  <g filter="url(#fp-zdx-sh)">
    <rect x="40" y="118" width="740" height="58" rx="16"
      fill="rgba(59,130,246,0.06)" stroke="rgba(59,130,246,0.18)" />
    <text x="68" y="142" font-size="14" font-weight="900" fill="#1E293B"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">TLA+ temporal shadows</text>
    <text x="68" y="162" font-size="11" fill="#475569"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">
      Describe allowed state evolution over time — catch stale nonces, ordering violations
    </text>
    <rect x="680" y="130" width="84" height="24" rx="10"
      fill="rgba(59,130,246,0.10)" stroke="rgba(59,130,246,0.18)" />
    <text x="722" y="147" font-size="10" font-weight="700" fill="#3B82F6" text-anchor="middle"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">TLA_SHADOW</text>
  </g>

  <!-- ── Layer 3: Lean proofs ──────────────────── -->
  <g filter="url(#fp-zdx-sh)">
    <rect x="40" y="188" width="740" height="58" rx="16"
      fill="rgba(249,115,22,0.06)" stroke="rgba(249,115,22,0.18)" />
    <text x="68" y="212" font-size="14" font-weight="900" fill="#1E293B"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">Lean algebraic proofs</text>
    <text x="68" y="232" font-size="11" fill="#475569"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">
      Establish compositionality, canonicality, conservation — mathematical guarantees
    </text>
    <rect x="680" y="200" width="84" height="24" rx="10"
      fill="rgba(249,115,22,0.08)" stroke="rgba(249,115,22,0.16)" />
    <text x="722" y="217" font-size="10" font-weight="700" fill="#F97316" text-anchor="middle"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">PROVED</text>
  </g>

  <!-- ── Layer 4: Runtime code ─────────────────── -->
  <g filter="url(#fp-zdx-sh)">
    <rect x="40" y="258" width="740" height="58" rx="16"
      fill="rgba(249,115,22,0.04)" stroke="rgba(249,115,22,0.14)" />
    <text x="68" y="282" font-size="14" font-weight="900" fill="#1E293B"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">Runtime integer code</text>
    <text x="68" y="302" font-size="11" fill="#475569"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">
      Compute exact integer transitions that must match the guarded and proved surface
    </text>
    <rect x="680" y="270" width="84" height="24" rx="10"
      fill="rgba(249,115,22,0.06)" stroke="rgba(249,115,22,0.12)" />
    <text x="722" y="287" font-size="10" font-weight="700" fill="#F97316" text-anchor="middle"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">IMPLEMENTED</text>
  </g>

  <!-- ── Right bracket ─────────────────────────── -->
  <path d="M 808,52 C 830,52 830,52 830,80
           L 830,150 C 830,162 840,162 840,162
           C 840,162 830,162 830,174
           L 830,244 C 830,312 808,312 808,312"
    stroke="#1E293B" stroke-width="1.5" fill="none" stroke-linecap="round" />
  <text x="870" y="178" font-size="12" font-weight="900" fill="#1E293B" text-anchor="middle"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">Shape</text>
  <text x="870" y="196" font-size="12" font-weight="900" fill="#1E293B" text-anchor="middle"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">(ZenoDEX)</text>
</svg>
