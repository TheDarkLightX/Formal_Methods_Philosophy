<svg
  class="fp-diagram"
  viewBox="0 0 960 470"
  role="img"
  aria-labelledby="fp-srp-title fp-srp-desc"
  xmlns="http://www.w3.org/2000/svg"
>
  <title id="fp-srp-title">Software repair compression ladder</title>
  <desc id="fp-srp-desc">
    Monolithic patch search is replaced by fiber decomposition, certificate-
    carrying verification, and finally a compiled repair language with shared
    templates and motif-routed direct construction.
  </desc>

  <defs>
    <filter id="fp-srp-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.10" />
    </filter>
    <marker id="fp-srp-arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#3B82F6" fill-opacity="0.9" />
    </marker>
    <marker id="fp-srp-arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#15803D" fill-opacity="0.9" />
    </marker>
  </defs>

  <!-- Card -->
  <g filter="url(#fp-srp-shadow)">
    <rect x="20" y="10" width="920" height="450" rx="26" fill="#FFFFFF" stroke="#E2E8F0" />
  </g>

  <!-- Title -->
  <text x="60" y="48" font-size="15" font-weight="900" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Software repair compression ladder
  </text>
  <text x="60" y="66" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Each step changes what the loop searches for, shrinking the cost at each stage.
  </text>

  <!-- ===== Left: The Problem ===== -->
  <rect x="50" y="88" width="200" height="180" rx="18"
    fill="rgba(168, 34, 24, 0.06)" stroke="rgba(168, 34, 24, 0.20)" />
  <text x="70" y="112" font-size="13" font-weight="900" fill="#A82218"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Monolithic search
  </text>
  <text x="70" y="132" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    3 edit sites: guard, bounds,
  </text>
  <text x="70" y="148" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    transform
  </text>

  <!-- Cost badge -->
  <rect x="70" y="164" width="100" height="28" rx="8"
    fill="rgba(168, 34, 24, 0.12)" stroke="rgba(168, 34, 24, 0.30)" />
  <text x="82" y="183" font-size="12" font-weight="900" fill="#A82218"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">cost &#x2248; 37</text>

  <text x="70" y="215" font-size="10" fill="#64748B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    try every patch combination
  </text>
  <text x="70" y="230" font-size="10" fill="#64748B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    hope one passes
  </text>
  <text x="70" y="255" font-size="10" font-weight="700" fill="#A82218"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Level 48 baseline
  </text>

  <!-- Arrow: problem -> decompose -->
  <path d="M255 175 H288" stroke="#3B82F6" stroke-width="3"
    marker-end="url(#fp-srp-arrow)" stroke-linecap="round" />

  <!-- ===== Middle: Structural Decomposition ===== -->
  <rect x="300" y="88" width="260" height="180" rx="18"
    fill="rgba(59, 130, 246, 0.06)" stroke="rgba(59, 130, 246, 0.20)" />
  <text x="320" y="112" font-size="13" font-weight="900" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Structural decomposition
  </text>

  <!-- Sub-step 1: Fibers -->
  <rect x="315" y="124" width="230" height="34" rx="8"
    fill="rgba(59, 130, 246, 0.10)" stroke="rgba(59, 130, 246, 0.22)" />
  <text x="328" y="146" font-size="11" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    &#x2460; Dependency-aware fibers
  </text>

  <!-- Sub-step 2: Certificates -->
  <rect x="315" y="164" width="230" height="34" rx="8"
    fill="rgba(59, 130, 246, 0.10)" stroke="rgba(59, 130, 246, 0.22)" />
  <text x="328" y="186" font-size="11" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    &#x2461; Certificate-carrying repair
  </text>

  <!-- Sub-step 3: Decoders -->
  <rect x="315" y="204" width="230" height="34" rx="8"
    fill="rgba(59, 130, 246, 0.10)" stroke="rgba(59, 130, 246, 0.22)" />
  <text x="328" y="226" font-size="11" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    &#x2462; Witness-to-patch decoder
  </text>

  <!-- Cost badges for middle -->
  <rect x="350" y="246" width="70" height="20" rx="6"
    fill="rgba(59, 130, 246, 0.12)" stroke="rgba(59, 130, 246, 0.30)" />
  <text x="358" y="261" font-size="10" font-weight="900" fill="#3B82F6"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">9 &#x2192; 3</text>

  <!-- Arrow: decompose -> compile -->
  <path d="M565 175 H598" stroke="#15803D" stroke-width="3"
    marker-end="url(#fp-srp-arrow-green)" stroke-linecap="round" />

  <!-- ===== Right: Compiled Repair Language ===== -->
  <rect x="610" y="88" width="290" height="180" rx="18"
    fill="rgba(34, 197, 94, 0.06)" stroke="rgba(34, 197, 94, 0.22)" stroke-width="2" />
  <text x="630" y="112" font-size="13" font-weight="900" fill="#15803D"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Compiled repair language
  </text>

  <!-- Sub-step 4: Templates -->
  <rect x="625" y="124" width="260" height="34" rx="8"
    fill="rgba(34, 197, 94, 0.10)" stroke="rgba(34, 197, 94, 0.22)" />
  <text x="638" y="146" font-size="11" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    &#x2463; Shared repair-language templates
  </text>

  <!-- Sub-step 5: Macros -->
  <rect x="625" y="164" width="260" height="34" rx="8"
    fill="rgba(34, 197, 94, 0.10)" stroke="rgba(34, 197, 94, 0.22)" />
  <text x="638" y="186" font-size="11" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    &#x2464; MATCH + SINGLE macro basis
  </text>

  <!-- Sub-step 6: Direct compiler -->
  <rect x="625" y="204" width="260" height="34" rx="8"
    fill="rgba(34, 197, 94, 0.15)" stroke="rgba(34, 197, 94, 0.35)" stroke-width="1.5" />
  <text x="638" y="226" font-size="11" font-weight="700" fill="#15803D"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    &#x2465; Motif-routed direct compiler
  </text>

  <!-- Cost badge for right -->
  <rect x="660" y="246" width="70" height="20" rx="6"
    fill="rgba(34, 197, 94, 0.15)" stroke="rgba(34, 197, 94, 0.35)" />
  <text x="668" y="261" font-size="10" font-weight="900" fill="#15803D"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">2 &#x2192; 1</text>

  <!-- ===== Bottom: Key lesson ===== -->
  <line x1="50" y1="290" x2="900" y2="290" stroke="#E2E8F0" stroke-width="1" />

  <text x="60" y="318" font-size="13" font-weight="900" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    What changes at each step
  </text>

  <!-- Lesson blocks -->
  <rect x="60" y="332" width="265" height="48" rx="10"
    fill="rgba(168, 34, 24, 0.06)" stroke="rgba(168, 34, 24, 0.15)" />
  <text x="78" y="352" font-size="11" font-weight="700" fill="#A82218"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Search for one patch
  </text>
  <text x="78" y="370" font-size="10" fill="#64748B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">cost &#x2248; 37  (monolithic)</text>

  <rect x="345" y="332" width="265" height="48" rx="10"
    fill="rgba(59, 130, 246, 0.06)" stroke="rgba(59, 130, 246, 0.15)" />
  <text x="363" y="352" font-size="11" font-weight="700" fill="#3B82F6"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Search for a witness language
  </text>
  <text x="363" y="370" font-size="10" fill="#64748B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">cost 9 &#x2192; 3  (fibers &#x2192; certificates)</text>

  <rect x="630" y="332" width="265" height="48" rx="10"
    fill="rgba(34, 197, 94, 0.06)" stroke="rgba(34, 197, 94, 0.15)" />
  <text x="648" y="352" font-size="11" font-weight="700" fill="#15803D"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Compile a repair grammar
  </text>
  <text x="648" y="370" font-size="10" fill="#64748B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">cost 2 &#x2192; 1  (templates &#x2192; direct)</text>

  <!-- Bottom annotation -->
  <rect x="250" y="400" width="460" height="32" rx="10"
    fill="rgba(15, 118, 110, 0.06)" stroke="rgba(15, 118, 110, 0.15)" />
  <text x="280" y="421" font-size="12" font-weight="900" fill="#0F766E"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    The frontier moved when the object of search changed.
  </text>
</svg>
