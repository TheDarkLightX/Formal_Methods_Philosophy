<svg
  class="fp-diagram"
  viewBox="0 0 960 520"
  role="img"
  aria-labelledby="fp-boc-title fp-boc-desc"
  xmlns="http://www.w3.org/2000/svg"
>
  <title id="fp-boc-title">Plain CEGIS vs Bidirectional Obligation Carving</title>
  <desc id="fp-boc-desc">
    Plain CEGIS only shrinks the candidate set. BOC shrinks both the candidate set
    and the uncovered obligation set, giving a two-sided progress metric.
  </desc>

  <defs>
    <filter id="fp-boc-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.10" />
    </filter>
    <marker id="fp-boc-arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#3B82F6" fill-opacity="0.9" />
    </marker>
    <marker id="fp-boc-arrow-red" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#A82218" fill-opacity="0.8" />
    </marker>
    <marker id="fp-boc-arrow-green" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#15803D" fill-opacity="0.8" />
    </marker>
  </defs>

  <!-- Card -->
  <g filter="url(#fp-boc-shadow)">
    <rect x="20" y="10" width="920" height="500" rx="26" fill="#FFFFFF" stroke="#E2E8F0" />
  </g>

  <!-- ========== LEFT HALF: Plain CEGIS ========== -->
  <text x="130" y="50" font-size="15" font-weight="900" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Plain CEGIS
  </text>
  <text x="130" y="68" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    one-sided: only candidates shrink
  </text>

  <!-- Time step boxes for Plain CEGIS -->
  <!-- t=0 -->
  <rect x="60" y="88" width="160" height="120" rx="14"
    fill="rgba(15, 118, 110, 0.08)" stroke="rgba(15, 118, 110, 0.22)" />
  <text x="75" y="108" font-size="10" font-weight="700" fill="#0F766E"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">t = 0</text>
  <!-- Big C -->
  <rect x="75" y="118" width="130" height="40" rx="10"
    fill="rgba(15, 118, 110, 0.15)" stroke="rgba(15, 118, 110, 0.30)" />
  <text x="105" y="143" font-size="12" font-weight="700" fill="#0F766E"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">C&#x2080;  (large)</text>
  <!-- Full Y -->
  <rect x="75" y="168" width="130" height="28" rx="8"
    fill="rgba(160, 74, 8, 0.10)" stroke="rgba(160, 74, 8, 0.22)" />
  <text x="85" y="187" font-size="11" fill="#A04A08"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">Y  (unchanged)</text>

  <!-- Arrow t=0 -> t=1 -->
  <path d="M225 148 H260" stroke="#A82218" stroke-width="2.5"
    marker-end="url(#fp-boc-arrow-red)" stroke-linecap="round" />
  <text x="226" y="140" font-size="9" fill="#A82218"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">cut</text>

  <!-- t=1 -->
  <rect x="270" y="88" width="160" height="120" rx="14"
    fill="rgba(15, 118, 110, 0.08)" stroke="rgba(15, 118, 110, 0.22)" />
  <text x="285" y="108" font-size="10" font-weight="700" fill="#0F766E"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">t = 1</text>
  <!-- Smaller C -->
  <rect x="285" y="118" width="95" height="40" rx="10"
    fill="rgba(15, 118, 110, 0.15)" stroke="rgba(15, 118, 110, 0.30)" />
  <text x="295" y="143" font-size="12" font-weight="700" fill="#0F766E"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">C&#x2081;  &#x2282; C&#x2080;</text>
  <!-- Full Y still -->
  <rect x="285" y="168" width="130" height="28" rx="8"
    fill="rgba(160, 74, 8, 0.10)" stroke="rgba(160, 74, 8, 0.22)" />
  <text x="295" y="187" font-size="11" fill="#A04A08"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">Y  (unchanged)</text>

  <!-- Annotation for plain CEGIS -->
  <rect x="80" y="224" width="330" height="38" rx="10"
    fill="rgba(148, 163, 184, 0.08)" stroke="rgba(148, 163, 184, 0.18)" />
  <text x="100" y="248" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Progress: only  |C&#x209C;|  shrinks.  Obligations stay full.
  </text>

  <!-- ========== RIGHT HALF: BOC ========== -->
  <text x="580" y="50" font-size="15" font-weight="900" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Bidirectional Obligation Carving
  </text>
  <text x="580" y="68" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    two-sided: candidates and obligations both shrink
  </text>

  <!-- t=0 BOC -->
  <rect x="530" y="88" width="175" height="120" rx="14"
    fill="rgba(15, 118, 110, 0.08)" stroke="rgba(15, 118, 110, 0.22)" />
  <text x="545" y="108" font-size="10" font-weight="700" fill="#0F766E"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">t = 0</text>
  <!-- Big C -->
  <rect x="545" y="118" width="145" height="34" rx="10"
    fill="rgba(15, 118, 110, 0.15)" stroke="rgba(15, 118, 110, 0.30)" />
  <text x="570" y="140" font-size="12" font-weight="700" fill="#0F766E"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">C&#x2080;  (large)</text>
  <!-- Big U -->
  <rect x="545" y="160" width="145" height="34" rx="10"
    fill="rgba(168, 34, 24, 0.10)" stroke="rgba(168, 34, 24, 0.22)" />
  <text x="570" y="182" font-size="12" font-weight="700" fill="#A82218"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">U&#x2080;  (large)</text>

  <!-- Arrow t=0 -> t=1 -->
  <path d="M710 148 H745" stroke="#3B82F6" stroke-width="2.5"
    marker-end="url(#fp-boc-arrow)" stroke-linecap="round" />
  <text x="710" y="140" font-size="9" fill="#3B82F6"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">dual cut</text>

  <!-- t=1 BOC -->
  <rect x="755" y="88" width="175" height="120" rx="14"
    fill="rgba(15, 118, 110, 0.08)" stroke="rgba(15, 118, 110, 0.22)" />
  <text x="770" y="108" font-size="10" font-weight="700" fill="#0F766E"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">t = 1</text>
  <!-- Smaller C -->
  <rect x="770" y="118" width="100" height="34" rx="10"
    fill="rgba(15, 118, 110, 0.15)" stroke="rgba(15, 118, 110, 0.30)" />
  <text x="780" y="140" font-size="11" font-weight="700" fill="#0F766E"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">C&#x2081; &#x2282; C&#x2080;</text>
  <!-- Smaller U -->
  <rect x="770" y="160" width="100" height="34" rx="10"
    fill="rgba(168, 34, 24, 0.10)" stroke="rgba(168, 34, 24, 0.22)" />
  <text x="780" y="182" font-size="11" font-weight="700" fill="#A82218"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">U&#x2081; &#x2282; U&#x2080;</text>

  <!-- Annotation for BOC -->
  <rect x="548" y="224" width="365" height="38" rx="10"
    fill="rgba(34, 197, 94, 0.08)" stroke="rgba(34, 197, 94, 0.20)" />
  <text x="560" y="248" font-size="11" fill="#15803D"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Progress:  |C&#x209C;| + |U&#x209C;|  strictly decreases each step.
  </text>

  <!-- ========== BOTTOM: Two move types ========== -->
  <!-- Divider -->
  <line x1="60" y1="280" x2="900" y2="280" stroke="#E2E8F0" stroke-width="1" />

  <text x="60" y="310" font-size="13" font-weight="900" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Two kinds of progress in BOC
  </text>

  <!-- Move 1: Counterexample cut -->
  <rect x="60" y="330" width="400" height="90" rx="16"
    fill="rgba(168, 34, 24, 0.06)" stroke="rgba(168, 34, 24, 0.18)" />
  <text x="80" y="355" font-size="13" font-weight="900" fill="#A82218"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Counterexample cut
  </text>
  <text x="80" y="375" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Find y with &#xAC;Spec(x,y).  Remove all candidates that also fail y.
  </text>
  <text x="80" y="395" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    C&#x209C;&#x208A;&#x2081; := C&#x209C; &#x2229; &#x03A6;({y})      U&#x209C;&#x208A;&#x2081; := U&#x209C;
  </text>
  <text x="80" y="410" font-size="10" font-weight="700" fill="#A82218"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    &#x2193; candidates shrink
  </text>

  <!-- Move 2: Region certificate -->
  <rect x="500" y="330" width="410" height="90" rx="16"
    fill="rgba(34, 197, 94, 0.06)" stroke="rgba(34, 197, 94, 0.18)" />
  <text x="520" y="355" font-size="13" font-weight="900" fill="#15803D"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Region certificate
  </text>
  <text x="520" y="375" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Prove region R &#x2286; U already safe for all surviving candidates.
  </text>
  <text x="520" y="395" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    C&#x209C;&#x208A;&#x2081; := C&#x209C;      U&#x209C;&#x208A;&#x2081; := U&#x209C; &#x2216; R
  </text>
  <text x="520" y="410" font-size="10" font-weight="700" fill="#15803D"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    &#x2193; obligations shrink
  </text>

  <!-- Bottom formula bar -->
  <rect x="200" y="442" width="560" height="34" rx="12"
    fill="rgba(59, 130, 246, 0.07)" stroke="rgba(59, 130, 246, 0.20)" />
  <text x="225" y="465" font-size="13" font-weight="900" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Main invariant:  D&#x209C; &#x2286; &#x03A8;(C&#x209C;)      GoodSet &#x2286; C&#x209C;
  </text>
</svg>
