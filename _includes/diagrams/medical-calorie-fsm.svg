<svg
  class="fp-diagram"
  viewBox="0 0 960 300"
  role="img"
  aria-labelledby="fp-calorie-title fp-calorie-desc"
  xmlns="http://www.w3.org/2000/svg"
>
  <title id="fp-calorie-title">Calorie calculator finite-state machine</title>
  <desc id="fp-calorie-desc">
    Six states in a linear chain: Start, ReadWeight, ReadBF, Compute, Display, Done.
    ReadWeight has an error branch for out-of-range input. Bounded arithmetic, no loops.
  </desc>

  <defs>
    <filter id="fp-calorie-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.10" />
    </filter>
    <marker
      id="fp-calorie-arrow"
      markerWidth="12"
      markerHeight="12"
      refX="10"
      refY="6"
      orient="auto"
    >
      <path d="M0,0 L12,6 L0,12 Z" fill="#3B82F6" fill-opacity="0.9" />
    </marker>
  </defs>

  <g filter="url(#fp-calorie-shadow)">
    <rect x="20" y="20" width="920" height="260" rx="26" fill="#FFFFFF" stroke="#E2E8F0" />

    <!-- Title -->
    <text
      x="60"
      y="55"
      font-size="16"
      font-weight="900"
      fill="#1E293B"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif"
    >
      Calorie calculator FSM
    </text>
    <text
      x="60"
      y="74"
      font-size="12"
      fill="#475569"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif"
    >
      bounded arithmetic, no loops
    </text>

    <!-- ============ States ============ -->

    <!-- Start (small filled circle) -->
    <circle cx="60" cy="160" r="10" fill="#3B82F6" stroke="#3B82F6" stroke-width="2" />

    <!-- ReadWeight -->
    <circle cx="180" cy="160" r="40" fill="rgba(59, 130, 246, 0.10)" stroke="rgba(59, 130, 246, 0.22)" stroke-width="2" />
    <text
      x="180"
      y="164"
      font-size="14"
      font-weight="900"
      fill="#1E293B"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif"
      text-anchor="middle"
    >
      ReadWeight
    </text>

    <!-- ReadBF -->
    <circle cx="320" cy="160" r="40" fill="rgba(59, 130, 246, 0.10)" stroke="rgba(59, 130, 246, 0.22)" stroke-width="2" />
    <text
      x="320"
      y="164"
      font-size="14"
      font-weight="900"
      fill="#1E293B"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif"
      text-anchor="middle"
    >
      ReadBF
    </text>

    <!-- Compute -->
    <circle cx="460" cy="160" r="40" fill="rgba(59, 130, 246, 0.10)" stroke="rgba(59, 130, 246, 0.22)" stroke-width="2" />
    <text
      x="460"
      y="164"
      font-size="14"
      font-weight="900"
      fill="#1E293B"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif"
      text-anchor="middle"
    >
      Compute
    </text>

    <!-- Display -->
    <circle cx="600" cy="160" r="40" fill="rgba(59, 130, 246, 0.10)" stroke="rgba(59, 130, 246, 0.22)" stroke-width="2" />
    <text
      x="600"
      y="164"
      font-size="14"
      font-weight="900"
      fill="#1E293B"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif"
      text-anchor="middle"
    >
      Display
    </text>

    <!-- Done (double circle) -->
    <circle cx="740" cy="160" r="40" fill="rgba(59, 130, 246, 0.10)" stroke="rgba(59, 130, 246, 0.22)" stroke-width="2" />
    <circle cx="740" cy="160" r="33" fill="none" stroke="rgba(59, 130, 246, 0.22)" stroke-width="2" />
    <text
      x="740"
      y="164"
      font-size="14"
      font-weight="900"
      fill="#1E293B"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif"
      text-anchor="middle"
    >
      Done
    </text>

    <!-- Error state (red-tinted, below ReadWeight) -->
    <circle cx="180" cy="260" r="30" fill="rgba(239, 68, 68, 0.10)" stroke="rgba(239, 68, 68, 0.22)" stroke-width="2" />
    <text
      x="180"
      y="264"
      font-size="14"
      font-weight="900"
      fill="#1E293B"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif"
      text-anchor="middle"
    >
      Error
    </text>

    <!-- ============ Arrows ============ -->

    <!-- Start -> ReadWeight -->
    <line
      x1="70"
      y1="160"
      x2="136"
      y2="160"
      stroke="#3B82F6"
      stroke-width="4"
      marker-end="url(#fp-calorie-arrow)"
      stroke-linecap="round"
    />
    <text
      x="103"
      y="150"
      text-anchor="middle"
      font-size="12"
      fill="#475569"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif"
    >
      begin
    </text>

    <!-- ReadWeight -> ReadBF -->
    <line
      x1="220"
      y1="160"
      x2="276"
      y2="160"
      stroke="#3B82F6"
      stroke-width="4"
      marker-end="url(#fp-calorie-arrow)"
      stroke-linecap="round"
    />
    <text
      x="248"
      y="150"
      text-anchor="middle"
      font-size="12"
      fill="#475569"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif"
    >
      w valid
    </text>

    <!-- ReadBF -> Compute -->
    <line
      x1="360"
      y1="160"
      x2="416"
      y2="160"
      stroke="#3B82F6"
      stroke-width="4"
      marker-end="url(#fp-calorie-arrow)"
      stroke-linecap="round"
    />
    <text
      x="388"
      y="150"
      text-anchor="middle"
      font-size="12"
      fill="#475569"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif"
    >
      b valid
    </text>

    <!-- Compute -> Display -->
    <line
      x1="500"
      y1="160"
      x2="556"
      y2="160"
      stroke="#3B82F6"
      stroke-width="4"
      marker-end="url(#fp-calorie-arrow)"
      stroke-linecap="round"
    />
    <text
      x="528"
      y="150"
      text-anchor="middle"
      font-size="12"
      fill="#475569"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif"
    >
      result
    </text>

    <!-- Display -> Done -->
    <line
      x1="640"
      y1="160"
      x2="696"
      y2="160"
      stroke="#3B82F6"
      stroke-width="4"
      marker-end="url(#fp-calorie-arrow)"
      stroke-linecap="round"
    />
    <text
      x="668"
      y="150"
      text-anchor="middle"
      font-size="12"
      fill="#475569"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif"
    >
      emit
    </text>

    <!-- ReadWeight -> Error (dashed, downward) -->
    <line
      x1="180"
      y1="200"
      x2="180"
      y2="226"
      stroke="rgba(15, 23, 42, 0.45)"
      stroke-width="3"
      stroke-dasharray="8,6"
      marker-end="url(#fp-calorie-arrow)"
      stroke-linecap="round"
    />
    <text
      x="228"
      y="222"
      text-anchor="middle"
      font-size="12"
      fill="#475569"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif"
    >
      out of range
    </text>
  </g>
</svg>
