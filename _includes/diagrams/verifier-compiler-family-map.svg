<svg
  class="fp-diagram"
  viewBox="0 0 960 560"
  role="img"
  aria-labelledby="fp-vcfm-title fp-vcfm-desc"
  xmlns="http://www.w3.org/2000/svg"
>
  <title id="fp-vcfm-title">Where verifier-compilers fit among nearby loop families</title>
  <desc id="fp-vcfm-desc">
    A teaching diagram that compares plain CEGIS, verifier-compilers, witness-language loops,
    certificate or abstraction loops, primitive-invention loops, and meta-loop synthesis.
    Each step changes what the loop is trying to compress or learn.
  </desc>

  <defs>
    <filter id="fp-vcfm-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.10" />
    </filter>
    <marker id="fp-vcfm-arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#3B82F6" fill-opacity="0.9" />
    </marker>
  </defs>

  <g filter="url(#fp-vcfm-shadow)">
    <rect x="20" y="10" width="920" height="540" rx="26" fill="#FFFFFF" stroke="#E2E8F0" />
  </g>

  <text x="60" y="46" font-size="15" font-weight="900" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Nearby loop families
  </text>
  <text x="60" y="66" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    The key comparison is not “more search” versus “less search”. It is what object the loop is trying to compress.
  </text>

  <rect x="100" y="92" width="760" height="40" rx="14"
    fill="rgba(59, 130, 246, 0.07)" stroke="rgba(59, 130, 246, 0.20)" />
  <text x="132" y="117" font-size="13" font-weight="900" fill="#1E293B"
    font-family="JetBrains Mono, monospace">
    exists x  for all y  Spec(x,y)
  </text>
  <text x="430" y="117" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    same quantified goal, different object of search
  </text>

  <path d="M170 180 H790" stroke="#CBD5E1" stroke-width="3" stroke-dasharray="6 6" />

  <!-- 1 -->
  <rect x="50" y="150" width="130" height="170" rx="18"
    fill="rgba(148, 163, 184, 0.08)" stroke="rgba(148, 163, 184, 0.28)" />
  <text x="68" y="176" font-size="10" font-weight="700" fill="#64748B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    BASELINE
  </text>
  <text x="68" y="198" font-size="13" font-weight="900" fill="#334155"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Plain CEGIS
  </text>
  <text x="68" y="222" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    keeps:
  </text>
  <text x="68" y="238" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    current candidate
  </text>
  <text x="68" y="258" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    learns:
  </text>
  <text x="68" y="274" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    one counterexample
  </text>
  <text x="68" y="298" font-size="9" font-weight="700" fill="#64748B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    use when refutation is enough
  </text>

  <path d="M182 235 H208" stroke="#3B82F6" stroke-width="2.5"
    marker-end="url(#fp-vcfm-arrow)" stroke-linecap="round" />

  <!-- 2 -->
  <rect x="210" y="138" width="150" height="194" rx="18"
    fill="rgba(59, 130, 246, 0.08)" stroke="rgba(59, 130, 246, 0.32)" stroke-width="2" />
  <text x="228" y="164" font-size="10" font-weight="700" fill="#2563EB"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    PART XI FOCUS
  </text>
  <text x="228" y="186" font-size="13" font-weight="900" fill="#2563EB"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Verifier-compiler
  </text>
  <text x="228" y="202" font-size="13" font-weight="900" fill="#2563EB"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    loops
  </text>
  <text x="228" y="226" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    compress:
  </text>
  <text x="228" y="242" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    verifier labels
  </text>
  <text x="228" y="258" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    into quotient + repair
  </text>
  <text x="228" y="282" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    output:
  </text>
  <text x="228" y="298" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    reusable fail-closed
  </text>
  <text x="228" y="314" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    symbolic front-end
  </text>

  <path d="M362 235 H388" stroke="#3B82F6" stroke-width="2.5"
    marker-end="url(#fp-vcfm-arrow)" stroke-linecap="round" />

  <!-- 3 -->
  <rect x="390" y="150" width="145" height="170" rx="18"
    fill="rgba(15, 118, 110, 0.08)" stroke="rgba(15, 118, 110, 0.28)" />
  <text x="408" y="176" font-size="10" font-weight="700" fill="#0F766E"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    RICHER LOCAL OBJECT
  </text>
  <text x="408" y="198" font-size="13" font-weight="900" fill="#0F766E"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Witness-language
  </text>
  <text x="408" y="214" font-size="13" font-weight="900" fill="#0F766E"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    loops
  </text>
  <text x="408" y="238" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    search for:
  </text>
  <text x="408" y="254" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    smallest exact local
  </text>
  <text x="408" y="270" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    witness contract
  </text>
  <text x="408" y="294" font-size="9" font-weight="700" fill="#0F766E"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    ladder, residual-default,
  </text>
  <text x="408" y="308" font-size="9" font-weight="700" fill="#0F766E"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    ordered classifier
  </text>

  <path d="M537 235 H563" stroke="#3B82F6" stroke-width="2.5"
    marker-end="url(#fp-vcfm-arrow)" stroke-linecap="round" />

  <!-- 4 -->
  <rect x="565" y="150" width="150" height="170" rx="18"
    fill="rgba(194, 65, 12, 0.08)" stroke="rgba(194, 65, 12, 0.28)" />
  <text x="583" y="176" font-size="10" font-weight="700" fill="#C2410C"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    SHRINK THE UNIVERSAL SIDE
  </text>
  <text x="583" y="198" font-size="13" font-weight="900" fill="#C2410C"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Certificate or
  </text>
  <text x="583" y="214" font-size="13" font-weight="900" fill="#C2410C"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    abstraction loops
  </text>
  <text x="583" y="238" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    compress:
  </text>
  <text x="583" y="254" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    certificates or
  </text>
  <text x="583" y="270" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    obligation quotients
  </text>
  <text x="583" y="294" font-size="9" font-weight="700" fill="#C2410C"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    strongest when the
  </text>
  <text x="583" y="308" font-size="9" font-weight="700" fill="#C2410C"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    quantifier pattern collapses
  </text>

  <path d="M717 235 H743" stroke="#3B82F6" stroke-width="2.5"
    marker-end="url(#fp-vcfm-arrow)" stroke-linecap="round" />

  <!-- 5 -->
  <rect x="745" y="150" width="165" height="170" rx="18"
    fill="rgba(34, 197, 94, 0.08)" stroke="rgba(34, 197, 94, 0.28)" />
  <text x="763" y="176" font-size="10" font-weight="700" fill="#15803D"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    CHANGE THE LANGUAGE ITSELF
  </text>
  <text x="763" y="198" font-size="13" font-weight="900" fill="#15803D"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Primitive invention
  </text>
  <text x="763" y="214" font-size="13" font-weight="900" fill="#15803D"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    and meta-loops
  </text>
  <text x="763" y="238" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    add:
  </text>
  <text x="763" y="254" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    new exact concepts
  </text>
  <text x="763" y="270" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    or new loop policies
  </text>
  <text x="763" y="294" font-size="9" font-weight="700" fill="#15803D"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    use when the fixed
  </text>
  <text x="763" y="308" font-size="9" font-weight="700" fill="#15803D"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    language saturates
  </text>

  <line x1="50" y1="350" x2="910" y2="350" stroke="#E2E8F0" stroke-width="1" />

  <text x="60" y="382" font-size="13" font-weight="900" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Practical reading rule
  </text>

  <rect x="60" y="398" width="850" height="116" rx="18"
    fill="rgba(15, 23, 42, 0.04)" stroke="rgba(148, 163, 184, 0.20)" />
  <text x="84" y="425" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Start with verifier-compilers when repeated verifier labels look compressible and a fail-closed symbolic front-end would already buy leverage.
  </text>
  <text x="84" y="447" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Move upward when one global compiler stops being the right object: local witness contracts differ by region, residual structure becomes necessary, certificates collapse the universal side, or the fixed concept vocabulary itself starts blocking progress.
  </text>
  <text x="84" y="477" font-size="12" font-weight="900" fill="#2563EB"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Part XI claim: verifier-compilers are a strong child of a larger witness-language program, not the final umbrella.
  </text>
</svg>
