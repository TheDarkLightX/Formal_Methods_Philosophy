<svg
  class="fp-diagram"
  viewBox="0 0 960 370"
  role="img"
  aria-labelledby="fp-mp-title fp-mp-desc"
  xmlns="http://www.w3.org/2000/svg"
>
  <title id="fp-mp-title">Mechanism progression: price, selection, composition</title>
  <desc id="fp-mp-desc">
    Three stages of mechanism design. Uniform price fails in the symmetric
    case. Heterogeneous prices select types. Price plus quota achieves both
    selection and allocation.
  </desc>

  <defs>
    <filter id="fp-mp-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.10" />
    </filter>
    <marker id="fp-mp-arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#3B82F6" fill-opacity="0.8" />
    </marker>
  </defs>

  <!-- Card -->
  <g filter="url(#fp-mp-shadow)">
    <rect x="20" y="10" width="920" height="350" rx="26" fill="#FFFFFF" stroke="#E2E8F0" />
  </g>

  <!-- Title -->
  <text x="60" y="46" font-size="15" font-weight="900" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Mechanism design progression  (Experiments 8&#x2013;10)
  </text>
  <text x="60" y="64" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Price solves selection.  Quota solves allocation.  Composition solves both.
  </text>

  <!-- ===== Panel 1: Uniform price (homogeneous) ===== -->
  <rect x="45" y="80" width="275" height="250" rx="16"
    fill="rgba(168, 34, 24, 0.06)" stroke="rgba(168, 34, 24, 0.20)" />
  <text x="65" y="104" font-size="12" font-weight="900" fill="#A82218"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">Exp 8: Uniform price</text>
  <text x="65" y="120" font-size="10" fill="#64748B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">Symmetric households</text>

  <!-- All-or-nothing diagram -->
  <rect x="65" y="135" width="90" height="32" rx="8"
    fill="rgba(15, 118, 110, 0.12)" stroke="rgba(15, 118, 110, 0.25)" />
  <text x="75" y="156" font-size="10" fill="#0F766E"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">&#x03B4; &gt; 0: all in</text>

  <rect x="175" y="135" width="120" height="32" rx="8"
    fill="rgba(168, 34, 24, 0.10)" stroke="rgba(168, 34, 24, 0.25)" />
  <text x="185" y="156" font-size="10" fill="#A82218"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">&#x03B4; &lt; 0: all out</text>

  <text x="65" y="190" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">Interior 0 &lt; n &lt; h requires</text>
  <text x="65" y="206" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">exact indifference &#x03B4; = 0</text>

  <rect x="65" y="218" width="235" height="28" rx="8"
    fill="rgba(168, 34, 24, 0.12)" stroke="rgba(168, 34, 24, 0.25)" />
  <text x="78" y="237" font-size="11" font-weight="900" fill="#A82218"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">&#x2717;  Cannot implement interior</text>

  <text x="65" y="272" font-size="10" fill="#64748B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">Quota works: cap active</text>
  <text x="65" y="288" font-size="10" fill="#64748B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">slots at q &#x2264; h/2</text>
  <rect x="65" y="298" width="235" height="24" rx="8"
    fill="rgba(34, 197, 94, 0.10)" stroke="rgba(34, 197, 94, 0.25)" />
  <text x="78" y="315" font-size="10" font-weight="700" fill="#15803D"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">&#x2713;  Quota implements interior</text>

  <!-- Arrow 1->2 -->
  <path d="M325 205 H338" stroke="#3B82F6" stroke-width="2.5"
    marker-end="url(#fp-mp-arrow)" stroke-linecap="round" />

  <!-- ===== Panel 2: Heterogeneous price ===== -->
  <rect x="348" y="80" width="275" height="250" rx="16"
    fill="rgba(59, 130, 246, 0.06)" stroke="rgba(59, 130, 246, 0.20)" />
  <text x="368" y="104" font-size="12" font-weight="900" fill="#3B82F6"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">Exp 9: Type-selecting price</text>
  <text x="368" y="120" font-size="10" fill="#64748B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">Heterogeneous complements</text>

  <!-- Type selection -->
  <rect x="368" y="135" width="235" height="55" rx="8"
    fill="rgba(59, 130, 246, 0.08)" stroke="rgba(59, 130, 246, 0.18)" />
  <text x="380" y="155" font-size="10" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">Set a_low &lt; p &lt; a_high</text>
  <text x="380" y="174" font-size="10" fill="#3B82F6"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">&#x2192; low types exit, high types stay</text>

  <text x="368" y="210" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">Clears demand iff:</text>
  <rect x="368" y="218" width="235" height="28" rx="8"
    fill="rgba(34, 197, 94, 0.10)" stroke="rgba(34, 197, 94, 0.25)" />
  <text x="380" y="237" font-size="11" font-weight="700" fill="#15803D"
    font-family="JetBrains Mono, monospace">H &#x2264; L</text>

  <text x="368" y="272" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">Price selects types, but if</text>
  <text x="368" y="288" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">H &gt; L, it still overcrowds</text>
  <rect x="368" y="298" width="235" height="24" rx="8"
    fill="rgba(249, 115, 22, 0.08)" stroke="rgba(249, 115, 22, 0.22)" />
  <text x="380" y="315" font-size="10" font-weight="700" fill="#C2410C"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">&#x26A0;  Selection only, not allocation</text>

  <!-- Arrow 2->3 -->
  <path d="M628 205 H641" stroke="#3B82F6" stroke-width="2.5"
    marker-end="url(#fp-mp-arrow)" stroke-linecap="round" />

  <!-- ===== Panel 3: Price + quota ===== -->
  <rect x="651" y="80" width="275" height="250" rx="16"
    fill="rgba(34, 197, 94, 0.06)" stroke="rgba(34, 197, 94, 0.22)" stroke-width="2" />
  <text x="671" y="104" font-size="12" font-weight="900" fill="#15803D"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">Exp 10: Price + quota</text>
  <text x="671" y="120" font-size="10" fill="#64748B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">Composed mechanism</text>

  <!-- Composition -->
  <rect x="671" y="135" width="235" height="38" rx="8"
    fill="rgba(59, 130, 246, 0.08)" stroke="rgba(59, 130, 246, 0.18)" />
  <text x="683" y="155" font-size="10" font-weight="700" fill="#3B82F6"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">Stage 1: price selects types</text>

  <rect x="671" y="180" width="235" height="38" rx="8"
    fill="rgba(34, 197, 94, 0.08)" stroke="rgba(34, 197, 94, 0.18)" />
  <text x="683" y="200" font-size="10" font-weight="700" fill="#15803D"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">Stage 2: quota caps allocation</text>

  <text x="671" y="240" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">Clears demand iff:</text>
  <rect x="671" y="248" width="235" height="28" rx="8"
    fill="rgba(34, 197, 94, 0.12)" stroke="rgba(34, 197, 94, 0.30)" />
  <text x="683" y="267" font-size="11" font-weight="700" fill="#15803D"
    font-family="JetBrains Mono, monospace">q &#x2264; (L + H) / 2</text>

  <rect x="671" y="298" width="235" height="24" rx="8"
    fill="rgba(34, 197, 94, 0.15)" stroke="rgba(34, 197, 94, 0.35)" />
  <text x="683" y="315" font-size="11" font-weight="900" fill="#15803D"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">&#x2713;  Both selection + allocation</text>
</svg>
