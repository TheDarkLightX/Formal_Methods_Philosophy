<svg
  class="fp-diagram"
  viewBox="0 0 960 430"
  role="img"
  aria-labelledby="fp-gro-title fp-gro-desc"
  xmlns="http://www.w3.org/2000/svg"
>
  <title id="fp-gro-title">Graph regime overlap map</title>
  <desc id="fp-gro-desc">
    The corrected graph frontier splits into a low-edge balanced-star regime
    and a higher overlap band where star-plus-low-edge and repaired
    multipartite compete. The odd line is a special selector slice inside the
    higher band.
  </desc>

  <defs>
    <filter id="fp-gro-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.10" />
    </filter>
    <marker id="fp-gro-arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#3B82F6" fill-opacity="0.9" />
    </marker>
  </defs>

  <g filter="url(#fp-gro-shadow)">
    <rect x="20" y="12" width="920" height="406" rx="26" fill="#FFFFFF" stroke="#E2E8F0" />
  </g>

  <text x="56" y="46" font-size="15" font-weight="900" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Corrected graph regime map
  </text>
  <text x="56" y="66" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Low-edge balanced star forests sit on the left. Higher budgets enter an overlap band where two exact regimes compete.
  </text>

  <line x1="90" y1="120" x2="870" y2="120" stroke="#CBD5E1" stroke-width="2" />
  <text x="90" y="105" font-size="10" fill="#475569" font-family="IBM Plex Mono, monospace">m = 0</text>
  <text x="338" y="105" font-size="10" fill="#475569" font-family="IBM Plex Mono, monospace">m = n - 1</text>
  <text x="614" y="105" font-size="10" fill="#475569" font-family="IBM Plex Mono, monospace">m = 2n - 3</text>
  <text x="832" y="105" font-size="10" fill="#475569" font-family="IBM Plex Mono, monospace">higher</text>

  <rect x="90" y="136" width="250" height="76" rx="16" fill="rgba(16,185,129,0.08)" stroke="rgba(16,185,129,0.22)" />
  <text x="110" y="164" font-size="12" font-weight="900" fill="#15803D"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">Low-edge regime</text>
  <text x="110" y="186" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">balanced star forests are exact</text>

  <rect x="340" y="136" width="274" height="76" rx="16" fill="rgba(245,158,11,0.10)" stroke="rgba(245,158,11,0.24)" />
  <text x="360" y="164" font-size="12" font-weight="900" fill="#A16207"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">High overlap band</text>
  <text x="360" y="186" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">exact frontier = max(star-plus-low-edge, repaired multipartite)</text>

  <rect x="614" y="136" width="220" height="76" rx="16" fill="rgba(15,23,42,0.05)" stroke="rgba(15,23,42,0.16)" />
  <text x="634" y="164" font-size="12" font-weight="900" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">Beyond the checked band</text>
  <text x="634" y="186" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">still open on this branch</text>

  <path d="M476 214 V246" stroke="#3B82F6" stroke-width="3" marker-end="url(#fp-gro-arrow)" stroke-linecap="round" />

  <rect x="72" y="250" width="270" height="112" rx="18" fill="rgba(59,130,246,0.08)" stroke="rgba(59,130,246,0.22)" />
  <text x="92" y="278" font-size="12" font-weight="900" fill="#2563EB"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">Star-plus-low-edge family</text>
  <text x="92" y="300" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">full star + low-edge leaf correction</text>
  <text x="92" y="320" font-size="10" fill="#475569"
    font-family="IBM Plex Mono, monospace">OPT_star_leaf(n,m) = 2^(n-1)-1 + F_bal(n-1,e)</text>
  <text x="92" y="344" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">odd-line middle rung: perfect matching on leaves</text>

  <rect x="364" y="250" width="270" height="112" rx="18" fill="rgba(239,68,68,0.06)" stroke="rgba(239,68,68,0.20)" />
  <text x="384" y="278" font-size="12" font-weight="900" fill="#A82218"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">Repaired multipartite side</text>
  <text x="384" y="300" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">base partitions + up to two internal edges</text>
  <text x="384" y="320" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">wins on some middle budgets before the star side returns</text>

  <rect x="656" y="238" width="250" height="138" rx="18" fill="rgba(168,85,247,0.08)" stroke="rgba(168,85,247,0.22)" />
  <text x="676" y="266" font-size="12" font-weight="900" fill="#7C3AED"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">Odd-line selector slice</text>
  <text x="676" y="286" font-size="10" fill="#475569"
    font-family="IBM Plex Mono, monospace">n = 2r + 1, m = 3r</text>
  <rect x="676" y="300" width="210" height="22" rx="8" fill="rgba(34,197,94,0.10)" stroke="rgba(34,197,94,0.22)" />
  <text x="694" y="315" font-size="10" fill="#15803D" font-family="Atkinson Hyperlegible, system-ui, sans-serif">r = 1   tie</text>
  <rect x="676" y="328" width="210" height="22" rx="8" fill="rgba(249,115,22,0.10)" stroke="rgba(249,115,22,0.22)" />
  <text x="694" y="343" font-size="10" fill="#C2410C" font-family="Atkinson Hyperlegible, system-ui, sans-serif">r = 2   multipartite wins</text>
  <rect x="676" y="356" width="210" height="22" rx="8" fill="rgba(59,130,246,0.10)" stroke="rgba(59,130,246,0.22)" />
  <text x="694" y="371" font-size="10" fill="#2563EB" font-family="Atkinson Hyperlegible, system-ui, sans-serif">r ≥ 3   star-plus-leaf only in family selector</text>

  <rect x="190" y="378" width="560" height="24" rx="10" fill="rgba(15,23,42,0.05)" stroke="rgba(15,23,42,0.16)" />
  <text x="214" y="394" font-size="11" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Teaching rule: the corrected frontier is easiest to understand as a regime map with a genuine overlap band.
  </text>
</svg>
