<svg
  class="fp-diagram"
  viewBox="0 0 960 430"
  role="img"
  aria-labelledby="fp-splitter-title fp-splitter-desc"
  xmlns="http://www.w3.org/2000/svg"
>
  <title id="fp-splitter-title">One NSO splitter cuts a live region</title>
  <desc id="fp-splitter-desc">
    A current live region R is cut by a sentence splitter s into two candidate
    subregions: R meet s and R meet s prime.
  </desc>

  <defs>
    <filter id="fp-splitter-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0F172A" flood-opacity="0.10" />
    </filter>
    <marker id="fp-splitter-arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#475569" />
    </marker>
    <style>
      .fp-splitter-bg { fill: #F8FAFC; }
      .fp-splitter-panel { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 2; filter: url(#fp-splitter-shadow); }
      .fp-splitter-parent { fill: #C7D2FE; stroke: #4338CA; stroke-width: 3; }
      .fp-splitter-left { fill: #BBF7D0; stroke: #15803D; stroke-width: 3; }
      .fp-splitter-right { fill: #FDE68A; stroke: #B45309; stroke-width: 3; }
      .fp-splitter-line { stroke: #475569; stroke-width: 3; marker-end: url(#fp-splitter-arrow); fill: none; }
      .fp-splitter-cut { stroke: #4338CA; stroke-width: 3; stroke-dasharray: 8 8; }
      .fp-splitter-title { fill: #0F172A; font: 700 28px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .fp-splitter-label { fill: #0F172A; font: 700 22px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .fp-splitter-code { fill: #111827; font: 700 20px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .fp-splitter-small { fill: #475569; font: 500 15px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    </style>
  </defs>

  <rect class="fp-splitter-bg" width="960" height="430" rx="18" />
  <rect class="fp-splitter-panel" x="40" y="34" width="880" height="336" rx="14" />

  <text class="fp-splitter-title" x="80" y="82">A splitter makes one live region branch</text>
  <text class="fp-splitter-small" x="80" y="112">The sentence <tspan font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">s</tspan> cuts the current live region into the part where <tspan font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">s</tspan> holds and the part where <tspan font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">s'</tspan> holds.</text>

  <rect class="fp-splitter-parent" x="380" y="145" width="200" height="70" rx="14" />
  <line class="fp-splitter-cut" x1="480" y1="148" x2="480" y2="212" />
  <text class="fp-splitter-label" x="464" y="188">R</text>
  <text class="fp-splitter-small" x="418" y="239">current live region</text>

  <path class="fp-splitter-line" d="M 480 220 C 480 255 310 260 310 292" />
  <path class="fp-splitter-line" d="M 480 220 C 480 255 650 260 650 292" />
  <text class="fp-splitter-small" x="506" y="263">cut by s</text>

  <rect class="fp-splitter-left" x="190" y="295" width="240" height="62" rx="12" />
  <text class="fp-splitter-code" x="280" y="333">R ∧ s</text>
  <text class="fp-splitter-small" x="226" y="382">literal side</text>

  <rect class="fp-splitter-right" x="530" y="295" width="240" height="62" rx="12" />
  <text class="fp-splitter-code" x="612" y="333">R ∧ s'</text>
  <text class="fp-splitter-small" x="566" y="382">complement side</text>
</svg>
