<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Hybrid loop comparison</title>
  <desc id="desc">A teaching figure comparing direct control, pair-plus-atom hybrid control, and pair-plus-block hybrid control on the same requirements-discovery task.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f9f3e7" />
      <stop offset="100%" stop-color="#efe6d7" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#2a2520" flood-opacity="0.10" />
    </filter>
  </defs>

  <rect width="1200" height="760" fill="url(#bg)" />
  <text x="80" y="78" fill="#2a2520" font-family="Georgia, serif" font-size="34" font-weight="700">
    Three loop designs on one task
  </text>
  <text x="80" y="112" fill="#6c645c" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">
    The comparison is honest only when acquisition, pure resolved mass, and residual controller depth are priced separately.
  </text>

  <rect x="80" y="140" width="1040" height="74" rx="20" fill="#fff9ef" stroke="#d7cfc2" stroke-width="2" />
  <text x="110" y="186" fill="#2a2520" font-family="'IBM Plex Mono', monospace" font-size="26">
    U = alpha * pure_resolved_mass + beta * depth_saving - gamma * acquisition
  </text>

  <g filter="url(#shadow)">
    <rect x="80" y="252" width="300" height="376" rx="28" fill="#fff9ef" stroke="#d9d0c3" stroke-width="2" />
    <rect x="450" y="252" width="300" height="376" rx="28" fill="#fff9ef" stroke="#d9d0c3" stroke-width="2" />
    <rect x="820" y="252" width="300" height="376" rx="28" fill="#fff9ef" stroke="#d9d0c3" stroke-width="2" />
  </g>

  <g>
    <rect x="104" y="278" width="118" height="34" rx="17" fill="#dbeafe" />
    <text x="122" y="301" fill="#2563eb" font-family="'IBM Plex Mono', monospace" font-size="17" font-weight="700">direct</text>
    <text x="104" y="346" fill="#2a2520" font-family="Georgia, serif" font-size="28" font-weight="700">Raw-family controller</text>
    <text x="104" y="382" fill="#6c645c" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">
      One controller acts on every omission set directly.
    </text>
    <rect x="104" y="418" width="252" height="62" rx="16" fill="#f5efe3" stroke="#d6ccbe" />
    <text x="122" y="455" fill="#2a2520" font-family="'IBM Plex Mono', monospace" font-size="20">acquisition = 0</text>
    <rect x="104" y="494" width="252" height="62" rx="16" fill="#f5efe3" stroke="#d6ccbe" />
    <text x="122" y="531" fill="#2a2520" font-family="'IBM Plex Mono', monospace" font-size="20">pure mass = 0</text>
    <rect x="104" y="570" width="252" height="62" rx="16" fill="#dbeafe" stroke="#93c5fd" />
    <text x="122" y="607" fill="#1d4ed8" font-family="'IBM Plex Mono', monospace" font-size="20">depth = n</text>
  </g>

  <g>
    <rect x="474" y="278" width="170" height="34" rx="17" fill="#dcfce7" />
    <text x="492" y="301" fill="#15803d" font-family="'IBM Plex Mono', monospace" font-size="17" font-weight="700">pair + atom</text>
    <text x="474" y="346" fill="#2a2520" font-family="Georgia, serif" font-size="28" font-weight="700">Geometry first, then atoms</text>
    <text x="474" y="382" fill="#6c645c" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">
      Pair witnesses remove every non-singleton case before
    </text>
    <text x="474" y="408" fill="#6c645c" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">
      the residual controller even starts.
    </text>
    <rect x="474" y="430" width="252" height="62" rx="16" fill="#ecfdf5" stroke="#86efac" />
    <text x="492" y="467" fill="#166534" font-family="'IBM Plex Mono', monospace" font-size="20">acquisition = C(n, 2)</text>
    <rect x="474" y="506" width="252" height="62" rx="16" fill="#fef3c7" stroke="#f5c26b" />
    <text x="492" y="543" fill="#9a3412" font-family="'IBM Plex Mono', monospace" font-size="20">pure mass = 2^n - n - 1</text>
    <rect x="474" y="582" width="252" height="62" rx="16" fill="#ede9fe" stroke="#c4b5fd" />
    <text x="492" y="619" fill="#6d28d9" font-family="'IBM Plex Mono', monospace" font-size="20">depth = n - 1</text>
  </g>

  <g>
    <rect x="844" y="278" width="178" height="34" rx="17" fill="#ccfbf1" />
    <text x="862" y="301" fill="#0f766e" font-family="'IBM Plex Mono', monospace" font-size="17" font-weight="700">pair + block</text>
    <text x="844" y="346" fill="#2a2520" font-family="Georgia, serif" font-size="28" font-weight="700">Geometry first, then blocks</text>
    <text x="844" y="382" fill="#6c645c" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">
      The same pair basis leaves only singleton residue, then
    </text>
    <text x="844" y="408" fill="#6c645c" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">
      block questions cut that residue logarithmically.
    </text>
    <rect x="844" y="430" width="252" height="62" rx="16" fill="#ecfdf5" stroke="#86efac" />
    <text x="862" y="467" fill="#166534" font-family="'IBM Plex Mono', monospace" font-size="20">acquisition = C(n, 2)</text>
    <rect x="844" y="506" width="252" height="62" rx="16" fill="#fef3c7" stroke="#f5c26b" />
    <text x="862" y="543" fill="#9a3412" font-family="'IBM Plex Mono', monospace" font-size="20">pure mass = 2^n - n - 1</text>
    <rect x="844" y="582" width="252" height="62" rx="16" fill="#ccfbf1" stroke="#5eead4" />
    <text x="862" y="619" fill="#0f766e" font-family="'IBM Plex Mono', monospace" font-size="20">depth = ceil(log2 n)</text>
  </g>

  <g stroke="#c8bfb3" stroke-width="3" fill="none">
    <path d="M380 440 C418 440, 424 440, 450 440" />
    <path d="M750 440 C788 440, 794 440, 820 440" />
  </g>
  <g fill="#c8bfb3">
    <path d="M444 432 l16 8 l-16 8 z" />
    <path d="M814 432 l16 8 l-16 8 z" />
  </g>
  <text x="406" y="427" fill="#6c645c" font-family="'Source Sans 3', Arial, sans-serif" font-size="18">change geometry</text>
  <text x="774" y="427" fill="#6c645c" font-family="'Source Sans 3', Arial, sans-serif" font-size="18">stronger separator</text>

  <rect x="80" y="662" width="1040" height="50" rx="18" fill="#fff9ef" stroke="#d7cfc2" stroke-width="2" />
  <text x="108" y="694" fill="#2a2520" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">
    Deep lesson: the hybrid win is not only a smaller controller. It comes from settling most of the family before the controller begins.
  </text>
</svg>
