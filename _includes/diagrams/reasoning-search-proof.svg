<svg
  class="fp-diagram"
  viewBox="0 0 960 430"
  role="img"
  aria-labelledby="fp-rsp-title fp-rsp-desc"
  xmlns="http://www.w3.org/2000/svg"
>
  <title id="fp-rsp-title">Discovery, search, explanation, and proof</title>
  <desc id="fp-rsp-desc">
    A question leads to guesses or search, then possibly to an explanation, but only a checked derivation
    or exhaustive certificate counts as proof.
  </desc>

  <defs>
    <filter id="fp-rsp-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.10" />
    </filter>
    <marker id="fp-rsp-arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#3B82F6" fill-opacity="0.9" />
    </marker>
    <marker id="fp-rsp-arrow-warn" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#F97316" fill-opacity="0.9" />
    </marker>
  </defs>

  <g filter="url(#fp-rsp-shadow)">
    <rect x="60" y="60" width="840" height="310" rx="26" fill="#FFFFFF" stroke="#E2E8F0" />

    <text x="96" y="106" font-size="16" font-weight="900" fill="#1E293B" font-family="Atkinson Hyperlegible, system-ui, sans-serif">
      From answer-finding to justification
    </text>
    <text x="96" y="130" font-size="12" fill="#475569" font-family="Atkinson Hyperlegible, system-ui, sans-serif">
      A correct output can come from luck, search, or proof. The checker is what separates them.
    </text>

    <rect x="100" y="170" width="140" height="88" rx="20" fill="rgba(15, 23, 42, 0.06)" stroke="rgba(15, 23, 42, 0.14)" />
    <text x="127" y="205" font-size="14" font-weight="900" fill="#1E293B" font-family="Atkinson Hyperlegible, system-ui, sans-serif">Question</text>
    <text x="127" y="228" font-size="12" fill="#475569" font-family="Atkinson Hyperlegible, system-ui, sans-serif">What is 1 + 1?</text>

    <rect x="290" y="158" width="150" height="112" rx="20" fill="rgba(59, 130, 246, 0.10)" stroke="rgba(59, 130, 246, 0.22)" />
    <text x="319" y="194" font-size="14" font-weight="900" fill="#1E293B" font-family="Atkinson Hyperlegible, system-ui, sans-serif">Search or guess</text>
    <text x="319" y="218" font-size="12" fill="#475569" font-family="Atkinson Hyperlegible, system-ui, sans-serif">4, 3, 2</text>
    <text x="319" y="238" font-size="12" fill="#475569" font-family="Atkinson Hyperlegible, system-ui, sans-serif">maybe right, maybe luck</text>

    <rect x="490" y="158" width="160" height="112" rx="20" fill="rgba(15, 23, 42, 0.06)" stroke="rgba(15, 23, 42, 0.14)" />
    <text x="518" y="194" font-size="14" font-weight="900" fill="#1E293B" font-family="Atkinson Hyperlegible, system-ui, sans-serif">Explanation</text>
    <text x="518" y="218" font-size="12" fill="#475569" font-family="Atkinson Hyperlegible, system-ui, sans-serif">"one and one</text>
    <text x="518" y="238" font-size="12" fill="#475569" font-family="Atkinson Hyperlegible, system-ui, sans-serif">make two"</text>

    <rect x="700" y="146" width="160" height="136" rx="20" fill="rgba(249, 115, 22, 0.10)" stroke="rgba(249, 115, 22, 0.24)" />
    <text x="727" y="182" font-size="14" font-weight="900" fill="#1E293B" font-family="Atkinson Hyperlegible, system-ui, sans-serif">Proof or certificate</text>
    <text x="727" y="206" font-size="12" fill="#475569" font-family="Atkinson Hyperlegible, system-ui, sans-serif">licensed derivation</text>
    <text x="727" y="226" font-size="12" fill="#475569" font-family="Atkinson Hyperlegible, system-ui, sans-serif">or exhaustive checked</text>
    <text x="727" y="246" font-size="12" fill="#475569" font-family="Atkinson Hyperlegible, system-ui, sans-serif">search on finite cases</text>

    <path d="M240 214 H278" stroke="#3B82F6" stroke-width="4" marker-end="url(#fp-rsp-arrow)" stroke-linecap="round" />
    <path d="M440 214 H478" stroke="#3B82F6" stroke-width="4" marker-end="url(#fp-rsp-arrow)" stroke-linecap="round" />
    <path d="M650 214 H688" stroke="#F97316" stroke-width="4" marker-end="url(#fp-rsp-arrow-warn)" stroke-linecap="round" />

    <text x="312" y="306" font-size="12" fill="#475569" font-family="Atkinson Hyperlegible, system-ui, sans-serif">discovery side</text>
    <text x="739" y="306" font-size="12" fill="#475569" font-family="Atkinson Hyperlegible, system-ui, sans-serif">justification side</text>

    <text x="98" y="338" font-size="12" fill="#475569" font-family="Atkinson Hyperlegible, system-ui, sans-serif">
      A chain of thought may help produce the answer. It becomes proof only when a checker can validate the steps.
    </text>
  </g>
</svg>
