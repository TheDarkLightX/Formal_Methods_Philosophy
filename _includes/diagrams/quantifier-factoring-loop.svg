<svg
  class="fp-diagram"
  viewBox="0 0 960 460"
  role="img"
  aria-labelledby="fp-qf-title fp-qf-desc"
  xmlns="http://www.w3.org/2000/svg"
>
  <title id="fp-qf-title">Quantifier factoring loop</title>
  <desc id="fp-qf-desc">
    A teaching diagram for quantified reasoning. The original goal exists x for
    all y Spec(x,y) is rewritten so that the proposer searches for a candidate x
    and the verifier searches for a bad witness y. Rejection comes from one bad
    witness. Acceptance means no bad witness survives under the stated checker.
  </desc>

  <defs>
    <filter id="fp-qf-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.10" />
    </filter>
    <marker id="fp-qf-arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#3B82F6" fill-opacity="0.9" />
    </marker>
    <marker id="fp-qf-arrow-red" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#A82218" fill-opacity="0.8" />
    </marker>
    <marker id="fp-qf-arrow-green" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#15803D" fill-opacity="0.8" />
    </marker>
  </defs>

  <g filter="url(#fp-qf-shadow)">
    <rect x="24" y="12" width="912" height="436" rx="26" fill="#FFFFFF" stroke="#E2E8F0" />
  </g>

  <text x="60" y="48" font-size="15" font-weight="900" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Quantifier factoring loop
  </text>
  <text x="60" y="68" font-size="12" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    The hinge move is to rewrite the universal burden as failed counterexample search.
  </text>

  <rect x="80" y="98" width="300" height="74" rx="18"
    fill="rgba(59, 130, 246, 0.08)" stroke="rgba(59, 130, 246, 0.24)" />
  <text x="104" y="126" font-size="13" font-weight="900" fill="#2563EB"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Original goal
  </text>
  <text x="104" y="148" font-size="12" fill="#1E293B"
    font-family="JetBrains Mono, monospace">
    exists x  for all y  Spec(x,y)
  </text>

  <path d="M380 135 H430" stroke="#3B82F6" stroke-width="3" marker-end="url(#fp-qf-arrow)" stroke-linecap="round" />

  <rect x="440" y="92" width="420" height="86" rx="18"
    fill="rgba(249, 115, 22, 0.08)" stroke="rgba(249, 115, 22, 0.24)" />
  <text x="464" y="120" font-size="13" font-weight="900" fill="#C2410C"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Hinge rewrite
  </text>
  <text x="464" y="142" font-size="12" fill="#1E293B"
    font-family="JetBrains Mono, monospace">
    for all y Spec(x,y)  iff  not exists y not Spec(x,y)
  </text>
  <text x="464" y="162" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    One side proposes a candidate design x. The other side searches for one bad test case y.
  </text>

  <path d="M650 178 V210" stroke="#3B82F6" stroke-width="3" marker-end="url(#fp-qf-arrow)" stroke-linecap="round" />

  <rect x="86" y="226" width="334" height="126" rx="20"
    fill="rgba(15, 118, 110, 0.06)" stroke="rgba(15, 118, 110, 0.24)" />
  <text x="110" y="256" font-size="13" font-weight="900" fill="#0F766E"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Proposer lane
  </text>
  <text x="110" y="278" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Search for a candidate x
  </text>
  <rect x="110" y="294" width="280" height="40" rx="12"
    fill="rgba(15, 118, 110, 0.12)" stroke="rgba(15, 118, 110, 0.30)" />
  <text x="128" y="318" font-size="12" fill="#0F766E"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Example: candidate design, proof sketch, policy, or program
  </text>

  <rect x="540" y="226" width="334" height="126" rx="20"
    fill="rgba(168, 34, 24, 0.06)" stroke="rgba(168, 34, 24, 0.24)" />
  <text x="564" y="256" font-size="13" font-weight="900" fill="#A82218"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Verifier lane
  </text>
  <text x="564" y="278" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Search for one bad witness y
  </text>
  <rect x="564" y="294" width="280" height="40" rx="12"
    fill="rgba(168, 34, 24, 0.10)" stroke="rgba(168, 34, 24, 0.24)" />
  <text x="582" y="318" font-size="12" fill="#A82218"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Example: bad test case, attack, execution, or environment move
  </text>

  <path d="M420 288 H520" stroke="#E2E8F0" stroke-width="2" stroke-dasharray="6 6" />

  <path d="M254 352 V382" stroke="#15803D" stroke-width="2.5" marker-end="url(#fp-qf-arrow-green)" stroke-linecap="round" />
  <path d="M706 352 V382" stroke="#A82218" stroke-width="2.5" marker-end="url(#fp-qf-arrow-red)" stroke-linecap="round" />

  <rect x="260" y="372" width="440" height="42" rx="14"
    fill="rgba(59, 130, 246, 0.07)" stroke="rgba(59, 130, 246, 0.20)" />
  <text x="284" y="397" font-size="12" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    If one bad y is found, reject and refine x. If no bad y survives, acceptance is conditional on the checker.
  </text>

  <rect x="196" y="420" width="568" height="18" rx="9"
    fill="rgba(15, 23, 42, 0.04)" stroke="rgba(148, 163, 184, 0.28)" />
  <text x="220" y="433" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    One counterexample is decisive. No counterexample is only as strong as the stated search or certificate assumptions.
  </text>
</svg>
