<svg
  class="fp-diagram"
  viewBox="0 0 960 360"
  role="img"
  aria-labelledby="fp-shapes-title fp-shapes-desc"
  xmlns="http://www.w3.org/2000/svg"
>
  <title id="fp-shapes-title">Medical software shapes</title>
  <desc id="fp-shapes-desc">
    Four medical software shapes — Calculator, Classifier, Gate, and Temporal Gate —
    shown as a composable pipeline. Two concrete example lanes below demonstrate that
    the calorie lane uses Shape 1 alone while the kidney lane composes Shapes 1, 2, and 3.
  </desc>

  <defs>
    <filter id="fp-shapes-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.10" />
    </filter>
    <marker id="fp-shapes-arrow" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#3B82F6" fill-opacity="0.9" />
    </marker>
  </defs>

  <!-- ── Outer card ────────────────────────────────── -->
  <g filter="url(#fp-shapes-shadow)">
    <rect x="16" y="12" width="928" height="336" rx="26" fill="#FFFFFF" stroke="#E2E8F0" />

    <!-- ── Title ───────────────────────────────────── -->
    <text x="46" y="48"
      font-size="16" font-weight="900" fill="#1E293B"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">Medical software shapes</text>
    <text x="46" y="68"
      font-size="12" fill="#475569"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">four patterns that compose into pipelines</text>

    <!-- ══════════════════════════════════════════════
         ROW 1 — Shape boxes (y centred ~124)
         ══════════════════════════════════════════════ -->

    <!-- Box A: Calculator (blue) -->
    <rect x="55" y="92" width="150" height="65" rx="12"
      fill="rgba(59,130,246,0.08)" stroke="rgba(59,130,246,0.45)" stroke-width="1.5" />
    <text x="130" y="113"
      font-size="13" font-weight="700" text-anchor="middle" fill="#1E293B"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">Calculator</text>
    <text x="130" y="130"
      font-size="11" text-anchor="middle" fill="#475569"
      font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">f : X &#x2192; Y</text>
    <text x="130" y="148"
      font-size="11" text-anchor="middle" fill="#6366F1"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">calorie deficit</text>

    <!-- Arrow A&#x2192;B -->
    <line x1="210" y1="124" x2="260" y2="124"
      stroke="#3B82F6" stroke-width="3" marker-end="url(#fp-shapes-arrow)" stroke-linecap="round" />

    <!-- Box B: Classifier (orange) -->
    <rect x="270" y="92" width="150" height="65" rx="12"
      fill="rgba(249,115,22,0.08)" stroke="rgba(249,115,22,0.45)" stroke-width="1.5" />
    <text x="345" y="113"
      font-size="13" font-weight="700" text-anchor="middle" fill="#1E293B"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">Classifier</text>
    <text x="345" y="130"
      font-size="11" text-anchor="middle" fill="#475569"
      font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">g(f(x)) &#x2208; K</text>
    <text x="345" y="148"
      font-size="11" text-anchor="middle" fill="#6366F1"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">eGFR &#x2192; below_60</text>

    <!-- Arrow B&#x2192;C -->
    <line x1="425" y1="124" x2="475" y2="124"
      stroke="#3B82F6" stroke-width="3" marker-end="url(#fp-shapes-arrow)" stroke-linecap="round" />

    <!-- Box C: Gate (red) -->
    <rect x="485" y="92" width="170" height="65" rx="12"
      fill="rgba(239,68,68,0.08)" stroke="rgba(239,68,68,0.45)" stroke-width="1.5" />
    <text x="570" y="113"
      font-size="13" font-weight="700" text-anchor="middle" fill="#1E293B"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">Gate</text>
    <text x="570" y="130"
      font-size="11" text-anchor="middle" fill="#475569"
      font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">Allow(a,s) &#x27FA; P&#x2081;&#x2227;...&#x2227;P&#x2099;</text>
    <text x="570" y="148"
      font-size="11" text-anchor="middle" fill="#6366F1"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">watch / repeat / review</text>

    <!-- Arrow C&#x2192;D -->
    <line x1="660" y1="124" x2="710" y2="124"
      stroke="#3B82F6" stroke-width="3" marker-end="url(#fp-shapes-arrow)" stroke-linecap="round" />

    <!-- Box D: Temporal Gate (green) -->
    <rect x="720" y="92" width="170" height="65" rx="12"
      fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.45)" stroke-width="1.5" />
    <text x="805" y="113"
      font-size="13" font-weight="700" text-anchor="middle" fill="#1E293B"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">Temporal Gate</text>
    <text x="805" y="130"
      font-size="11" text-anchor="middle" fill="#475569"
      font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">Fresh(x,t) &#x27FA; t&#x2212;time(x)&#x2264;&#x394;</text>
    <text x="805" y="148"
      font-size="11" text-anchor="middle" fill="#6366F1"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">stale lab &#x2192; review</text>

    <!-- ── Divider ─────────────────────────────────── -->
    <line x1="46" y1="182" x2="914" y2="182"
      stroke="#E2E8F0" stroke-width="1" stroke-dasharray="6,4" />

    <!-- ══════════════════════════════════════════════
         ROW 2 — Concrete example pipelines
         ══════════════════════════════════════════════ -->

    <!-- ── Pipeline 1: Calorie lane (left half) ────── -->
    <text x="56" y="210"
      font-size="12" font-weight="900" fill="#1E293B"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">Calorie lane</text>
    <text x="56" y="225"
      font-size="10" fill="#475569"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">Shape 1 alone</text>

    <!-- Input pill: weight, bf% -->
    <rect x="56" y="238" width="90" height="28" rx="14"
      fill="rgba(15,23,42,0.05)" stroke="rgba(15,23,42,0.15)" stroke-width="1" />
    <text x="101" y="257"
      font-size="11" text-anchor="middle" fill="#475569"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">weight, bf%</text>

    <!-- Arrow -->
    <line x1="150" y1="252" x2="178" y2="252"
      stroke="#3B82F6" stroke-width="2" marker-end="url(#fp-shapes-arrow)" stroke-linecap="round" />

    <!-- Calculator pill (blue) -->
    <rect x="188" y="238" width="90" height="28" rx="14"
      fill="rgba(59,130,246,0.12)" stroke="rgba(59,130,246,0.35)" stroke-width="1" />
    <text x="233" y="257"
      font-size="11" font-weight="700" text-anchor="middle" fill="#1E293B"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">Calculator</text>

    <!-- Arrow -->
    <line x1="282" y1="252" x2="310" y2="252"
      stroke="#3B82F6" stroke-width="2" marker-end="url(#fp-shapes-arrow)" stroke-linecap="round" />

    <!-- Output pill: 1130 kcal -->
    <rect x="320" y="238" width="90" height="28" rx="14"
      fill="rgba(15,23,42,0.05)" stroke="rgba(15,23,42,0.15)" stroke-width="1" />
    <text x="365" y="257"
      font-size="11" text-anchor="middle" fill="#6366F1"
      font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">1130 kcal</text>

    <!-- ── Pipeline 2: Kidney lane (right half) ────── -->
    <text x="490" y="210"
      font-size="12" font-weight="900" fill="#1E293B"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">Kidney lane</text>
    <text x="490" y="225"
      font-size="10" fill="#475569"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">Shapes 1 + 2 + 3 composed</text>

    <!-- Input pill: SCr, age, sex -->
    <rect x="490" y="238" width="82" height="28" rx="14"
      fill="rgba(15,23,42,0.05)" stroke="rgba(15,23,42,0.15)" stroke-width="1" />
    <text x="531" y="257"
      font-size="10" text-anchor="middle" fill="#475569"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">SCr, age, sex</text>

    <!-- Arrow -->
    <line x1="576" y1="252" x2="590" y2="252"
      stroke="#3B82F6" stroke-width="2" marker-end="url(#fp-shapes-arrow)" stroke-linecap="round" />

    <!-- Calculator pill (blue) -->
    <rect x="600" y="238" width="72" height="28" rx="14"
      fill="rgba(59,130,246,0.12)" stroke="rgba(59,130,246,0.35)" stroke-width="1" />
    <text x="636" y="257"
      font-size="10" font-weight="700" text-anchor="middle" fill="#1E293B"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">Calculator</text>

    <!-- Arrow -->
    <line x1="676" y1="252" x2="690" y2="252"
      stroke="#3B82F6" stroke-width="2" marker-end="url(#fp-shapes-arrow)" stroke-linecap="round" />

    <!-- Classifier pill (orange) -->
    <rect x="700" y="238" width="68" height="28" rx="14"
      fill="rgba(249,115,22,0.12)" stroke="rgba(249,115,22,0.35)" stroke-width="1" />
    <text x="734" y="257"
      font-size="10" font-weight="700" text-anchor="middle" fill="#1E293B"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">Classifier</text>

    <!-- Arrow -->
    <line x1="772" y1="252" x2="786" y2="252"
      stroke="#3B82F6" stroke-width="2" marker-end="url(#fp-shapes-arrow)" stroke-linecap="round" />

    <!-- Gate pill (red) -->
    <rect x="796" y="238" width="50" height="28" rx="14"
      fill="rgba(239,68,68,0.12)" stroke="rgba(239,68,68,0.35)" stroke-width="1" />
    <text x="821" y="257"
      font-size="10" font-weight="700" text-anchor="middle" fill="#1E293B"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">Gate</text>

    <!-- Arrow -->
    <line x1="850" y1="252" x2="864" y2="252"
      stroke="#3B82F6" stroke-width="2" marker-end="url(#fp-shapes-arrow)" stroke-linecap="round" />

    <!-- Output pill: repeat_lab -->
    <rect x="874" y="238" width="52" height="28" rx="14"
      fill="rgba(15,23,42,0.05)" stroke="rgba(15,23,42,0.15)" stroke-width="1" />
    <text x="900" y="257"
      font-size="9" text-anchor="middle" fill="#6366F1"
      font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">repeat</text>

    <!-- ── Bottom annotation bar ───────────────────── -->
    <rect x="46" y="296" width="868" height="36" rx="14"
      fill="rgba(15,23,42,0.04)" stroke="rgba(15,23,42,0.08)" />
    <text x="76" y="312"
      font-size="10" font-weight="900" fill="#1E293B"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">COMPOSABILITY</text>
    <text x="76" y="326"
      font-size="10.5" fill="#475569"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif">Each shape is a standalone module. Pipelines snap together by matching output types to input types.</text>

  </g>
</svg>
