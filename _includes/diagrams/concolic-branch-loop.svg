<svg
  class="fp-diagram"
  viewBox="0 0 960 460"
  role="img"
  aria-labelledby="fp-cbl-title fp-cbl-desc"
  xmlns="http://www.w3.org/2000/svg"
>
  <title id="fp-cbl-title">The concolic branch-exploration loop</title>
  <desc id="fp-cbl-desc">
    A four-stage loop: concrete execution, path-condition collection, branch
    flip plus solving, and replay with bad-state checking.
  </desc>

  <defs>
    <filter id="fp-cbl-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.10" />
    </filter>
    <marker id="fp-cbl-arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#3B82F6" fill-opacity="0.95" />
    </marker>
    <marker id="fp-cbl-arrow-warn" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#F97316" fill-opacity="0.95" />
    </marker>
  </defs>

  <g filter="url(#fp-cbl-shadow)">
    <rect x="30" y="16" width="900" height="420" rx="26" fill="#FFFFFF" stroke="#E2E8F0" />
  </g>

  <text x="66" y="56" font-size="16" font-weight="900" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Concolic branch exploration
  </text>
  <text x="66" y="78" font-size="12" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Real execution produces one path. Symbolic constraints steer the next run.
  </text>

  <rect x="74" y="120" width="170" height="96" rx="20"
    fill="rgba(59, 130, 246, 0.10)" stroke="rgba(59, 130, 246, 0.24)" />
  <text x="98" y="156" font-size="14" font-weight="900" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">1. Concrete run</text>
  <text x="98" y="180" font-size="12" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">execute P on one input</text>
  <text x="98" y="198" font-size="12" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">observe one real path</text>

  <rect x="292" y="120" width="182" height="96" rx="20"
    fill="rgba(14, 165, 233, 0.10)" stroke="rgba(14, 165, 233, 0.24)" />
  <text x="318" y="156" font-size="14" font-weight="900" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">2. Record PC</text>
  <text x="318" y="180" font-size="12" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">c₁ ∧ c₂ ∧ ... ∧ cₙ</text>
  <text x="318" y="198" font-size="12" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">one guard per branch decision</text>

  <rect x="522" y="120" width="196" height="96" rx="20"
    fill="rgba(124, 58, 237, 0.10)" stroke="rgba(124, 58, 237, 0.24)" />
  <text x="548" y="156" font-size="14" font-weight="900" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">3. Flip + solve</text>
  <text x="548" y="180" font-size="12" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">c₁ ∧ ... ∧ ¬cₖ</text>
  <text x="548" y="198" font-size="12" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">ask solver for a new input</text>

  <rect x="766" y="120" width="132" height="96" rx="20"
    fill="rgba(16, 185, 129, 0.10)" stroke="rgba(16, 185, 129, 0.24)" />
  <text x="790" y="156" font-size="14" font-weight="900" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">4. Replay</text>
  <text x="790" y="180" font-size="12" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">run on x′</text>
  <text x="790" y="198" font-size="12" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">check Bad(s)</text>

  <path d="M244 168 H280" stroke="#3B82F6" stroke-width="4" marker-end="url(#fp-cbl-arrow)" stroke-linecap="round" />
  <path d="M474 168 H510" stroke="#3B82F6" stroke-width="4" marker-end="url(#fp-cbl-arrow)" stroke-linecap="round" />
  <path d="M718 168 H754" stroke="#3B82F6" stroke-width="4" marker-end="url(#fp-cbl-arrow)" stroke-linecap="round" />

  <rect x="172" y="278" width="620" height="108" rx="24"
    fill="rgba(15, 23, 42, 0.04)" stroke="rgba(15, 23, 42, 0.10)" />
  <text x="202" y="314" font-size="14" font-weight="900" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Witness law
  </text>
  <text x="202" y="342" font-size="13" fill="#334155"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    If replay reaches a bad state, the engine has realized:
  </text>
  <text x="202" y="370" font-size="15" font-weight="900" fill="#0F766E"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    ∃ x ∃ s . Exec(P, x) = s ∧ ¬φ(s)
  </text>

  <path d="M832 216 V252 H494 V266" stroke="#F97316" stroke-width="3.5"
    marker-end="url(#fp-cbl-arrow-warn)" fill="none" stroke-linecap="round" />
  <text x="760" y="246" font-size="11" fill="#F97316"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    witness if Bad(s)
  </text>

  <rect x="74" y="404" width="824" height="18" rx="9"
    fill="rgba(59, 130, 246, 0.08)" stroke="rgba(59, 130, 246, 0.14)" />
  <text x="252" y="417" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    stronger than random mutation for bounded path search, but still limited by path explosion and model fidelity
  </text>
</svg>
