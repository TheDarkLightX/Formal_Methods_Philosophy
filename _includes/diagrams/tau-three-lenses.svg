<svg
  class="fp-diagram"
  viewBox="0 0 960 420"
  role="img"
  aria-labelledby="fp-tau3-title fp-tau3-desc"
  xmlns="http://www.w3.org/2000/svg"
>
  <title id="fp-tau3-title">One turnstile event through three lenses</title>
  <desc id="fp-tau3-desc">
    The same turnstile event appears as a state-machine arrow, a recurrence instance, and a Tau
    constraint instance.
  </desc>

  <defs>
    <filter id="fp-tau3-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.10" />
    </filter>
    <marker id="fp-tau3-arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#3B82F6" fill-opacity="0.9" />
    </marker>
  </defs>

  <g filter="url(#fp-tau3-shadow)">
    <rect x="60" y="70" width="840" height="280" rx="26" fill="#FFFFFF" stroke="#E2E8F0" />

    <rect x="100" y="130" width="220" height="150" rx="20" fill="rgba(59, 130, 246, 0.10)" stroke="rgba(59, 130, 246, 0.22)" />
    <text x="126" y="166" font-size="14" font-weight="900" fill="#1E293B" font-family="Atkinson Hyperlegible, system-ui, sans-serif">State machine</text>
    <circle cx="158" cy="222" r="26" fill="#FFFFFF" stroke="#3B82F6" />
    <circle cx="264" cy="222" r="26" fill="#FFFFFF" stroke="#3B82F6" />
    <text x="141" y="226" font-size="11" fill="#334155" font-family="Atkinson Hyperlegible, system-ui, sans-serif">L</text>
    <text x="246" y="226" font-size="11" fill="#334155" font-family="Atkinson Hyperlegible, system-ui, sans-serif">U</text>
    <path d="M186 222 H228" stroke="#3B82F6" stroke-width="4" marker-end="url(#fp-tau3-arrow)" stroke-linecap="round" />
    <text x="190" y="204" font-size="11" fill="#475569" font-family="Atkinson Hyperlegible, system-ui, sans-serif">coin</text>
    <text x="126" y="260" font-size="12" fill="#475569" font-family="Atkinson Hyperlegible, system-ui, sans-serif">Locked --coin--> Unlocked</text>

    <rect x="370" y="130" width="220" height="150" rx="20" fill="rgba(15, 23, 42, 0.06)" stroke="rgba(15, 23, 42, 0.14)" />
    <text x="396" y="166" font-size="14" font-weight="900" fill="#1E293B" font-family="Atkinson Hyperlegible, system-ui, sans-serif">Recurrence</text>
    <text x="396" y="214" font-size="13" fill="#334155" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, Courier New, monospace">state_t = step(state_t-1, event_t)</text>
    <text x="396" y="244" font-size="12" fill="#475569" font-family="Atkinson Hyperlegible, system-ui, sans-serif">Here: step(Locked, coin) = Unlocked</text>

    <rect x="640" y="130" width="220" height="150" rx="20" fill="rgba(59, 130, 246, 0.10)" stroke="rgba(59, 130, 246, 0.22)" />
    <text x="666" y="166" font-size="14" font-weight="900" fill="#1E293B" font-family="Atkinson Hyperlegible, system-ui, sans-serif">Tau clause</text>
    <text x="666" y="212" font-size="12" fill="#334155" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, Courier New, monospace">o1[t-1] = 0 &amp;&amp;</text>
    <text x="666" y="232" font-size="12" fill="#334155" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, Courier New, monospace">coin[t] = 1 &amp;&amp; push[t] = 0</text>
    <text x="666" y="252" font-size="12" fill="#334155" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, Courier New, monospace">-&gt; o1[t] = 1</text>

    <text x="202" y="322" font-size="12" fill="#475569" font-family="Atkinson Hyperlegible, system-ui, sans-serif">same event</text>
    <text x="470" y="322" font-size="12" fill="#475569" font-family="Atkinson Hyperlegible, system-ui, sans-serif">same event</text>
    <path d="M320 206 H360" stroke="#3B82F6" stroke-width="4" marker-end="url(#fp-tau3-arrow)" stroke-linecap="round" />
    <path d="M590 206 H630" stroke="#3B82F6" stroke-width="4" marker-end="url(#fp-tau3-arrow)" stroke-linecap="round" />
  </g>
</svg>
