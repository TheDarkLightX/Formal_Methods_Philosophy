<svg
  class="fp-diagram"
  viewBox="0 0 960 540"
  role="img"
  aria-labelledby="fp-gsm-title fp-gsm-desc"
  xmlns="http://www.w3.org/2000/svg"
>
  <title id="fp-gsm-title">Governed slot market</title>
  <desc id="fp-gsm-desc">
    A teaching diagram for Experiments 14 and 15. The total system profit stays fixed at F minus N times c.
    Slot sales redistribute profit between winners and the controller, and MPRD caps extraction at the minimum
    of the admissibility cap G and the viability margin F minus q times c.
  </desc>

  <defs>
    <filter id="fp-gsm-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.10" />
    </filter>
    <marker id="fp-gsm-arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#3B82F6" fill-opacity="0.9" />
    </marker>
  </defs>

  <g filter="url(#fp-gsm-shadow)">
    <rect x="20" y="10" width="920" height="520" rx="26" fill="#FFFFFF" stroke="#E2E8F0" />
  </g>

  <text x="60" y="46" font-size="15" font-weight="900" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Governed slot market
  </text>
  <text x="60" y="66" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Slot sales move rents between winners and the controller, but they do not change the size of the pie.
  </text>

  <!-- fixed pie -->
  <rect x="60" y="104" width="360" height="136" rx="18"
    fill="rgba(59, 130, 246, 0.06)" stroke="rgba(59, 130, 246, 0.20)" />
  <text x="86" y="132" font-size="13" font-weight="900" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Fixed system surplus
  </text>
  <text x="86" y="158" font-size="12" font-weight="900" fill="#2563EB"
    font-family="JetBrains Mono, monospace">
    Pi_system = F - N * c
  </text>
  <text x="86" y="184" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Discovery bottlenecks and slot fees change who captures surplus.
  </text>
  <text x="86" y="202" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    They do not create new total profit in this toy economy.
  </text>

  <!-- transfer split -->
  <rect x="60" y="264" width="360" height="200" rx="18"
    fill="rgba(15, 118, 110, 0.06)" stroke="rgba(15, 118, 110, 0.20)" />
  <text x="86" y="292" font-size="13" font-weight="900" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Slot-sale transfer split
  </text>
  <rect x="90" y="320" width="300" height="40" rx="12"
    fill="rgba(34, 197, 94, 0.10)" stroke="rgba(34, 197, 94, 0.22)" />
  <text x="110" y="345" font-size="12" fill="#15803D"
    font-family="JetBrains Mono, monospace">
    Pi_winners = F - q * c - S
  </text>
  <rect x="90" y="370" width="300" height="40" rx="12"
    fill="rgba(245, 158, 11, 0.10)" stroke="rgba(245, 158, 11, 0.22)" />
  <text x="110" y="395" font-size="12" fill="#B45309"
    font-family="JetBrains Mono, monospace">
    Pi_controller = S
  </text>
  <text x="90" y="432" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Raising S lowers winner profit one-for-one and raises controller profit one-for-one.
  </text>
  <text x="90" y="448" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    The slot mechanism is a rent-transfer device.
  </text>

  <!-- arrow -->
  <path d="M432 284 H468" stroke="#3B82F6" stroke-width="3"
    marker-end="url(#fp-gsm-arrow)" stroke-linecap="round" />

  <!-- right side: MPRD cap -->
  <rect x="490" y="104" width="390" height="360" rx="18"
    fill="rgba(194, 65, 12, 0.06)" stroke="rgba(194, 65, 12, 0.20)" />
  <text x="516" y="132" font-size="13" font-weight="900" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    MPRD-governed extraction
  </text>
  <text x="516" y="158" font-size="12" font-weight="900" fill="#C2410C"
    font-family="JetBrains Mono, monospace">
    S_star = min(G, F - q * c)
  </text>

  <!-- bars -->
  <text x="520" y="216" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    admissibility cap
  </text>
  <rect x="520" y="226" width="280" height="18" rx="9"
    fill="rgba(245, 158, 11, 0.14)" stroke="rgba(245, 158, 11, 0.24)" />
  <text x="812" y="240" font-size="10" fill="#B45309"
    font-family="JetBrains Mono, monospace">
    G
  </text>

  <text x="520" y="278" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    viability margin
  </text>
  <rect x="520" y="288" width="210" height="18" rx="9"
    fill="rgba(34, 197, 94, 0.14)" stroke="rgba(34, 197, 94, 0.24)" />
  <text x="742" y="302" font-size="10" fill="#15803D"
    font-family="JetBrains Mono, monospace">
    F - q * c
  </text>

  <text x="520" y="340" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    governed optimum
  </text>
  <rect x="520" y="350" width="210" height="18" rx="9"
    fill="rgba(59, 130, 246, 0.14)" stroke="rgba(59, 130, 246, 0.24)" />
  <text x="742" y="364" font-size="10" fill="#2563EB"
    font-family="JetBrains Mono, monospace">
    S_star
  </text>

  <text x="520" y="404" font-size="11" font-weight="900" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Two binding cases
  </text>
  <text x="520" y="428" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    If G is smaller, admissibility binds.
  </text>
  <text x="520" y="446" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    If F - q * c is smaller, winner viability binds.
  </text>

  <rect x="110" y="486" width="740" height="24" rx="10"
    fill="rgba(15, 23, 42, 0.04)" stroke="rgba(148, 163, 184, 0.20)" />
  <text x="134" y="503" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Teaching point: the interesting question is not “does governance kill profit?” It is “which cap binds, and who receives the remaining rent?”
  </text>
</svg>
