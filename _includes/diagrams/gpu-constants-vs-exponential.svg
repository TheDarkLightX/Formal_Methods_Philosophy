<svg
  class="fp-diagram"
  viewBox="0 0 960 460"
  role="img"
  aria-labelledby="fp-gpu-title fp-gpu-desc"
  xmlns="http://www.w3.org/2000/svg"
>
  <title id="fp-gpu-title">Constant-factor speedups versus exponential growth</title>
  <desc id="fp-gpu-desc">
    A conceptual chart showing that faster tensor kernels can shift runtimes downward but do not necessarily change
    the underlying exponential scaling when a task requires combinatorial search.
  </desc>

  <defs>
    <filter id="fp-gpu-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.10" />
    </filter>
    <marker id="fp-gpu-arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#3B82F6" fill-opacity="0.9" />
    </marker>
  </defs>

  <g filter="url(#fp-gpu-shadow)">
    <rect x="40" y="60" width="880" height="340" rx="26" fill="#FFFFFF" stroke="#E2E8F0" />

    <text
      x="90"
      y="120"
      font-size="16"
      font-weight="900"
      fill="#1E293B"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif"
    >
      Speedup boundary (conceptual)
    </text>
    <text
      x="90"
      y="145"
      font-size="12"
      fill="#475569"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif"
    >
      Faster kernels can improve throughput, but hard search can still scale exponentially.
    </text>

    <!-- Chart area -->
    <g>
      <rect x="110" y="170" width="740" height="190" rx="22" fill="rgba(15, 23, 42, 0.03)" stroke="rgba(15, 23, 42, 0.10)" />

      <!-- axes -->
      <path d="M150 330 V200" stroke="rgba(15, 23, 42, 0.35)" stroke-width="2.5" stroke-linecap="round" />
      <path d="M150 330 H820" stroke="rgba(15, 23, 42, 0.35)" stroke-width="2.5" stroke-linecap="round" />

      <!-- grid lines -->
      <g stroke="rgba(15, 23, 42, 0.08)" stroke-width="1">
        <path d="M150 290 H820" />
        <path d="M150 250 H820" />
        <path d="M150 210 H820" />
      </g>

      <!-- labels -->
      <text x="155" y="195" font-size="11" fill="#475569" font-family="Atkinson Hyperlegible, system-ui, sans-serif">
        time
      </text>
      <text x="820" y="350" text-anchor="end" font-size="11" fill="#475569" font-family="Atkinson Hyperlegible, system-ui, sans-serif">
        problem size n
      </text>

      <!-- Curves: CPU vs GPU (same shape, shifted) -->
      <path
        d="M170 318 C300 312, 400 302, 500 284 C620 262, 720 240, 820 214"
        fill="none"
        stroke="rgba(15, 23, 42, 0.55)"
        stroke-width="3.5"
        stroke-linecap="round"
      />
      <path
        d="M170 332 C300 326, 400 316, 500 298 C620 276, 720 254, 820 228"
        fill="none"
        stroke="rgba(59, 130, 246, 0.90)"
        stroke-width="3.5"
        stroke-linecap="round"
      />

      <text x="790" y="210" font-size="11" fill="rgba(15, 23, 42, 0.70)" font-family="Atkinson Hyperlegible, system-ui, sans-serif">
        CPU / baseline
      </text>
      <text x="780" y="236" font-size="11" fill="rgba(59, 130, 246, 0.95)" font-family="Atkinson Hyperlegible, system-ui, sans-serif">
        GPU / tensorized kernel
      </text>

      <!-- constant factor annotation -->
      <path
        d="M640 265 V238"
        stroke="#3B82F6"
        stroke-width="2.5"
        stroke-linecap="round"
        marker-end="url(#fp-gpu-arrow)"
      />
      <path d="M640 265 V292" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round" marker-end="url(#fp-gpu-arrow)" />
      <text
        x="660"
        y="272"
        font-size="11"
        fill="#475569"
        font-family="Atkinson Hyperlegible, system-ui, sans-serif"
      >
        constant factor
      </text>
      <text
        x="660"
        y="288"
        font-size="11"
        fill="#475569"
        font-family="Atkinson Hyperlegible, system-ui, sans-serif"
      >
        shift (throughput)
      </text>

      <!-- boundary note -->
      <rect x="170" y="182" width="310" height="34" rx="16" fill="rgba(249, 115, 22, 0.10)" stroke="rgba(249, 115, 22, 0.24)" />
      <text x="325" y="203" text-anchor="middle" font-size="11" fill="#1E293B" font-family="Atkinson Hyperlegible, system-ui, sans-serif">
        still exponential if search explodes
      </text>
    </g>
  </g>
</svg>
