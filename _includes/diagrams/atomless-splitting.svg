<svg
  class="fp-diagram"
  viewBox="0 0 960 430"
  role="img"
  aria-labelledby="fp-atomless-title fp-atomless-desc"
  xmlns="http://www.w3.org/2000/svg"
>
  <title id="fp-atomless-title">Atom versus atomless Boolean algebra</title>
  <desc id="fp-atomless-desc">
    Two side-by-side tree diagrams. The left panel shows a nonzero piece that
    eventually reaches a smallest live piece, an atom. The right panel shows an
    atomless setting where every nonzero piece can still split into two smaller
    nonzero pieces.
  </desc>

  <defs>
    <filter id="fp-atomless-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.10" />
    </filter>
    <marker id="fp-atomless-arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#475569" fill-opacity="0.85" />
    </marker>
  </defs>

  <g filter="url(#fp-atomless-shadow)">
    <rect x="40" y="32" width="880" height="366" rx="26" fill="#FFFFFF" stroke="#E2E8F0" />

    <text
      x="90"
      y="82"
      font-size="18"
      font-weight="900"
      fill="#1E293B"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif"
    >
      Atom versus atomless splitting
    </text>
    <text
      x="90"
      y="106"
      font-size="12"
      fill="#475569"
      font-family="Atkinson Hyperlegible, system-ui, sans-serif"
    >
      Atomless means there is no smallest nonzero piece. Every live branch can still split.
    </text>

    <!-- Left panel -->
    <rect x="76" y="136" width="376" height="220" rx="22" fill="#F8FAFC" stroke="#E2E8F0" />
    <text x="108" y="168" font-size="14" font-weight="800" fill="#1E293B" font-family="Atkinson Hyperlegible, system-ui, sans-serif">
      With an atom
    </text>
    <text x="108" y="188" font-size="11" fill="#64748B" font-family="Atkinson Hyperlegible, system-ui, sans-serif">
      One nonzero branch eventually reaches a smallest live piece.
    </text>

    <g stroke="#94A3B8" stroke-width="3" stroke-linecap="round">
      <line x1="264" y1="200" x2="184" y2="256" />
      <line x1="264" y1="200" x2="344" y2="256" />
      <line x1="184" y1="256" x2="144" y2="314" />
      <line x1="184" y1="256" x2="224" y2="314" />
      <line x1="344" y1="256" x2="304" y2="314" />
      <line x1="344" y1="256" x2="384" y2="314" />
    </g>

    <g font-family="JetBrains Mono, ui-monospace, monospace" font-size="12" fill="#1E293B" text-anchor="middle">
      <circle cx="264" cy="200" r="22" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2.5" />
      <text x="264" y="204">1</text>

      <circle cx="184" cy="256" r="20" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2.5" />
      <text x="184" y="260">a</text>
      <circle cx="344" cy="256" r="20" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2.5" />
      <text x="344" y="260">a'</text>

      <circle cx="144" cy="314" r="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2" />
      <text x="144" y="318">b</text>
      <circle cx="224" cy="314" r="18" fill="#FEE2E2" stroke="#DC2626" stroke-width="2.5" />
      <text x="224" y="318">α</text>
      <circle cx="304" cy="314" r="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2" />
      <text x="304" y="318">c</text>
      <circle cx="384" cy="314" r="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2" />
      <text x="384" y="318">d</text>
    </g>

    <path d="M250 330 C286 334, 320 340, 352 340" fill="none" stroke="#64748B" stroke-width="2.5" marker-end="url(#fp-atomless-arrow)" stroke-linecap="round" />
    <text x="116" y="340" font-size="11" fill="#475569" font-family="Atkinson Hyperlegible, system-ui, sans-serif">
      α is an atom:
    </text>
    <text x="116" y="356" font-size="11" fill="#475569" font-family="Atkinson Hyperlegible, system-ui, sans-serif">
      a smallest nonzero piece
    </text>

    <!-- Right panel -->
    <rect x="508" y="136" width="376" height="220" rx="22" fill="#F8FAFC" stroke="#E2E8F0" />
    <text x="540" y="168" font-size="14" font-weight="800" fill="#1E293B" font-family="Atkinson Hyperlegible, system-ui, sans-serif">
      Atomless
    </text>
    <text x="540" y="188" font-size="11" fill="#64748B" font-family="Atkinson Hyperlegible, system-ui, sans-serif">
      Every nonzero piece can still split into two smaller nonzero pieces.
    </text>

    <g stroke="#94A3B8" stroke-width="3" stroke-linecap="round">
      <line x1="696" y1="196" x2="616" y2="248" />
      <line x1="696" y1="196" x2="776" y2="248" />
      <line x1="616" y1="248" x2="576" y2="302" />
      <line x1="616" y1="248" x2="656" y2="302" />
      <line x1="776" y1="248" x2="736" y2="302" />
      <line x1="776" y1="248" x2="816" y2="302" />
      <line x1="576" y1="302" x2="548" y2="338" />
      <line x1="576" y1="302" x2="604" y2="338" />
      <line x1="656" y1="302" x2="628" y2="338" />
      <line x1="656" y1="302" x2="684" y2="338" />
      <line x1="736" y1="302" x2="708" y2="338" />
      <line x1="736" y1="302" x2="764" y2="338" />
      <line x1="816" y1="302" x2="788" y2="338" />
      <line x1="816" y1="302" x2="844" y2="338" />
    </g>

    <g font-family="JetBrains Mono, ui-monospace, monospace" font-size="12" fill="#1E293B" text-anchor="middle">
      <circle cx="696" cy="196" r="22" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2.5" />
      <text x="696" y="200">1</text>

      <circle cx="616" cy="248" r="18" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2.5" />
      <text x="616" y="252">r₀</text>
      <circle cx="776" cy="248" r="18" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2.5" />
      <text x="776" y="252">r₁</text>

      <circle cx="576" cy="302" r="16" fill="#BFDBFE" stroke="#3B82F6" stroke-width="2.2" />
      <text x="576" y="306">s₀</text>
      <circle cx="656" cy="302" r="16" fill="#BFDBFE" stroke="#3B82F6" stroke-width="2.2" />
      <text x="656" y="306">s₁</text>
      <circle cx="736" cy="302" r="16" fill="#BFDBFE" stroke="#3B82F6" stroke-width="2.2" />
      <text x="736" y="306">s₂</text>
      <circle cx="816" cy="302" r="16" fill="#BFDBFE" stroke="#3B82F6" stroke-width="2.2" />
      <text x="816" y="306">s₃</text>

      <circle cx="548" cy="338" r="10" fill="#93C5FD" stroke="#3B82F6" stroke-width="1.8" />
      <circle cx="604" cy="338" r="10" fill="#93C5FD" stroke="#3B82F6" stroke-width="1.8" />
      <circle cx="628" cy="338" r="10" fill="#93C5FD" stroke="#3B82F6" stroke-width="1.8" />
      <circle cx="684" cy="338" r="10" fill="#93C5FD" stroke="#3B82F6" stroke-width="1.8" />
      <circle cx="708" cy="338" r="10" fill="#93C5FD" stroke="#3B82F6" stroke-width="1.8" />
      <circle cx="764" cy="338" r="10" fill="#93C5FD" stroke="#3B82F6" stroke-width="1.8" />
      <circle cx="788" cy="338" r="10" fill="#93C5FD" stroke="#3B82F6" stroke-width="1.8" />
      <circle cx="844" cy="338" r="10" fill="#93C5FD" stroke="#3B82F6" stroke-width="1.8" />
    </g>

    <path d="M844 210 C868 214, 884 230, 892 252" fill="none" stroke="#64748B" stroke-width="2.5" marker-end="url(#fp-atomless-arrow)" stroke-linecap="round" />
    <text x="814" y="214" font-size="11" fill="#475569" font-family="Atkinson Hyperlegible, system-ui, sans-serif">
      no terminal
    </text>
    <text x="814" y="230" font-size="11" fill="#475569" font-family="Atkinson Hyperlegible, system-ui, sans-serif">
      live piece
    </text>

    <!-- Bottom takeaway -->
    <rect x="242" y="356" width="476" height="24" rx="12" fill="#EEF2FF" stroke="#C7D2FE" />
    <text x="480" y="373" text-anchor="middle" font-size="12" fill="#3730A3" font-family="Atkinson Hyperlegible, system-ui, sans-serif">
      Atomless = every nonzero piece still admits another disjoint nonzero split.
    </text>
  </g>
</svg>
