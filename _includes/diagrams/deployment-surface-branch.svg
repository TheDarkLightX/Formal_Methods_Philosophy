<svg
  class="fp-diagram"
  viewBox="0 0 960 520"
  role="img"
  aria-labelledby="fp-dsb-title fp-dsb-desc"
  xmlns="http://www.w3.org/2000/svg"
>
  <title id="fp-dsb-title">Deployment surface branch</title>
  <desc id="fp-dsb-desc">
    A teaching diagram for Experiment 16. A frontier lab chooses between a closed and open deployment branch.
    The lab compares private capture, while the social planner compares ecosystem output against externality cost.
  </desc>

  <defs>
    <filter id="fp-dsb-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.10" />
    </filter>
    <marker id="fp-dsb-arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#3B82F6" fill-opacity="0.9" />
    </marker>
  </defs>

  <g filter="url(#fp-dsb-shadow)">
    <rect x="20" y="10" width="920" height="500" rx="26" fill="#FFFFFF" stroke="#E2E8F0" />
  </g>

  <text x="60" y="46" font-size="15" font-weight="900" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Deployment surface branch
  </text>
  <text x="60" y="66" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    The lab's private branch and the planner's social branch can point in different directions.
  </text>

  <!-- decision -->
  <rect x="368" y="102" width="224" height="60" rx="16"
    fill="rgba(59, 130, 246, 0.08)" stroke="rgba(59, 130, 246, 0.24)" />
  <text x="400" y="128" font-size="13" font-weight="900" fill="#2563EB"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Frontier lab chooses
  </text>
  <text x="400" y="148" font-size="12" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    deployment surface
  </text>

  <path d="M430 162 L310 226" stroke="#3B82F6" stroke-width="3"
    marker-end="url(#fp-dsb-arrow)" fill="none" stroke-linecap="round" />
  <path d="M530 162 L650 226" stroke="#3B82F6" stroke-width="3"
    marker-end="url(#fp-dsb-arrow)" fill="none" stroke-linecap="round" />

  <!-- closed -->
  <rect x="120" y="230" width="280" height="154" rx="18"
    fill="rgba(168, 34, 24, 0.08)" stroke="rgba(168, 34, 24, 0.22)" />
  <text x="146" y="258" font-size="13" font-weight="900" fill="#A82218"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Closed branch
  </text>
  <text x="146" y="286" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    direct control over deployment
  </text>
  <text x="146" y="304" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    lower ecosystem spillover
  </text>
  <text x="146" y="334" font-size="12" fill="#A82218"
    font-family="JetBrains Mono, monospace">
    private base: F - k_closed
  </text>
  <text x="146" y="356" font-size="12" fill="#A82218"
    font-family="JetBrains Mono, monospace">
    social cost: e_closed
  </text>

  <!-- open -->
  <rect x="560" y="230" width="280" height="154" rx="18"
    fill="rgba(34, 197, 94, 0.08)" stroke="rgba(34, 197, 94, 0.22)" />
  <text x="586" y="258" font-size="13" font-weight="900" fill="#15803D"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Open branch
  </text>
  <text x="586" y="286" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    extra ecosystem output D
  </text>
  <text x="586" y="304" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    lab captures only a / m of it
  </text>
  <text x="586" y="334" font-size="12" fill="#15803D"
    font-family="JetBrains Mono, monospace">
    private base: a * (F + D) / m - k_open
  </text>
  <text x="586" y="356" font-size="12" fill="#15803D"
    font-family="JetBrains Mono, monospace">
    social cost: e_open
  </text>

  <!-- divergence rule -->
  <rect x="150" y="418" width="660" height="58" rx="18"
    fill="rgba(15, 23, 42, 0.04)" stroke="rgba(148, 163, 184, 0.20)" />
  <text x="176" y="444" font-size="12" font-weight="900" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Divergence region
  </text>
  <text x="176" y="466" font-size="11" fill="#475569"
    font-family="JetBrains Mono, monospace">
    D >= e_open - e_closed   and   a * (F + D) < m * (F - k_closed + k_open)
  </text>
</svg>
