<svg
  class="fp-diagram"
  viewBox="0 0 960 440"
  role="img"
  aria-labelledby="fp-tat-title fp-tat-desc"
  xmlns="http://www.w3.org/2000/svg"
>
  <title id="fp-tat-title">Trust-adoption timeline and assurance wedge</title>
  <desc id="fp-tat-desc">
    A two-period adoption game. Machine control may be myopically rejected in
    period 1 but still worth adopting over two periods. Incumbent rents can
    block even that. An assurance package can close the gap.
  </desc>

  <defs>
    <filter id="fp-tat-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.10" />
    </filter>
    <marker id="fp-tat-arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#3B82F6" fill-opacity="0.8" />
    </marker>
  </defs>

  <!-- Card -->
  <g filter="url(#fp-tat-shadow)">
    <rect x="20" y="10" width="920" height="420" rx="26" fill="#FFFFFF" stroke="#E2E8F0" />
  </g>

  <!-- Title -->
  <text x="60" y="46" font-size="15" font-weight="900" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Trust-adoption timeline  (Experiments 21&#x2013;27)
  </text>
  <text x="60" y="64" font-size="11" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Machine control can be better but under-adopted.  Three layers can block it.
  </text>

  <!-- ===== Timeline: Period 1 and Period 2 ===== -->
  <line x1="80" y1="130" x2="560" y2="130" stroke="#E2E8F0" stroke-width="2" />
  <circle cx="80" cy="130" r="4" fill="#3B82F6" />
  <circle cx="320" cy="130" r="4" fill="#3B82F6" />
  <circle cx="560" cy="130" r="4" fill="#3B82F6" />
  <text x="72" y="118" font-size="10" font-weight="700" fill="#3B82F6"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">Start</text>
  <text x="290" y="118" font-size="10" font-weight="700" fill="#3B82F6"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">Period 1</text>
  <text x="530" y="118" font-size="10" font-weight="700" fill="#3B82F6"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">Period 2</text>

  <!-- Path A: Always human -->
  <rect x="100" y="150" width="440" height="34" rx="10"
    fill="rgba(148, 163, 184, 0.10)" stroke="rgba(148, 163, 184, 0.25)" />
  <text x="118" y="172" font-size="11" fill="#64748B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Path A: always human  &#x2192;  total premium = 0  (baseline)
  </text>

  <!-- Path B: Machine both periods -->
  <rect x="100" y="192" width="440" height="52" rx="10"
    fill="rgba(34, 197, 94, 0.08)" stroke="rgba(34, 197, 94, 0.22)" />
  <text x="118" y="214" font-size="11" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Path B: machine both  &#x2192;  P1: A &#x2212; &#x03C4;&#x2081;  +  P2: A &#x2212; &#x03C4;&#x2081; + &#x03BB;
  </text>
  <text x="118" y="234" font-size="11" font-weight="700" fill="#15803D"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">
    Total: 2A &#x2212; 2&#x03C4;&#x2081; + &#x03BB;
  </text>

  <!-- ===== Three blocking layers ===== -->
  <line x1="60" y1="265" x2="570" y2="265" stroke="#E2E8F0" stroke-width="1" />

  <text x="80" y="290" font-size="13" font-weight="900" fill="#1E293B"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">Three layers that can block adoption</text>

  <!-- Layer 1: Trust lag -->
  <rect x="80" y="305" width="155" height="100" rx="14"
    fill="rgba(249, 115, 22, 0.08)" stroke="rgba(249, 115, 22, 0.22)" />
  <text x="95" y="326" font-size="11" font-weight="900" fill="#C2410C"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">Trust lag</text>
  <text x="95" y="346" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">A &lt; &#x03C4;&#x2081;: myopic</text>
  <text x="95" y="362" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">rejection even</text>
  <text x="95" y="378" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">when machine safer</text>
  <text x="95" y="398" font-size="9" font-weight="700" fill="#C2410C"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">Exp 21</text>

  <!-- Layer 2: Incumbent rents -->
  <rect x="250" y="305" width="155" height="100" rx="14"
    fill="rgba(168, 34, 24, 0.08)" stroke="rgba(168, 34, 24, 0.20)" />
  <text x="265" y="326" font-size="11" font-weight="900" fill="#A82218"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">Incumbent rents</text>
  <text x="265" y="346" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">&#x03C1; &gt; 0: controller</text>
  <text x="265" y="362" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">loses rent, blocks</text>
  <text x="265" y="378" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">socially better path</text>
  <text x="265" y="398" font-size="9" font-weight="700" fill="#A82218"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">Exp 24</text>

  <!-- Layer 3: No assurance -->
  <rect x="420" y="305" width="155" height="100" rx="14"
    fill="rgba(99, 102, 241, 0.08)" stroke="rgba(99, 102, 241, 0.22)" />
  <text x="435" y="326" font-size="11" font-weight="900" fill="#4F46E5"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">Missing assurance</text>
  <text x="435" y="346" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">No audit, replay,</text>
  <text x="435" y="362" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">or confinement to</text>
  <text x="435" y="378" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">lower trust penalty</text>
  <text x="435" y="398" font-size="9" font-weight="700" fill="#4F46E5"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">Exps 25&#x2013;27</text>

  <!-- ===== Right panel: adoption conditions ===== -->
  <rect x="610" y="82" width="305" height="322" rx="18"
    fill="rgba(34, 197, 94, 0.06)" stroke="rgba(34, 197, 94, 0.18)" />
  <text x="630" y="110" font-size="13" font-weight="900" fill="#15803D"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">Adoption conditions</text>

  <text x="630" y="138" font-size="10" font-weight="700" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">Social adopts machine iff:</text>
  <rect x="635" y="146" width="265" height="26" rx="6"
    fill="rgba(34, 197, 94, 0.08)" stroke="rgba(34, 197, 94, 0.18)" />
  <text x="648" y="164" font-size="11" fill="#1E293B"
    font-family="JetBrains Mono, monospace">2A + &#x03BB; &#x2265; 2&#x03C4;&#x2081;</text>

  <text x="630" y="198" font-size="10" font-weight="700" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">Private incumbent adopts iff:</text>
  <rect x="635" y="206" width="265" height="26" rx="6"
    fill="rgba(249, 115, 22, 0.08)" stroke="rgba(249, 115, 22, 0.18)" />
  <text x="648" y="224" font-size="11" fill="#1E293B"
    font-family="JetBrains Mono, monospace">2A + &#x03BB; &#x2265; 2&#x03C4;&#x2081; + 2&#x03C1;</text>

  <text x="630" y="258" font-size="10" font-weight="700" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">Assurance package flips iff:</text>
  <rect x="635" y="266" width="265" height="26" rx="6"
    fill="rgba(99, 102, 241, 0.08)" stroke="rgba(99, 102, 241, 0.18)" />
  <text x="648" y="284" font-size="11" fill="#1E293B"
    font-family="JetBrains Mono, monospace">2d + g &#x2212; k &#x2265; gap</text>

  <text x="630" y="320" font-size="10" font-weight="700" fill="#15803D"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">Lever ranking (equal costs):</text>
  <text x="638" y="342" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">&#x2460; Trust lift d  (weight 2 &#x2212; c)</text>
  <text x="638" y="360" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">&#x2461; Liability offset &#x2113;  (weight 2 &#x2212; c)</text>
  <text x="638" y="378" font-size="10" fill="#475569"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">&#x2462; Extra learning g  (weight 1 &#x2212; c)</text>
  <text x="638" y="396" font-size="10" font-weight="700" fill="#15803D"
    font-family="Atkinson Hyperlegible, system-ui, sans-serif">Pre-deployment trust beats delayed learning</text>
</svg>
