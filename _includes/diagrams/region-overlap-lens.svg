<svg
  class="fp-diagram"
  viewBox="0 0 960 430"
  role="img"
  aria-labelledby="fp-meet-join-title fp-meet-join-desc"
  xmlns="http://www.w3.org/2000/svg"
>
  <title id="fp-meet-join-title">Meet and join in the region picture</title>
  <desc id="fp-meet-join-desc">
    Two side-by-side panels compare meet and join. Meet highlights only the
    middle overlap of regions A and B. Join highlights the whole covered area:
    the A-only part, the shared middle, and the B-only part.
  </desc>

  <defs>
    <filter id="fp-meet-join-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0F172A" flood-opacity="0.10" />
    </filter>
    <style>
      .fp-mj-bg { fill: #F8FAFC; }
      .fp-mj-panel { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 2; filter: url(#fp-meet-join-shadow); }
      .fp-mj-circle { fill: none; stroke: #475569; stroke-width: 3; }
      .fp-mj-left { fill: #BFDBFE; stroke: #2563EB; stroke-width: 2; }
      .fp-mj-right { fill: #FDE68A; stroke: #B45309; stroke-width: 2; }
      .fp-mj-middle { fill: #BBF7D0; stroke: #15803D; stroke-width: 2; }
      .fp-mj-title { fill: #0F172A; font: 700 28px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .fp-mj-subtitle { fill: #334155; font: 700 18px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .fp-mj-label { fill: #0F172A; font: 700 20px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .fp-mj-code { fill: #111827; font: 600 16px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .fp-mj-small { fill: #475569; font: 500 15px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    </style>
  </defs>

  <rect class="fp-mj-bg" width="960" height="430" rx="18" />
  <rect class="fp-mj-panel" x="40" y="34" width="880" height="336" rx="14" />

  <text class="fp-mj-title" x="80" y="82">Meet and join in the region picture</text>
  <text class="fp-mj-small" x="80" y="112">Meet keeps the middle. Join keeps everything covered.</text>

  <text class="fp-mj-subtitle" x="120" y="158">MEET (∧)</text>
  <text class="fp-mj-small" x="120" y="184">only the middle</text>

  <circle class="fp-mj-circle" cx="225" cy="250" r="72" />
  <circle class="fp-mj-circle" cx="295" cy="250" r="72" />
  <path
    class="fp-mj-middle"
    d="M 260 187
       C 290 206 290 294 260 313
       C 230 294 230 206 260 187 Z"
  />
  <text class="fp-mj-label" x="195" y="250">A</text>
  <text class="fp-mj-label" x="312" y="250">B</text>
  <text class="fp-mj-code" x="216" y="352">A ∧ B = middle</text>

  <text class="fp-mj-subtitle" x="560" y="158">JOIN (∨)</text>
  <text class="fp-mj-small" x="560" y="184">everything covered</text>

  <circle class="fp-mj-left" cx="665" cy="250" r="72" opacity="0.82" />
  <circle class="fp-mj-right" cx="735" cy="250" r="72" opacity="0.82" />
  <path
    class="fp-mj-middle"
    d="M 700 187
       C 730 206 730 294 700 313
       C 670 294 670 206 700 187 Z"
    opacity="0.95"
  />
  <circle class="fp-mj-circle" cx="665" cy="250" r="72" />
  <circle class="fp-mj-circle" cx="735" cy="250" r="72" />
  <text class="fp-mj-label" x="635" y="250">A</text>
  <text class="fp-mj-label" x="752" y="250">B</text>
  <text class="fp-mj-code" x="585" y="352">A ∨ B = left + middle + right</text>
</svg>
