<svg
  class="fp-diagram"
  viewBox="0 0 960 320"
  role="img"
  aria-labelledby="fp-join-title fp-join-desc"
  xmlns="http://www.w3.org/2000/svg"
>
  <title id="fp-join-title">Join collects what survives on either branch</title>
  <desc id="fp-join-desc">
    The x equals zero branch has a surviving left piece. The x equals one
    branch has a surviving right piece. The join row contains both surviving
    pieces.
  </desc>

  <defs>
    <filter id="fp-join-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0F172A" flood-opacity="0.10" />
    </filter>
    <style>
      .fp-join-bg { fill: #F8FAFC; }
      .fp-join-panel { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 2; filter: url(#fp-join-shadow); }
      .fp-join-left { fill: #BFDBFE; stroke: #2563EB; stroke-width: 2; }
      .fp-join-right { fill: #FDE68A; stroke: #B45309; stroke-width: 2; }
      .fp-join-guide { stroke: #94A3B8; stroke-width: 2; stroke-dasharray: 7 7; }
      .fp-join-title { fill: #0F172A; font: 700 28px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .fp-join-label { fill: #334155; font: 700 18px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .fp-join-code { fill: #111827; font: 600 16px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .fp-join-small { fill: #475569; font: 500 15px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    </style>
  </defs>

  <rect class="fp-join-bg" width="960" height="320" rx="18" />
  <rect class="fp-join-panel" x="40" y="34" width="880" height="236" rx="14" />

  <text class="fp-join-title" x="80" y="80">Join keeps either surviving side</text>
  <text class="fp-join-small" x="80" y="110">If either branch has live mass, the join keeps it.</text>

  <line class="fp-join-guide" x1="268" y1="126" x2="268" y2="250" />
  <line class="fp-join-guide" x1="548" y1="126" x2="548" y2="250" />
  <line class="fp-join-guide" x1="725" y1="126" x2="725" y2="250" />

  <text class="fp-join-label" x="86" y="158">branch x=0</text>
  <rect class="fp-join-left" x="268" y="134" width="190" height="38" rx="7" />
  <text class="fp-join-code" x="305" y="158">left survives</text>

  <text class="fp-join-label" x="86" y="209">branch x=1</text>
  <rect class="fp-join-right" x="548" y="185" width="177" height="38" rx="7" />
  <text class="fp-join-code" x="581" y="209">right survives</text>

  <text class="fp-join-label" x="86" y="260">join</text>
  <rect class="fp-join-left" x="268" y="236" width="190" height="38" rx="7" />
  <rect class="fp-join-right" x="548" y="236" width="177" height="38" rx="7" />
  <text class="fp-join-code" x="305" y="260">left survives</text>
  <text class="fp-join-code" x="581" y="260">right survives</text>
</svg>
